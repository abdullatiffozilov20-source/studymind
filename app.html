<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Biz — Couple App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #FFF9F7;
  --primary: #FF7BA7;
  --primary-deep: #E85D8F;
  --lavender: #C8B6FF;
  --lavender-light: #F0EAFF;
  --cream: #FFF2DD;
  --peach: #FFD8C2;
  --peach-light: #FFEEE3;
  --mint: #D8F5E8;
  --sky: #DDEEFF;
  --pink-light: #FFE3EF;
  --text: #5B445C;
  --text-secondary: #A88EA4;
  --radius: 28px;
  --radius-sm: 18px;
  --shadow-soft: 0 10px 40px rgba(255,150,180,0.14);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Pretendard', -apple-system, 'Segoe UI', sans-serif; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }

.baloo { font-family: 'Pretendard', sans-serif; font-weight: 700; letter-spacing: -0.2px; }
.glass { background: rgba(255,255,255,0.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 10px; }
.topbar-left { display: flex; align-items: center; }
.backbtn { border: none; background: var(--pink-light); width: 34px; height: 34px; border-radius: 17px;
           display: flex; align-items: center; justify-content: center; margin-right: 10px;
           font-size: 18px; color: var(--primary-deep); line-height: 1; }
.topbar-title { font-size: 21px; font-weight: 700; color: var(--text); }
.addbtn { border: none; background: var(--primary); color: #fff; width: 34px; height: 34px; border-radius: 17px;
          display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1;
          box-shadow: var(--shadow-soft); }
.screen { padding: 0 0 100px; }
.content { padding: 0 20px; }

.hero-time { background: linear-gradient(135deg,var(--pink-light),var(--lavender-light)); border-radius: var(--radius); padding: 28px 20px; text-align: center; }
.card-row { margin-top: 16px; background: #FFEEE3; border-radius: 26px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.card-purple { margin-top: 12px; background: #F0EAFF; border-radius: 26px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.mem-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
.mem-chip { min-width: 100px; border-radius: 22px; padding: 14px 10px; text-align: center; flex-shrink: 0; cursor: pointer; }
.mem-tile { border-radius: 26px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.mem-tile-main { display: flex; align-items: center; gap: 14px; flex: 1; cursor: pointer; }
.mem-icon { width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
.mem-icon img { width: 100%; height: 100%; object-fit: cover; }
.gallery { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; }
.gallery-item { position: relative; flex-shrink: 0; }
.gallery-item img { width: 90px; height: 90px; object-fit: cover; border-radius: 14px; }
.gallery-del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 11px; background: #5B445C; color: #fff; border: none; font-size: 12px; display: flex; align-items: center; justify-content: center; }

.track-row { border-radius: 22px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.track-icon { width: 36px; height: 36px; border-radius: 22px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.track-link { display: inline-block; margin-top: 6px; font-size: 11px; color: #FF7BA7; text-decoration: none; }

.letter-row { background: #FFEEE3; border-radius: 26px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.letter-row-main { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
.letter-open { background: #FFF9F7; border: 1.5px dashed #F0B8CE; border-radius: 26px; padding: 28px 20px; min-height: 200px; }

.segment { display: flex; background: #FFEEE3; border-radius: 16px; padding: 4px; margin-bottom: 16px; overflow-x: auto; }
.segment button { flex: 1; border: none; border-radius: 12px; padding: 9px 4px; font-size: 11.5px; background: transparent; color: #A88EA4; white-space: nowrap; }
.segment button.active { background: #FFFFFF; color: #FF7BA7; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }

.timeline { position: relative; padding-left: 18px; }
.timeline::before { content: ""; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: #F5D6E4; }
.timeline-item { position: relative; margin-bottom: 18px; display: flex; align-items: flex-start; justify-content: space-between; }
.timeline-dot { position: absolute; left: -18px; top: 3px; width: 10px; height: 10px; border-radius: 5px; background: #FF7BA7; }

.folder-block { background: #FFEEE3; border-radius: 22px; margin-bottom: 12px; padding: 14px 16px; }
.folder-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.folder-title { font-family: Georgia, serif; font-size: 14px; color: #5B445C; margin: 0; }
.folder-count { font-size: 10px; color: #E85D8F; }
.folder-body { margin-top: 10px; }
.bucket-row { display: flex; align-items: center; gap: 10px; border-radius: 16px; padding: 10px 12px; margin-bottom: 8px; background: #FFFDFB; }
.bucket-check { width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; color: #fff; border: 1.5px solid #E7C7D4; background: #fff; }
.bucket-check.done { background: #4FBF9B; border-color: #4FBF9B; }
.add-item-row { display: flex; gap: 8px; margin-top: 4px; }
.add-item-row input { flex: 1; border: 1px solid #F0B8CE; border-radius: 10px; padding: 8px 10px; font-size: 12px; }
.add-item-row button, .add-folder-btn { border: none; background: #FF7BA7; color: #fff; border-radius: 10px; padding: 8px 12px; font-size: 12px; }
.add-folder-btn { width: 100%; margin-top: 4px; background: #FFFFFF; color: #FF7BA7; border: 1.5px dashed #F0B8CE; }

.icon-btn { border: none; background: transparent; color: #C9A9BB; font-size: 13px; padding: 4px 6px; flex-shrink: 0; }
.icon-btn.danger { color: #FF7BA7; }
.row-actions { display: flex; gap: 2px; flex-shrink: 0; }

.gender-btn { border: none; background: #FFEEE3; border-radius: 26px; padding: 22px 26px; display: flex; flex-direction: column; align-items: center; gap: 6px; }

.stage-block { border-radius: 22px; margin-bottom: 12px; overflow: hidden; }
.stage-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
.stage-body { padding: 0 14px 14px; }
.cat-title { font-size: 11px; color: #E85D8F; font-weight: 600; margin: 6px 0; }
.q-row { background: #FFFDFB; border: 1px solid #F5E3EA; border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; }
.q-text { margin: 0; font-size: 12.5px; color: #5B445C; font-weight: 500; }
.q-answer { margin: 4px 0 0; font-size: 12px; color: #7A5670; cursor: pointer; }
.q-placeholder { margin: 4px 0 0; font-size: 12px; color: #C9B7C2; font-style: italic; cursor: pointer; }
.q-answer-ro { margin: 4px 0 0; font-size: 12px; }
.q-textarea { width: 100%; box-sizing: border-box; border: 1px solid #F0B8CE; border-radius: 10px; padding: 8px; font-size: 12px; color: #5B445C; resize: none; margin-top: 6px; }
.q-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.q-cancel { border: none; background: transparent; color: #A88EA4; font-size: 11px; }
.q-save { border: none; background: #FF7BA7; color: #fff; border-radius: 10px; padding: 5px 12px; font-size: 11px; }

.link-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #4FBF9B; background: #D8F5E8; padding: 4px 10px; border-radius: 10px; margin-bottom: 10px; }
.link-badge.pending { color: #E85D8F; background: #FFE3EF; }

.task-row { background: #FFEEE3; border-radius: 22px; padding: 14px 16px; margin-bottom: 10px; }
.task-row.done { background: #D8F5E8; }
.task-text { margin: 0; font-size: 13px; color: #5B445C; font-weight: 500; }
.task-reward { margin: 6px 0 0; font-size: 12px; color: #E85D8F; }
.task-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.task-done-btn { border: none; background: #FF7BA7; color: #fff; border-radius: 10px; padding: 6px 12px; font-size: 11.5px; }
.task-done-btn.completed { background: #4FBF9B; }
.reward-pop { text-align: center; font-size: 12px; color: #4FBF9B; margin-top: 4px; }

.bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
             background: #FFFDFB; border-top: 1px solid #F5E3EA; display: flex; justify-content: space-around;
             padding: 12px 8px calc(14px + env(safe-area-inset-bottom)); }
.nav-btn { border: none; background: transparent; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-emoji { font-size: 18px; }
.nav-label { font-size: 9px; color: #C9B7C2; }
.nav-label.active { color: #FF7BA7; font-weight: 600; }

/* onboarding */
.onboard-wrap { display: flex; flex-direction: column; justify-content: space-between; min-height: 100vh; padding: 40px 28px 30px; text-align: center; }
.onboard-emoji { font-size: 56px; margin-bottom: 18px; }
.onboard-title { font-family: Georgia, serif; font-size: 22px; color: #5B445C; margin: 0 0 10px; }
.onboard-text { font-size: 13.5px; color: #8A6E80; line-height: 1.6; }
.onboard-dots { display: flex; justify-content: center; gap: 6px; margin: 18px 0; }
.onboard-dot { width: 7px; height: 7px; border-radius: 4px; background: #F0D5E1; }
.onboard-dot.active { background: #FF7BA7; width: 18px; }
.onboard-actions { display: flex; justify-content: space-between; align-items: center; }
.onboard-skip { border: none; background: transparent; color: #A88EA4; font-size: 13px; }
.onboard-next { border: none; background: #FF7BA7; color: #fff; border-radius: 26px; padding: 12px 26px; font-size: 14px; font-family: Georgia, serif; }

/* forms */
.form-field { margin-bottom: 14px; text-align: left; }
.form-label { font-size: 11.5px; color: #E85D8F; font-weight: 600; margin-bottom: 5px; display: block; }
.form-input, .form-textarea { width: 100%; border: 1px solid #F0B8CE; border-radius: 12px; padding: 10px 12px; font-size: 13px; color: #5B445C; }
.form-textarea { resize: none; }
.emoji-pick { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.emoji-pick button { border: 1.5px solid #F0D5E1; background: #FFFDFB; border-radius: 12px; width: 36px; height: 36px; font-size: 16px; }
.emoji-pick button.active { border-color: #FF7BA7; background: #FFE3EF; }
.emoji-hint { font-size: 10.5px; color: #A88EA4; margin-top: 4px; }
.setup-screen { padding: 30px 26px; text-align: center; }
.setup-title { font-family: Georgia, serif; font-size: 20px; color: #5B445C; margin: 0 0 6px; }
.setup-sub { font-size: 12.5px; color: #8A6E80; margin: 0 0 22px; }
.primary-btn { border: none; background: #FF7BA7; color: #fff; border-radius: 16px; padding: 13px 0; width: 100%; font-size: 14px; font-family: Georgia, serif; margin-top: 6px; }
.ghost-btn { border: none; background: transparent; color: #A88EA4; font-size: 12.5px; padding: 10px 0; width: 100%; }
.code-box { background: #F0EAFF; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.code-value { font-family: Georgia, serif; font-size: 24px; letter-spacing: 4px; color: #5B445C; margin: 4px 0; }

/* modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(44,36,48,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
.modal-sheet { background: #FFF9F7; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 20px 22px calc(24px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; }
.modal-title { font-family: Georgia, serif; font-size: 17px; color: #5B445C; margin: 0 0 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.modal-cancel { flex: 1; border: none; background: #FFEEE3; color: #8A6E80; border-radius: 14px; padding: 12px 0; font-size: 13px; }
.modal-save { flex: 1; border: none; background: #FF7BA7; color: #fff; border-radius: 14px; padding: 12px 0; font-size: 13px; }

/* memory carousel */
.carousel { position: relative; margin-bottom: 12px; }
.carousel-img-wrap { width: 100%; height: 240px; border-radius: 22px; overflow: hidden; background: #FFEEE3; position: relative; }
.carousel-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.25s ease; }
.carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 16px;
                  background: rgba(255,255,255,0.85); border: none; font-size: 16px; color: #E85D8F; display: flex; align-items: center; justify-content: center; }
.carousel-arrow.left { left: 8px; }
.carousel-arrow.right { right: 8px; }
.carousel-del { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 14px; background: rgba(44,36,48,0.55); color: #fff; border: none; font-size: 13px; }
.carousel-dots { display: flex; justify-content: center; gap: 5px; margin-top: 8px; }
.carousel-dot { width: 6px; height: 6px; border-radius: 3px; background: #F0D5E1; }
.carousel-dot.active { background: #FF7BA7; width: 14px; }

/* all pictures grid */
.pic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pic-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; }

/* audio */
.audio-player { width: 100%; margin-top: 8px; height: 32px; }

/* home hero slideshow */
.hero-time { position: relative; overflow: hidden; border-radius: 28px; padding: 28px 20px; text-align: center; background: linear-gradient(135deg,#FFE3EF,#ECE5FF); }
.hero-slide-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 28px; opacity: 0; transition: opacity 0.8s ease; }
.hero-slide-img.show { opacity: 0.55; }
.hero-overlay { position: absolute; inset: 0; border-radius: 28px; background: linear-gradient(135deg, rgba(255,225,236,0.55), rgba(228,224,255,0.55)); z-index: 1; }
.hero-time-content { position: relative; z-index: 2; }

/* pairing code chip (persistent) */
.mycode-chip { display: flex; align-items: center; justify-content: space-between; background: #F0EAFF; border-radius: 14px; padding: 10px 14px; margin-bottom: 12px; }
.mycode-chip .code-value-sm { font-family: Georgia, serif; font-size: 16px; letter-spacing: 2px; color: #5B445C; }

/* selectable question row */
.q-row.selectable { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.q-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #E7C7D4; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; }
.q-checkbox.checked { background: #FF7BA7; border-color: #FF7BA7; }
.stage-label-plain { font-family: Georgia, serif; font-size: 13px; color: #5B445C; margin: 14px 0 6px; }

/* locked letters */
.letter-locked { background: #F0EAFF; border-radius: 26px; padding: 20px 18px; text-align: center; margin-bottom: 12px; }
.letter-locked .lock-icon { font-size: 26px; }
.lock-unlock-btn { border: none; background: #FF7BA7; color: #fff; border-radius: 12px; padding: 9px 16px; font-size: 12px; margin-top: 10px; }
.lock-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: #E85D8F; background: #FFE3EF; padding: 2px 8px; border-radius: 8px; }

/* map */
.map-area { position: relative; width: 100%; height: 320px; border-radius: 26px; overflow: hidden;
            background: radial-gradient(circle at 25% 30%, #FFE3EF 0%, transparent 45%),
                        radial-gradient(circle at 75% 65%, #ECE5FF 0%, transparent 45%),
                        radial-gradient(circle at 50% 90%, #FFF2DD 0%, transparent 40%),
                        #FFF9F7; cursor: crosshair; border: 1.5px dashed #F0D5E1; }
.map-pin { position: absolute; transform: translate(-50%, -100%); font-size: 22px; cursor: pointer; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15)); }
.map-pin-label { position: absolute; transform: translate(-50%, 4px); font-size: 9px; color: #5B445C; background: rgba(255,255,255,0.85); padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
.map-hint { font-size: 11px; color: #A88EA4; text-align: center; margin: 8px 0 14px; }

/* anniversary calendar */
.anniv-row { background: #FFEEE3; border-radius: 22px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.anniv-badge { min-width: 46px; text-align: center; background: #FFFFFF; border-radius: 12px; padding: 6px 8px; flex-shrink: 0; }
.anniv-badge .num { font-family: Georgia, serif; font-size: 15px; color: #FF7BA7; display: block; }
.anniv-badge .lbl { font-size: 8.5px; color: #A88EA4; }

/* ---------- premium redesign additions ---------- */

/* floating decorative hearts/sparkles (Home only, lightweight) */
.floaties { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.floaty { position: absolute; opacity: 0.35; animation: floatUp 9s ease-in-out infinite; }
@keyframes floatUp { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-14px) rotate(8deg); } }

/* glass premium card */
.premium-card { background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45));
                backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
                border-radius: var(--radius); box-shadow: var(--shadow-soft); padding: 18px 20px; margin-bottom: 14px; }

/* Daily Capsule */
.capsule-card { background: linear-gradient(135deg,#FFE3EF,#F0EAFF); border-radius: var(--radius); padding: 22px 20px; text-align: center; margin-bottom: 14px; box-shadow: var(--shadow-soft); }
.capsule-tag { display: inline-block; font-size: 10px; color: #E85D8F; background: rgba(255,255,255,0.7); padding: 3px 10px; border-radius: 10px; margin-bottom: 8px; }
.capsule-text { font-family: 'Pretendard', sans-serif; font-weight: 600; font-size: 15px; color: #5B445C; margin: 4px 0 12px; line-height: 1.5; }
.capsule-done-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 10px; }
.capsule-done-pill { font-size: 11px; padding: 6px 12px; border-radius: 12px; background: rgba(255,255,255,0.6); color: #A88EA4; }
.capsule-done-pill.done { background: #D8F5E8; color: #2F8B6C; font-weight: 600; }
.capsule-btn { border: none; background: #FF7BA7; color: #fff; border-radius: 14px; padding: 10px 22px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-soft); }
.capsule-btn.done { background: #A8E6CC; color: #2F8B6C; }

/* Garden */
.garden-card { background: linear-gradient(135deg,#F0FFF6,#EAFBF2); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
.garden-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; min-height: 30px; }
.garden-flower { font-size: 20px; }

/* Streak */
.streak-chip { display: inline-flex; align-items: center; gap: 6px; background: #FFF2DD; color: #B8752E; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 14px; }

/* mood */
.mood-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.mood-btn { border: none; background: #FFFDFB; border-radius: 16px; width: 44px; height: 44px; font-size: 20px; border: 1.5px solid #F5E3EA; }
.mood-btn.active { background: #FFE3EF; border-color: #FF7BA7; transform: scale(1.08); }
.partner-mood-card { background: linear-gradient(135deg,#DDEEFF,#F0EAFF); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }

/* random love / today's memory flashback */
.flashback-card { border-radius: var(--radius); overflow: hidden; position: relative; margin-bottom: 14px; min-height: 140px; display: flex; align-items: flex-end; }
.flashback-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.flashback-overlay { position: relative; z-index: 1; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.55), transparent); padding: 30px 16px 14px; color: #fff; }

/* reactions */
.reaction-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.reaction-btn { border: 1.5px solid #F5E3EA; background: #FFFDFB; border-radius: 12px; padding: 3px 8px; font-size: 13px; display: flex; align-items: center; gap: 3px; }
.reaction-btn.mine { background: #FFE3EF; border-color: #FF7BA7; }
.reaction-count { font-size: 10px; color: #A88EA4; }

/* letter envelope open animation */
@keyframes envelopeOpen { from { transform: scale(0.9) rotateX(20deg); opacity: 0; } to { transform: scale(1) rotateX(0); opacity: 1; } }
.letter-open { animation: envelopeOpen 0.45s ease; }

/* vinyl spin for playing track */
@keyframes vinylSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.vinyl-spin { animation: vinylSpin 3.5s linear infinite; display: inline-block; }

/* My Space */

<script>
/* app.js — vanilla JS. Ulanmagan holatda hammasi faqat shu qurilmada (localStorage)
   ishlaydi; ulanganda (kod almashilgach) server orqali (/api/room/:code) haqiqiy
   umumiy maʼlumotga aylanadi — ikkalangiz bir xil xotira/musiqa/xat/vaqtni koʻrasiz. */

const D = window.APP_DATA;

function safeGet(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch (e) { return false; }
}
function esc(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
}
function uid(list) { return (list.reduce((m, x) => Math.max(m, x.id), 0) || 0) + 1; }
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
const MONTHS = ["Yan", "Fev", "Mar", "Apr", "May", "Iyun", "Iyul", "Avg", "Sen", "Okt", "Noy", "Dek"];
function formatDate(d) {
  if (!d) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(d);
  if (!m) return d;
  return `${parseInt(m[3], 10)} ${MONTHS[parseInt(m[2], 10) - 1]}`;
}
function withCommas(n) { return n.toLocaleString("en-US"); }
function daysTogether() {
  if (!state.meetDate) return null;
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(state.meetDate);
  if (!m) return null;
  const start = new Date(state.meetDate + "T00:00:00");
  const now = new Date();
  const diffMs = now - start;
  if (isNaN(diffMs)) return null;
  const days = Math.max(0, Math.floor(diffMs / 86400000));
  return { days, hours: days * 24, minutes: days * 24 * 60 };
}

const state = {
  tab: "home",
  screen: "main",
  onboardIdx: 0,

  gender: safeGet("couple_gender", null),
  myName: safeGet("couple_myname", ""),
  partnerName: safeGet("couple_partnername", ""),
  meetDate: safeGet("couple_meetdate", ""),
  greetingNickname: safeGet("couple_greeting_nickname", ""),
  myCode: safeGet("couple_mycode", null),
  partnerCodeEntered: safeGet("couple_partner_code_entered", ""),
  linked: safeGet("couple_linked", false),
  onboardSeen: safeGet("couple_onboard_seen", false),
  appStarted: safeGet("couple_app_started", false),

  profileTab: "pick", // pick | incoming | partnerAnswers
  showAnsweredIncoming: false,
  openStages: { 1: true },
  editingKey: null,
  draftSelected: [], // "Savol tanlash"da hali yuborilmagan tanlovlar
  qa: {}, // { [ismi]: { answers: {key:val}, selectedForPartner: [keys] } } — serverdan keladi

  // umumiy (linked bo'lsa serverdan sinxronlanadigan) kolleksiyalar
  memories: safeGet("couple_memories", D.memories),
  letters: safeGet("couple_letters", D.letters),
  tracks: safeGet("couple_tracks", D.tracks),
  timeline: safeGet("couple_timeline", D.timeline),
  plans: safeGet("couple_plans", D.plans),
  bucket: safeGet("couple_bucket", D.bucket),
  tasks: safeGet("couple_tasks", D.tasks),
  mapPins: safeGet("couple_map_pins", []),
  anniversaries: safeGet("couple_anniversaries", []),
  stages: safeGet("couple_custom_stages", null) || JSON.parse(JSON.stringify(D.stages)),
  editingQuestion: null, // { stageId, catTitle, idx }
  addingQuestionFor: null, // { stageId, catTitle }

  mySpaceTab: "dashboard", // dashboard | questions
  wishlist: safeGet("couple_wishlist", []),
  journal: safeGet("couple_journal_private", []), // MAHALLIY, HECH QACHON serverga jo'natilmaydi
  theme: safeGet("couple_theme", "Pastel Pink"),
  pin: safeGet("couple_pin", ""), // bo'sh = qulf o'chirilgan
  pinUnlocked: false,
  capsule: { date: null, doneBy: [] },
  streak: { lastDate: null, count: 0 },
  gardenCount: 0,
  ourStory: "",
  ourStoryLoading: false,

  memTab: "list", // list | map

  timeMode: "timeline",
  letterOpenId: null,
  memoryDetailId: null,
  memoryCarouselIndex: {},
  openFolders: {},
  editingItem: null,

  modal: null,
  newMemoryImages: [], // "Yangi xotira" formasida asta-sekin to'planadigan rasmlar
  syncNote: "", // qisqa holat xabari (masalan "saqlanmadi")
  linkError: "",
  isRecording: false,
  recordTarget: null, // 'new' | memory id
  newMemoryVoice: null,
};

let heroSlideTimer = null;
let heroRunning = false;
let heroImages = [];
let heroIdx = 0;
let roomPollTimer = null;
let pushInFlight = false;
let localVersion = 0;
let homeReminderLetterId = null;

function pickHomeReminderLetter() {
  if (!state.letters.length) { homeReminderLetterId = null; return; }
  const idx = Math.floor(Math.random() * state.letters.length);
  homeReminderLetterId = state.letters[idx].id;
}

/* ================= TELEGRAM IDENTITY (doimiylik uchun) ================= */

function tgUser() {
  try {
    return window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe
      ? window.Telegram.WebApp.initDataUnsafe.user : null;
  } catch (e) { return null; }
}

async function tryTelegramRecovery() {
  const u = tgUser();
  if (!u) return;
  try {
    const res = await fetch(`/api/identity/${u.id}`);
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.found && data.roomCode) {
      state.myCode = data.roomCode; safeSet("couple_mycode", state.myCode);
      if (data.name) { state.myName = data.name; safeSet("couple_myname", state.myName); }
      if (data.gender) { state.gender = data.gender; safeSet("couple_gender", state.gender); }
      state.onboardSeen = true; safeSet("couple_onboard_seen", true);
      state.appStarted = true; safeSet("couple_app_started", true);
      state.linked = true; safeSet("couple_linked", true);
    }
  } catch (e) { /* server yo'q yoki offline — jim davom etamiz */ }
}

async function registerIdentity() {
  const u = tgUser();
  const code = getRoomCode();
  if (!u || !code) return;
  try {
    await fetch("/api/identity", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tgId: u.id, roomCode: code, name: state.myName, gender: state.gender }),
    });
  } catch (e) { /* keyinroq urinamiz */ }
}

/* ================= ROOM (server bilan sinxronlash) ================= */

function getRoomCode() {
  // Kim boshqa birovning kodini kiritgan bo'lsa — o'sha kodga (o'sha xonaga) qo'shiladi.
  // Kod kiritmagan bo'lsa (masalan kodini ulashgan, kutayotgan tomon) — o'z xonasida qoladi.
  if (state.partnerCodeEntered) return state.partnerCodeEntered.trim();
  return state.myCode || null;
}

function roomSnapshot() {
  return {
    memories: state.memories, letters: state.letters, tracks: state.tracks,
    timeline: state.timeline, plans: state.plans, bucket: state.bucket, tasks: state.tasks,
    qa: state.qa, meetDate: state.meetDate, mapPins: state.mapPins, anniversaries: state.anniversaries,
    stages: state.stages, wishlist: state.wishlist, capsule: state.capsule, streak: state.streak,
    gardenCount: state.gardenCount,
  };
}

function applyRoomData(data) {
  // faol tahrirlash paytida ustidan yozib qo'ymaslik uchun ehtiyot chorasi
  if (state.modal || state.editingKey || state.editingItem) return;
  state.memories = data.memories || [];
  state.letters = data.letters || [];
  state.tracks = data.tracks || [];
  state.timeline = data.timeline || [];
  state.plans = data.plans || [];
  state.bucket = data.bucket || [];
  state.tasks = data.tasks || [];
  state.qa = data.qa || {};
  state.mapPins = data.mapPins || [];
  state.anniversaries = data.anniversaries || [];
  if (data.stages) state.stages = data.stages;
  state.wishlist = data.wishlist || [];
  state.capsule = data.capsule || { date: null, doneBy: [] };
  state.streak = data.streak || { lastDate: null, count: 0 };
  state.gardenCount = data.gardenCount || 0;
  if (data.meetDate) { state.meetDate = data.meetDate; safeSet("couple_meetdate", state.meetDate); }
  cacheLocally();
  render();
}

function cacheLocally() {
  safeSet("couple_memories", state.memories);
  safeSet("couple_letters", state.letters);
  safeSet("couple_tracks", state.tracks);
  safeSet("couple_timeline", state.timeline);
  safeSet("couple_plans", state.plans);
  safeSet("couple_bucket", state.bucket);
  safeSet("couple_tasks", state.tasks);
  safeSet("couple_qa", state.qa);
  safeSet("couple_map_pins", state.mapPins);
  safeSet("couple_anniversaries", state.anniversaries);
  safeSet("couple_custom_stages", state.stages);
  safeSet("couple_wishlist", state.wishlist);
  // Eslatma: couple_journal_private, couple_theme, couple_pin ATAYLAB bu yerda YO'Q —
  // ular hech qachon serverga jo'natilmaydi, faqat shu qurilmada qoladi.
}

async function fetchRoom() {
  const code = getRoomCode();
  if (!code) return;
  const versionAtStart = localVersion;
  try {
    const res = await fetch(`/api/room/${code}`);
    if (!res.ok) return;
    const data = await res.json();
    // Shu fetch boshlangandan beri mahalliy o'zgarish (qo'shish/o'chirish/tahrirlash) bo'lgan bo'lsa,
    // bu javob allaqachon eskirgan — uni qo'llasak, endigina qo'shilgan narsa bir zumga
    // yo'qolib ketardi. Shuning uchun bunday holatda e'tiborsiz qoldiramiz.
    if (localVersion !== versionAtStart) return;
    applyRoomData(data);
  } catch (e) { /* offline yoki server yo'q — mahalliy nusxa bilan davom etamiz */ }
}

async function pushRoom() {
  localVersion++;
  const code = getRoomCode();
  cacheLocally();
  if (!code) return;
  if (pushInFlight) return;
  pushInFlight = true;
  try {
    await fetch(`/api/room/${code}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(roomSnapshot()),
    });
  } catch (e) { /* server yo'q — keyingi urinishda qayta yuboriladi */ }
  pushInFlight = false;
}

function persistAll() { pushRoom(); }

function startRoomPolling() {
  clearInterval(roomPollTimer);
  if (!getRoomCode()) return;
  fetchRoom();
  roomPollTimer = setInterval(fetchRoom, 4000);
}

/* ---------- Daily Capsule / Streak / Garden ---------- */

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function dayOfYear() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}
function getTodayCapsule() {
  const pool = D.dailyCapsulePool;
  return pool[dayOfYear() % pool.length];
}
function ensureCapsuleFresh() {
  const today = todayStr();
  if (state.capsule.date !== today) {
    state.capsule = { date: today, doneBy: [] };
  }
}
function updateStreakOnOpen() {
  const today = todayStr();
  if (state.streak.lastDate === today) return; // bugun allaqachon hisoblangan
  const y = new Date(); y.setDate(y.getDate() - 1);
  const yesterday = `${y.getFullYear()}-${String(y.getMonth() + 1).padStart(2, "0")}-${String(y.getDate()).padStart(2, "0")}`;
  state.streak.count = state.streak.lastDate === yesterday ? state.streak.count + 1 : 1;
  state.streak.lastDate = today;
  pushRoom();
}

function ensureHeroSlideshow() {
  heroImages = allMemoryImages();
  const imgEl = document.getElementById("heroSlideImg");
  if (!imgEl) return;
  if (!heroImages.length) { imgEl.style.display = "none"; return; }
  imgEl.style.display = "";
  if (heroIdx >= heroImages.length) heroIdx = 0;
  // Har renderda joriy rasmni darhol chizamiz — bo'sh (yo'qolgandek) ko'rinish bo'lmasin.
  imgEl.src = heroImages[heroIdx];
  imgEl.classList.add("show");
  if (heroImages.length < 2) { clearInterval(heroSlideTimer); heroRunning = false; return; }
  if (heroRunning) return; // interval allaqachon ishlayapti — qayta boshlab, aylanishni uzmaymiz
  heroRunning = true;
  heroSlideTimer = setInterval(() => {
    heroImages = allMemoryImages();
    if (heroImages.length < 2) return;
    const el = document.getElementById("heroSlideImg");
    if (!el) return; // Home'dan boshqa joyga o'tilgan — keyingi safar to'xtatiladi
    el.classList.remove("show");
    setTimeout(() => {
      heroIdx = (heroIdx + 1) % heroImages.length;
      const el2 = document.getElementById("heroSlideImg");
      if (!el2) return;
      el2.src = heroImages[heroIdx];
      requestAnimationFrame(() => el2.classList.add("show"));
    }, 400);
  }, 4200);
}

function isLetterLocked(l) {
  if (!l.unlockDate) return false;
  if (l.unlockedEarly) return false;
  const unlock = new Date(l.unlockDate + "T00:00:00");
  return new Date() < unlock;
}
function isAuthor(item) { return !!(item.postedBy && item.postedBy === whoAmI()); }
function daysUntil(dateStr) {
  const target = new Date(dateStr + "T00:00:00");
  const now = new Date();
  return Math.max(0, Math.ceil((target - now) / 86400000));
}

        actionBlock = `<p style="font-size:10.5px;color:#A88EA4;margin-top:10px">Bu xat muddatidan oldin ochilmaydi.</p>`;
      } else if (author && opened.earlyUnlockRequested) {
        actionBlock = `<p style="font-size:12px;color:#5B445C;margin-top:10px">Sherigingiz bu xatni erta ochishni soʻrayapti.</p><button class="lock-unlock-btn" data-action="grantEarlyUnlock" data-id="${opened.id}">Ruxsat berish</button>`;
      } else if (author) {
        actionBlock = `<p style="font-size:10.5px;color:#A88EA4;margin-top:10px">Bu xatni faqat siz (yozgan kishi) erta ochishga ruxsat bera olasiz — sherigingiz soʻraguncha kuting.</p>`;
      } else if (opened.earlyUnlockRequested) {
        actionBlock = `<p style="font-size:12px;color:#8A6E80;margin-top:10px">Soʻrovingiz yuborildi — sherigingiz ruxsat berishini kutmoqdasiz.</p>`;
      } else {
        actionBlock = `<button class="lock-unlock-btn" data-action="requestEarlyUnlock" data-id="${opened.id}">Erta ochishni soʻrash</button>`;
      }
      return `
        <div class="screen">
          ${renderTopBar("Xatlar", { hasBack: true, backAction: "closeLetter" })}
          <div class="content">
            <div class="letter-locked">
              <div class="lock-icon">🔒</div>
              <p class="baloo" style="font-size:16px;color:#5B445C;margin:10px 0 4px">${esc(opened.title)}</p>
              <p style="font-size:12px;color:#8A6E80;margin:0">${formatDate(opened.unlockDate)}gacha qulflangan · ${daysUntil(opened.unlockDate)} kun qoldi</p>
              ${actionBlock}
            </div>
          </div>
        </div>`;
    }
    return `
      <div class="screen">
        ${renderTopBar("Xatlar", { hasBack: true, backAction: "closeLetter" })}
        <div class="content">
          <div class="letter-open">
            <p style="font-size:30px;margin:0 0 8px">${opened.mood}</p>
            <p class="baloo" style="font-size:17px;color:#5B445C;margin:0 0 4px">${esc(opened.title)}</p>
            <p style="font-size:11px;color:#A88EA4;margin:0 0 18px">${esc(formatDate(opened.date))}${opened.postedBy ? " · " + esc(opened.postedBy) + " yozgan" : ""}</p>
            <p style="font-size:13px;color:#7A5670;line-height:1.7;text-align:left;white-space:pre-wrap">${esc(opened.body)}</p>
          </div>
        </div>
      </div>`;
  }
  const rows = state.letters.map(l => {
    const locked = isLetterLocked(l);
    if (locked) {
      return `
        <div class="letter-row" data-action="openLetter" data-id="${l.id}" style="cursor:pointer">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:20px">🔒</div>
            <div>
              <p style="margin:0;font-size:13px;font-weight:500;color:#5B445C">${esc(l.title)}</p>
              <p style="margin:0;font-size:11px;color:#A88EA4">${daysUntil(l.unlockDate)} kun qoldi</p>
            </div>
          </div>
          <span class="lock-badge">🔒 qulflangan</span>
        </div>`;
    }
    return `
    <div class="letter-row">
      <div class="letter-row-main" data-action="openLetter" data-id="${l.id}">
        <div style="font-size:20px">✉️</div>
        <div>
          <p style="margin:0;font-size:13px;font-weight:500;color:#5B445C">${esc(l.title)}</p>
          <p style="margin:0;font-size:11px;color:#A88EA4">${esc(formatDate(l.date))}</p>
          ${posted(l)}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:16px">${l.mood}</span>
        <div class="row-actions">
          <button class="icon-btn" data-action="editLetter" data-id="${l.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteLetter" data-id="${l.id}">🗑</button>
        </div>
      </div>
    </div>`;
  }).join("");
  return `<div class="screen">${renderTopBar("Xatlar", { addAction: "openLetterForm" })}<div class="content">
    <p style="font-size:10.5px;color:#A88EA4;margin:0 0 12px">🔒 Qulflangan xatlar hech qachon oʻzi oʻchib ketmaydi — faqat muddati kelganda yoki sherigingiz roziligi bilan ochiladi.</p>
    ${rows || emptyState("Hali xat yoʻq. + tugmasi orqali yozing.")}</div></div>`;
}

/* ================= TIME (timeline / plans / bucket / tasks) ================= */

function renderFolderList(listKey, folders) {
  return folders.map(folder => {
    const open = !!state.openFolders[listKey + "-" + folder.id];
    const done = folder.items.filter(i => i.done).length;
    const itemsHtml = folder.items.map(item => {
      const editing = state.editingItem && state.editingItem.list === listKey && state.editingItem.folderId === folder.id && state.editingItem.itemId === item.id;
      if (editing) {
        return `
          <div class="bucket-row">
            <input class="form-input" style="flex:1" id="edit-item-input" value="${esc(item.text)}">
            <button class="icon-btn" data-action="saveItemEdit" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">✔</button>
            <button class="icon-btn" data-action="cancelItemEdit">✕</button>
          </div>`;
      }
      return `
        <div class="bucket-row">
          <div class="bucket-check ${item.done ? "done" : ""}" data-action="toggleItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">${item.done ? "✓" : ""}</div>
          <div style="flex:1">
            <p style="margin:0;font-size:13px;color:#5B445C;text-decoration:${item.done ? "line-through" : "none"};opacity:${item.done ? 0.55 : 1}">${esc(item.text)}</p>
            ${item.postedBy ? `<p style="margin:2px 0 0;font-size:10px;color:#C9A9BB">— ${esc(item.postedBy)} qoʻshgan</p>` : ""}
          </div>
          <div class="row-actions">
            <button class="icon-btn" data-action="editItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">✎</button>
            <button class="icon-btn danger" data-action="deleteItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">🗑</button>
          </div>
        </div>`;
    }).join("");
    return `
      <div class="folder-block">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="folder-head" style="flex:1" data-action="toggleFolder" data-list="${listKey}" data-folder="${folder.id}">
            <p class="folder-title">📁 ${esc(folder.title)}</p>
            <span class="folder-count">${done}/${folder.items.length}</span>
          </div>
          <button class="icon-btn danger" data-action="deleteFolder" data-list="${listKey}" data-folder="${folder.id}">🗑</button>
        </div>
        ${open ? `
          <div class="folder-body">
            ${itemsHtml || emptyState("Hali band yoʻq.")}
            <div class="add-item-row">
              <input type="text" placeholder="Yangi band..." id="newitem-${listKey}-${folder.id}">
              <button data-action="addItem" data-list="${listKey}" data-folder="${folder.id}">Qoʻsh</button>
            </div>
          </div>` : ""}
      </div>`;
  }).join("") + `<button class="add-folder-btn" data-action="addFolder" data-list="${listKey}">+ Yangi boʻlim</button>`;
}

function renderTasks() {
  const rows = state.tasks.map(t => `
    <div class="task-row ${t.done ? "done" : ""}">
      <p class="task-text">${esc(t.text)}</p>
      ${t.reward ? `<p class="task-reward">🎁 Mukofot: ${esc(t.reward)}</p>` : ""}
      ${t.assignedBy ? `<p style="margin:4px 0 0;font-size:10px;color:#C9A9BB">— ${esc(t.assignedBy)} bergan</p>` : ""}
      <div class="task-actions">
        <button class="task-done-btn ${t.done ? "completed" : ""}" data-action="toggleTask" data-id="${t.id}">${t.done ? "✓ Bajarildi" : "Bajarildim"}</button>
        <div class="row-actions">
          <button class="icon-btn" data-action="editTask" data-id="${t.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteTask" data-id="${t.id}">🗑</button>
        </div>
      </div>
      ${t.done ? `<p class="reward-pop">🎉 Tabriklaymiz — mukofotni his qiling!</p>` : ""}

function renderAnniversaries() {
  const sorted = state.anniversaries.slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const rows = sorted.map(a => {
    const days = a.date ? daysUntil(a.date) : null;
    return `
    <div class="anniv-row">
      <div class="anniv-badge">
        <span class="num">${days !== null ? (days === 0 ? "🎉" : days) : "—"}</span>
        <span class="lbl">${days === 0 ? "BUGUN" : "KUN"}</span>
      </div>
      <div style="flex:1">
        <p style="margin:0;font-size:13px;font-weight:500;color:#5B445C">${esc(a.type)}</p>
        <p style="margin:2px 0 0;font-size:11px;color:#8A6E80">${esc(formatDate(a.date))}${a.note ? " · " + esc(a.note) : ""}</p>
        ${a.postedBy ? `<p style="margin:2px 0 0;font-size:10px;color:#C9A9BB">— ${esc(a.postedBy)} qoʻshgan</p>` : ""}
      </div>
      <div class="row-actions">
        <button class="icon-btn" data-action="editAnniversary" data-id="${a.id}">✎</button>
        <button class="icon-btn danger" data-action="deleteAnniversary" data-id="${a.id}">🗑</button>
      </div>
    </div>`;
  }).join("");
  return rows || emptyState("Hali muhim sana yoʻq. + tugmasi orqali qoʻshing (birinchi uchrashuv, taklif, tugʻilgan kun va h.k.)");
}

function renderTime() {
  const modes = [
    { key: "timeline", label: "Xronologiya" },
    { key: "plans", label: "Rejalar" },
    { key: "bucket", label: "Orzular" },
    { key: "tasks", label: "Vazifalar" },
    { key: "anniv", label: "Sanalar" },
    { key: "story", label: "💖 Hikoyamiz" },
  ];
  const segBtns = modes.map(o => `<button class="${state.timeMode === o.key ? "active" : ""}" data-action="setTimeMode" data-mode="${o.key}">${o.label}</button>`).join("");

  let body = "";
  let addAction = null;
  if (state.timeMode === "timeline") {
    addAction = "openTimelineForm";
    body = `<div class="timeline">${state.timeline.map(m => `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div>
          <p style="margin:0;font-size:11px;color:#A88EA4">${esc(formatDate(m.date))}</p>
          <p style="margin:2px 0 0;font-size:13px;font-weight:500;color:#5B445C">${m.emoji} ${esc(m.title)}</p>
          ${m.postedBy ? `<p style="margin:2px 0 0;font-size:10px;color:#C9A9BB">— ${esc(m.postedBy)} qoʻshgan</p>` : ""}
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-action="editTimeline" data-id="${m.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteTimeline" data-id="${m.id}">🗑</button>
        </div>
      </div>`).join("") || emptyState("Hali voqea yoʻq.")}</div>`;
  } else if (state.timeMode === "plans") {
    body = renderFolderList("plans", state.plans);
  } else if (state.timeMode === "bucket") {
    body = renderFolderList("bucket", state.bucket);
  } else if (state.timeMode === "anniv") {
    addAction = "openAnniversaryForm";
    body = renderAnniversaries();
  } else if (state.timeMode === "story") {
    body = renderOurStory();
  } else {
    addAction = "openTaskForm";
    body = renderTasks();
  }

  return `
    <div class="screen">
      ${renderTopBar("Vaqt", { addAction })}
      <div class="content">
        <div class="segment">${segBtns}</div>
        ${body}
      </div>
    </div>`;
}

function renderOurStory() {

      ${state.ourStoryLoading

        : state.ourStory

/* ================= PROFILE (selective questions) ================= */

function questionKey(stageId, catTitle, q) { return `${stageId}-${catTitle}-${q}`; }

function renderPickTab() {
  const body = state.stages.map(stage => {
    const open = !!state.openStages[stage.id];
    const catsHtml = stage.categories.map(cat => `
      <div style="margin-bottom:10px">
        <p class="cat-title">${esc(cat.title)}</p>
        ${cat.questions.map((q, idx) => {
          const key = questionKey(stage.id, cat.title, q);
          const checked = state.draftSelected.includes(key);
          const editing = state.editingQuestion && state.editingQuestion.stageId === stage.id && state.editingQuestion.catTitle === cat.title && state.editingQuestion.idx === idx;
          if (editing) {
            return `
              <div class="q-row">
                <input class="form-input" id="edit-q-input" value="${esc(q)}">
                <div class="q-actions">
                  <button class="q-cancel" data-action="cancelEditQuestion">Bekor qilish</button>
                  <button class="q-save" data-action="saveEditQuestion" data-stage="${stage.id}" data-cat="${esc(cat.title)}" data-idx="${idx}">Saqlash</button>
                </div>
              </div>`;
          }
          return `
            <div class="q-row selectable">
              <div style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer" data-action="toggleSelect" data-key="${key}">
                <div class="q-checkbox ${checked ? "checked" : ""}">${checked ? "✓" : ""}</div>
                <p class="q-text">${esc(q)}</p>
              </div>
              <div class="row-actions">
                <button class="icon-btn" data-action="editQuestion" data-stage="${stage.id}" data-cat="${esc(cat.title)}" data-idx="${idx}">✎</button>
                <button class="icon-btn danger" data-action="deleteQuestion" data-stage="${stage.id}" data-cat="${esc(cat.title)}" data-idx="${idx}">🗑</button>
              </div>
            </div>`;
        }).join("")}
        ${state.addingQuestionFor && state.addingQuestionFor.stageId === stage.id && state.addingQuestionFor.catTitle === cat.title
          ? `<div class="add-item-row"><input type="text" id="new-question-input" placeholder="Yangi savol matni..."><button data-action="submitNewQuestion" data-stage="${stage.id}" data-cat="${esc(cat.title)}">Qoʻsh</button></div>`
          : `<button type="button" class="add-folder-btn" data-action="openAddQuestion" data-stage="${stage.id}" data-cat="${esc(cat.title)}" style="margin-top:6px">+ Savol qoʻshish</button>`}
      </div>`).join("");
    return `
      <div class="stage-block" style="background:${stage.sensitive ? "#F0EAFF" : "#FFEEE3"}">
        <div class="stage-head" data-action="toggleStage" data-stage="${stage.id}">
          <div>
            <p class="baloo" style="margin:0;font-size:14px;color:#5B445C">${esc(stage.label)} · ${esc(stage.title)}</p>
            <p style="margin:2px 0 0;font-size:11px;color:#8A6E80">${esc(stage.note)}</p>
          </div>
          <span style="font-size:12px;color:#A88EA4;display:inline-block;transform:${open ? "rotate(180deg)" : "none"}">⌄</span>
        </div>
        ${open ? `<div class="stage-body">${catsHtml}</div>` : ""}
      </div>`;
  }).join("");
  const changed = JSON.stringify([...state.draftSelected].sort()) !== JSON.stringify([...myQA().selectedForPartner].sort());
  return `
    <p style="font-size:12px;color:#8A6E80;margin:0 0 4px">Sherigingizga bilishni xohlagan savollaringizni belgilang, keyin pastdagi tugma bilan yuboring.</p>
    <p style="font-size:10.5px;color:#A88EA4;margin:0 0 12px">✎ — matnini tahrirlash, 🗑 — butunlay oʻchirish, "+ Savol qoʻshish" — oʻzingizniki qoʻshish. Eslatma: savol matnini oʻzgartirsangiz, unga avval berilgan javob koʻrinishdan yoʻqolishi mumkin.</p>
    ${changed ? `<div class="link-badge pending" style="width:100%;box-sizing:border-box;justify-content:center">⚠️ Oʻzgartirildi — hali yuborilmagan</div>` : ""}
    ${body}
    <button class="primary-btn" data-action="sendSelected" style="margin-top:8px">${changed ? "Tanlanganlarni yuborish" : "✓ Yuborilgan"}</button>`;
}

function renderIncomingTab() {
  const pq = partnerQA();
  const incomingKeys = pq ? pq.selectedForPartner : [];
  const rows = [];
  let answeredCount = 0;
  state.stages.forEach(stage => {
    stage.categories.forEach(cat => {
      cat.questions.forEach(q => {
        const key = questionKey(stage.id, cat.title, q);
        if (!incomingKeys.includes(key)) return;
        const answer = myQA().answers[key];
        if (answer) answeredCount++;
        if (answer && !state.showAnsweredIncoming) return; // javob berilganini yashiramiz
        if (state.editingKey === key) {
          rows.push(`
            <div class="q-row">
              <p class="q-text">${esc(q)}</p>
              <textarea class="q-textarea" rows="2" id="edit-${key}">${esc(answer || "")}</textarea>
              <div class="q-actions">
                <button class="q-cancel" data-action="cancelEdit">Bekor qilish</button>
                <button class="q-save" data-action="saveAnswer" data-key="${key}">Saqlash</button>
              </div>
            </div>`);
        } else {
          rows.push(`
            <div class="q-row">
              <p class="q-text">${esc(q)}</p>
              <div data-action="editAnswer" data-key="${key}">
                ${answer ? `<p class="q-answer">✓ ${esc(answer)}</p>` : `<p class="q-placeholder">Javob berish uchun bosing…</p>`}
              </div>
            </div>`);
        }
      });

  });

    ? `<p style="font-size:11px;color:#E85D8F;text-decoration:underline;cursor:pointer;margin:0 0 10px" data-action="toggleShowAnswered">${state.showAnsweredIncoming ? "Javob berilganlarni yashirish" : `Javob berilgan ${answeredCount} tasini ko'rsatish`}</p>`
    : "";
  return rows.length || toggle
    ? `<p style="font-size:12px;color:#8A6E80;margin:0 0 12px">Sherigingiz sizdan shu savollarni soʻragan:</p>${toggle}${rows.join("") || emptyState("Barchasiga javob berdingiz! 🎉")}`
    : emptyState("Hozircha sherigingiz sizdan hech narsa soʻramagan.");
}

function renderPartnerAnswersTab() {
  const sentKeys = myQA().selectedForPartner;

        rows.push(`
          <div class="q-row">

  return rows.length

}

function zodiacFromDate(dateStr) {
  if (!dateStr) return "";
  const m = /^\d{4}-(\d{2})-(\d{2})$/.exec(dateStr);
  if (!m) return "";
  const mo = parseInt(m[1], 10), d = parseInt(m[2], 10);
  const signs = [
    [20,"♑ Uloq"],[19,"♒ Dolvon"],[21,"♓ Baliq"],[20,"♈ Qo'chqor"],[21,"♉ Ho'kiz"],
    [21,"♊ Egizak"],[23,"♋ Qisqichbaqa"],[23,"♌ Arslon"],[23,"♍ Sunbula"],[23,"♎ Tarozi"],
    [22,"♏ Chayon"],[22,"♐ Kamon"],[20,"♑ Uloq"],
  ];
  return d <= signs[mo - 1][0] ? signs[mo - 1][1] : signs[mo][1];
}

/* ================= HELPERS ================= */

function readFilesAsDataUrls(files, cb) {
  const arr = Array.from(files);
  if (!arr.length) { cb([]); return; }
  let remaining = arr.length;
  const results = new Array(arr.length);
  arr.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = () => { results[idx] = reader.result; remaining--; if (remaining === 0) cb(results); };
    reader.readAsDataURL(file);
  });
}
function readFileAsDataUrl(file, cb) {
  const reader = new FileReader();
  reader.onload = () => cb(reader.result);
  reader.readAsDataURL(file);
}
function whoAmI() { return state.myName || "Siz"; }

/* ---------- mikrofon orqali ovoz yozish ---------- */
let activeMediaRecorder = null;
let activeRecordedChunks = [];
let activeStream = null;

function startVoiceRecording(target, onDone) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Bu qurilma/brauzer mikrofon yozishni qo'llamaydi.");
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    activeStream = stream;
    activeRecordedChunks = [];
    activeMediaRecorder = new MediaRecorder(stream);
    activeMediaRecorder.ondataavailable = e => { if (e.data.size > 0) activeRecordedChunks.push(e.data); };
    activeMediaRecorder.onstop = () => {
      const blob = new Blob(activeRecordedChunks, { type: "audio/webm" });
      const reader = new FileReader();
      reader.onload = () => onDone(reader.result);
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    activeMediaRecorder.start();
    state.isRecording = true; state.recordTarget = target; render();
  }).catch(() => alert("Mikrofonga ruxsat berilmadi."));
}
function stopVoiceRecording() {
  if (activeMediaRecorder && activeMediaRecorder.state !== "inactive") activeMediaRecorder.stop();
  state.isRecording = false; state.recordTarget = null;
}

function resetContentToZero() {
  state.memories = [];

  state.tracks = [];
  state.timeline = [];
  state.plans = [];
  state.bucket = [];
  state.tasks = [];
  state.qa = {};
  state.draftSelected = [];
}

    }
    else if (action === "editItem") { state.editingItem = { list: el.dataset.list, folderId: Number(el.dataset.folder), itemId: Number(el.dataset.item) }; render(); }
    else if (action === "cancelItemEdit") { state.editingItem = null; render(); }
    else if (action === "saveItemEdit") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const input = document.getElementById("edit-item-input");
      const item = state[list].find(f => f.id === folderId).items.find(i => i.id === itemId);
      if (input && input.value.trim()) item.text = input.value.trim();
      state.editingItem = null; persistAll(); render();
    }
    else if (action === "deleteItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const folder = state[list].find(f => f.id === folderId);
      folder.items = folder.items.filter(i => i.id !== itemId);
      persistAll(); render();
    }

    // ---- tasks ----
    else if (action === "openTaskForm") { state.modal = { type: "taskForm" }; render(); }
    else if (action === "editTask") { state.modal = { type: "taskForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTask") { state.tasks = state.tasks.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "toggleTask") { const t = state.tasks.find(x => x.id === Number(el.dataset.id)); t.done = !t.done; persistAll(); render(); }
    else if (action === "submitTask") {
      const text = document.getElementById("tk-text").value.trim();
      const reward = document.getElementById("tk-reward").value.trim();
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const t = state.tasks.find(x => x.id === editId); t.text = text || t.text; t.reward = reward; }
      else if (text) state.tasks.push({ id: uid(state.tasks), text, reward, assignedBy: whoAmI(), done: false });
      persistAll(); state.modal = null; render();
    }

    // ---- memory / letter / track / timeline modals ----
    else if (action === "openMemoryForm") { state.modal = { type: "memoryForm" }; state.newMemoryImages = []; render(); }
    else if (action === "deleteProfile") {
      const ok = window.confirm("Profilingiz butunlay o'chiriladi (ism, kod, ulanish holati). Ilova 0 dan qaytadan boshlanadi. Bu qaytarib bo'lmaydi. Davom etamizmi?");
      if (ok) {
        [
          "couple_gender", "couple_myname", "couple_partnername", "couple_meetdate", "couple_greeting_nickname",
          "couple_mycode", "couple_partner_code_entered", "couple_linked", "couple_onboard_seen", "couple_app_started",
          "couple_link_skipped", "couple_memories", "couple_letters", "couple_tracks", "couple_timeline",
          "couple_plans", "couple_bucket", "couple_tasks", "couple_qa",
        ].forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });
        location.reload();
      }
    }
    else if (action === "requestEarlyUnlock") {
      const l = state.letters.find(x => x.id === Number(el.dataset.id));
      if (l) { l.earlyUnlockRequested = true; persistAll(); }
      render();
    }
    else if (action === "grantEarlyUnlock") {
      const l = state.letters.find(x => x.id === Number(el.dataset.id));
      if (l) { l.unlockedEarly = true; persistAll(); }
      render();
    }
    else if (action === "openLetterForm") { state.modal = { type: "letterForm" }; render(); }
    else if (action === "editLetter") { state.modal = { type: "letterForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteLetter") { state.letters = state.letters.filter(l => l.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "openTrackForm") { state.modal = { type: "trackForm" }; render(); }
    else if (action === "editTrack") { state.modal = { type: "trackForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTrack") { state.tracks = state.tracks.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "openTimelineForm") { state.modal = { type: "timelineForm" }; render(); }
    else if (action === "editTimeline") { state.modal = { type: "timelineForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTimeline") { state.timeline = state.timeline.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "deleteMemory") { state.memories = state.memories.filter(m => m.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "startRecordExisting") {
      const id = Number(el.dataset.id);
      startVoiceRecording(id, (dataUrl) => {
        const m = state.memories.find(x => x.id === id);
        if (m) { m.voice = dataUrl; persistAll(); }
        render();
      });
    }
    else if (action === "stopRecordExisting") { stopVoiceRecording(); render(); }
    else if (action === "startRecordNew") { startVoiceRecording("new", (dataUrl) => { state.newMemoryVoice = dataUrl; render(); }); }
    else if (action === "stopRecordNew") { stopVoiceRecording(); render(); }
    else if (action === "clearNewVoice") { state.newMemoryVoice = null; render(); }
    else if (action === "removeNewMemoryImage") {
      state.newMemoryImages.splice(Number(el.dataset.idx), 1);
      render();
    }
    else if (action === "deleteMemoryImage") {
      const id = Number(el.dataset.id), idx = Number(el.dataset.idx);
      const m = state.memories.find(x => x.id === id);
      m.images.splice(idx, 1);
      const cur = state.memoryCarouselIndex[id] || 0;
      if (cur >= m.images.length) state.memoryCarouselIndex[id] = Math.max(0, m.images.length - 1);
      persistAll(); render();
    }
    else if (action === "submitMapPin") {
      const label = document.getElementById("mp-label").value.trim();
      if (label) {
        state.mapPins.push({ id: uid(state.mapPins), label, x: Number(el.dataset.x), y: Number(el.dataset.y), postedBy: whoAmI() });
        persistAll();
      }
      state.modal = null; render();
    }
    else if (action === "openAnniversaryForm") { state.modal = { type: "anniversaryForm" }; render(); }
    else if (action === "editAnniversary") { state.modal = { type: "anniversaryForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteAnniversary") { state.anniversaries = state.anniversaries.filter(a => a.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "submitAnniversary") {
      const type = document.getElementById("an-type").value;
      const date = document.getElementById("an-date").value;
      const note = document.getElementById("an-note").value.trim();
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const a = state.anniversaries.find(x => x.id === editId); a.type = type; a.date = date; a.note = note; }
      else if (date) state.anniversaries.push({ id: uid(state.anniversaries), type, date, note, postedBy: whoAmI() });
      persistAll(); state.modal = null; render();
    }
    else if (action === "closeModal") { state.modal = null; render(); }

    else if (action === "submitMemory") {
      const title = document.getElementById("mf-title").value.trim();
      const kind = document.getElementById("mf-kind").value;
      const date = document.getElementById("mf-date").value;
      const emoji = document.getElementById("mf-emoji").value.trim() || "☕️";
      const note = document.getElementById("mf-note").value.trim();
      const voiceInput = document.getElementById("mf-voice");
      const colors = ["#FFE3EF", "#ECE5FF", "#FFF2DD", "#D8F5E8"];
      const finish = (voiceDataUrl) => {
        state.memories.push({ id: uid(state.memories), title: title || "Yangi xotira", kind, date, emoji, color: colors[state.memories.length % colors.length], note, voice: voiceDataUrl || null, images: state.newMemoryImages.slice(), postedBy: whoAmI() });
        state.newMemoryImages = []; state.newMemoryVoice = null;
        persistAll();
        state.modal = null; render();
      };
      if (state.newMemoryVoice) finish(state.newMemoryVoice);
      else if (voiceInput.files && voiceInput.files[0]) readFileAsDataUrl(voiceInput.files[0], finish);
      else finish(null);
    }
    else if (action === "submitLetter") {
      const title = document.getElementById("lf-title").value.trim();
      const date = document.getElementById("lf-date").value;
      const mood = document.getElementById("lf-mood").value.trim() || "🥰";
      const body = document.getElementById("lf-body").value.trim();
      const unlockDate = document.getElementById("lf-unlock").value;
      const allowEarlyUnlock = document.getElementById("lf-allow-early").checked;
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) {
        const l = state.letters.find(x => x.id === editId);
        l.title = title || l.title; l.date = date || l.date; l.mood = mood; l.body = body;
        l.unlockDate = unlockDate || null; l.allowEarlyUnlock = allowEarlyUnlock;
      } else {
        state.letters.push({ id: uid(state.letters), title: title || "Yangi xat", date, mood, body, unlockDate: unlockDate || null, allowEarlyUnlock, unlockedEarly: false, postedBy: whoAmI() });
      }
      persistAll(); state.modal = null; render();
    }
    else if (action === "submitTrack") {
      const title = document.getElementById("tf-title").value.trim();
      const story = document.getElementById("tf-story").value.trim();
      const link = document.getElementById("tf-link").value.trim();
      const audioInput = document.getElementById("tf-audio");
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      const finish = (audioDataUrl) => {
        if (editId) {
          const t = state.tracks.find(x => x.id === editId);
          t.title = title || t.title; t.story = story; t.link = link;
          if (audioDataUrl) t.audio = audioDataUrl;
        } else {
          state.tracks.push({ id: uid(state.tracks), title: title || "Yangi qoʻshiq", story, link, audio: audioDataUrl || null, postedBy: whoAmI() });
        }
        persistAll(); state.modal = null; render();
      };
      if (audioInput.files && audioInput.files[0]) readFileAsDataUrl(audioInput.files[0], finish);
      else finish(null);
    }
    else if (action === "submitTimeline") {
      const title = document.getElementById("tl-title").value.trim();
      const date = document.getElementById("tl-date").value;
      const emoji = document.getElementById("tl-emoji").value.trim() || "🎉";
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const t = state.timeline.find(x => x.id === editId); t.title = title || t.title; t.date = date || t.date; t.emoji = emoji; }
      else state.timeline.push({ id: uid(state.timeline), title: title || "Yangi voqea", date, emoji, postedBy: whoAmI() });
      persistAll(); state.modal = null; render();
    }
    else if (action === "saveMemoryDetail") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      m.note = document.getElementById("memNoteInput").value;
      persistAll();
      state.screen = "main"; render();
    }
  });

  app.addEventListener("change", e => {
    const el = e.target;
    if (el.id === "mf-image" && el.files && el.files.length) {
      readFilesAsDataUrls(el.files, (newImages) => {
        state.newMemoryImages = state.newMemoryImages.concat(newImages);
        el.value = ""; // xuddi shu fayllarni ikki marta qo'shib yubormaslik uchun
        render();
      });
      return;
    }
    if (el.dataset.action === "memVoiceSelected") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      if (el.files && el.files[0]) {
        readFileAsDataUrl(el.files[0], (dataUrl) => { m.voice = dataUrl; persistAll(); render(); });
      }
      return;
    }
    if (el.dataset.action === "memImageSelected") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      if (el.files && el.files.length) {
        readFilesAsDataUrls(el.files, (newImages) => {
          m.images = (m.images || []).concat(newImages);
          persistAll(); render();
        });
      }
    }
  });

  render();
});

</script>
<script>
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  if (tg.themeParams && tg.themeParams.bg_color) document.body.style.background = tg.themeParams.bg_color;
}
</script>
</body>
</html>
