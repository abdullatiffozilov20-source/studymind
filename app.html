<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyMind</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0f17;--bg2:#161823;--card:#1c1e2e;--card2:#222438;
  --p:#6c63ff;--p2:#8b84ff;--pl:rgba(108,99,255,0.15);
  --teal:#00c896;--tl:rgba(0,200,150,0.12);
  --red:#ff4757;--rl:rgba(255,71,87,0.12);
  --amber:#ffa502;--al:rgba(255,165,2,0.12);
  --blue:#1e90ff;--bl:rgba(30,144,255,0.12);
  --text:#f0f2ff;--t2:#8892b0;--t3:#3d4468;
  --b:rgba(255,255,255,0.06);--b2:rgba(108,99,255,0.25);
  --fn:'Inter',system-ui,sans-serif;--mono:'SF Mono',monospace;
  --r:18px;--r2:12px;
  --sh:0 2px 12px rgba(0,0,0,0.3);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fn);font-size:15px}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth}
#scroll::-webkit-scrollbar{display:none}

/* ── NAV ── */
#nav{flex-shrink:0;background:rgba(14,15,23,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b);padding:8px 0 max(10px,env(safe-area-inset-bottom));display:flex;position:relative;z-index:50}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:var(--fn);color:var(--t3);padding:2px 0;transition:color 0.2s}
.nb.on{color:var(--p)}
.nb .ni{font-size:24px;line-height:1;transition:transform 0.2s}
.nb.on .ni{transform:scale(1.1)}
.nb .nl{font-size:10px;font-weight:600;letter-spacing:0.01em}
.nb-wrap{position:relative}
.nb-dot{width:6px;height:6px;border-radius:50%;background:var(--red);position:absolute;top:-1px;right:-3px}

/* ── HEADER ── */
.hdr{padding:16px 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--b)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-left{flex:1;min-width:0}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-0.03em}
.hdr-sub{font-size:12px;color:var(--t2);margin-top:2px}
.hdr-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--teal));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;overflow:hidden;flex-shrink:0;border:2px solid var(--b2)}
.hdr-av img{width:100%;height:100%;object-fit:cover}

/* ── XP BAR ── */
.xp-strip{height:2px;background:var(--b);overflow:hidden}
.xp-strip-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--teal));transition:width 1.2s ease}

/* ── SECTION ── */
.sec{padding:14px 14px 0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-action{font-size:11px;font-weight:600;color:var(--p);text-transform:none;letter-spacing:0;cursor:pointer}

/* ── STREAK ── */
.streak-pill{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(255,149,0,0.2),rgba(255,107,0,0.15));border:1px solid rgba(255,149,0,0.3);border-radius:14px;padding:10px 14px;margin:14px 14px 0}
.streak-fire{font-size:28px;line-height:1}
.streak-num{font-size:24px;font-weight:800;letter-spacing:-0.03em;color:#ff9f43}
.streak-text{font-size:12px;color:var(--t2);line-height:1.4}

/* ── QUOTE ── */
.quote-box{margin:10px 14px;background:linear-gradient(135deg,rgba(108,99,255,0.18),rgba(0,200,150,0.1));border:1px solid var(--b2);border-radius:var(--r);padding:14px 14px 10px;position:relative}
.quote-text{font-size:13px;font-style:italic;line-height:1.6;color:var(--text);margin-bottom:8px}
.quote-author{font-size:11px;color:var(--t2)}
.quote-save{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.1);border:none;border-radius:8px;padding:4px 8px;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fn)}

/* ── METRIC GRID ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 14px 0}
.mc{background:var(--card);border:1px solid var(--b);border-radius:var(--r2);padding:12px 14px}
.mc-val{font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1;margin-bottom:4px}
.mc-label{font-size:11px;color:var(--t2);font-weight:500}

/* ── AI BUBBLE ── */
.ai-pill{margin:10px 14px;background:var(--pl);border-left:3px solid var(--p);border-radius:0 12px 12px 0;padding:10px 12px;font-size:13px;line-height:1.6;color:var(--text)}

/* ── SUBJECTS ── */
.sc{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;transition:transform 0.15s}
.sc:active{transform:scale(0.98)}
.sc-accent{height:3px}
.sc-body{padding:12px 14px}
.sc-row1{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sc-emoji{font-size:24px;flex-shrink:0}
.sc-name{font-size:16px;font-weight:700;flex:1}
.sc-avg{font-size:22px;font-weight:800;font-family:var(--mono)}
.sc-bar-track{height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-bottom:6px}
.sc-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.sc-row2{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:10px}
.sc-btns{display:flex;gap:6px}
.scb{flex:1;background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:7px 4px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fn);color:var(--t2);text-align:center;transition:all 0.15s}
.scb.p{background:var(--pl);border-color:var(--b2);color:var(--p)}
.scb.r{background:var(--rl);border-color:rgba(255,71,87,0.3);color:var(--red)}

/* ── SCHEDULE ── */
.sched-seg{display:flex;gap:0;margin:0 14px 10px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--b)}
.sseg{flex:1;background:none;border:none;border-radius:9px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);color:var(--t2);transition:all 0.2s}
.sseg.on{background:var(--p);color:white}
.scat-row{display:flex;gap:6px;margin:0 14px 8px;overflow-x:auto;padding-bottom:2px}
.scat-row::-webkit-scrollbar{display:none}
.scat{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fn);color:var(--t2);white-space:nowrap;transition:all 0.15s}
.scat.on{background:var(--pl);border-color:var(--b2);color:var(--p)}
.si-list{margin:0 14px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.si{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b)}
.si:last-child{border-bottom:none}
.si-em{font-size:20px;flex-shrink:0}
.si-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s}
.si-check.done{background:var(--teal);border-color:var(--teal);color:var(--bg)}
.si-check.life{border-color:var(--amber)}
.si-check.life.done{background:var(--amber);border-color:var(--amber);color:var(--bg)}
.si-info{flex:1;min-width:0}
.si-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-title.done{text-decoration:line-through;color:var(--t2)}
.si-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.si-cat{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px}
.si-cat.study{background:var(--pl);color:var(--p)}
.si-cat.life{background:var(--al);color:var(--amber)}
.si-rep{font-size:10px;color:var(--t3);background:var(--bg2);padding:1px 5px;border-radius:4px}
.si-time{font-size:12px;font-weight:700;color:var(--p);font-family:var(--mono);flex-shrink:0}
.si-del{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}

/* ── AI CHAT ── */
.chat-shell{display:flex;flex-direction:column;height:calc(100dvh - 56px);background:var(--bg)}
.chat-header{padding:12px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.chat-hinfo{display:flex;align-items:center;gap:10px}
.chat-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-name{font-size:15px;font-weight:700}
.chat-status{font-size:11px;color:var(--teal);display:flex;align-items:center;gap:4px;margin-top:1px}
.chat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.mic-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all 0.2s;flex-shrink:0}
.mic-btn.rec{background:var(--red);border-color:var(--red);animation:mic-pulse 1s infinite}
@keyframes mic-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.chat-tools{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0}
.chat-tools::-webkit-scrollbar{display:none}
.ct{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--fn);flex-shrink:0;transition:all 0.15s}
.ct:active{background:var(--pl);color:var(--p);border-color:var(--b2)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat-msgs::-webkit-scrollbar{display:none}
.cm{max-width:86%;animation:cm-in 0.2s ease}
@keyframes cm-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cm.u{align-self:flex-end}
.cm.a{align-self:flex-start}
.cmb{padding:10px 14px;font-size:14px;line-height:1.6;border-radius:18px}
.cm.u .cmb{background:var(--p);color:white;border-radius:18px 4px 18px 18px}
.cm.a .cmb{background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px}
.cmt{font-size:10px;color:var(--t3);margin-top:3px;padding:0 4px}
.cm.u .cmt{text-align:right}
.cm-tag{background:var(--tl);border-radius:6px;padding:4px 8px;margin-top:5px;font-size:11px;color:var(--teal)}
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px;width:fit-content;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-area{background:var(--bg);border-top:1px solid var(--b);padding:8px 12px calc(8px + env(safe-area-inset-bottom));flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;background:var(--card);border:1px solid var(--b);border-radius:24px;padding:8px 8px 8px 14px;transition:border-color 0.2s}
.chat-input-row:focus-within{border-color:var(--b2)}
.ci{flex:1;background:none;border:none;font-size:14px;font-family:var(--fn);color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.5;min-height:22px}
.ci::placeholder{color:var(--t3)}
.send-btn{background:var(--p);border:none;width:36px;height:36px;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.2s}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ── FLASHCARD ── */
.fc-shell{padding:0 14px}
.fc-card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:30px 20px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin-bottom:10px;box-shadow:var(--sh)}
.fc-card.rev{background:linear-gradient(135deg,rgba(0,200,150,0.1),rgba(0,200,150,0.05));border-color:rgba(0,200,150,0.3)}
.fc-front{font-size:17px;font-weight:600;line-height:1.5;color:var(--text)}
.fc-back{font-size:15px;color:var(--teal);margin-top:12px;font-weight:500;line-height:1.5}
.fc-hint{font-size:12px;color:var(--t3);margin-top:10px}
.fc-prog{text-align:center;font-size:12px;color:var(--t2);margin-bottom:8px}
.fc-topic{text-align:center;font-size:11px;color:var(--t3);margin-bottom:12px;background:var(--card);border-radius:20px;padding:3px 10px;display:inline-block}
.fc-rating{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.fr{border:none;border-radius:12px;padding:11px 0;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:all 0.15s}
.fr:active{transform:scale(0.94)}
.fr.a{background:var(--rl);color:var(--red)}
.fr.h{background:var(--al);color:var(--amber)}
.fr.g{background:var(--pl);color:var(--p)}
.fr.e{background:var(--tl);color:var(--teal)}

/* ── NOTES ── */
.note-card{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;border-left:3px solid var(--p)}
.note-body{padding:12px 14px}
.note-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.note-title{font-size:14px;font-weight:700;flex:1;margin-right:8px}
.note-actions{display:flex;gap:6px;flex-shrink:0}
.note-btn{background:none;border:none;color:var(--t2);cursor:pointer;font-size:15px;padding:2px}
.note-content{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:8px}
.note-footer{display:flex;justify-content:space-between;align-items:center}
.note-date{font-size:11px;color:var(--t3)}
.note-tags{display:flex;gap:4px;flex-wrap:wrap}
.note-tag{background:var(--pl);color:var(--p);font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600}

/* ── MORE ── */
.ins-chip{display:inline-flex;font-size:12px;padding:4px 10px;border-radius:100px;margin:2px;font-weight:500}
.ins-s{background:var(--tl);color:var(--teal)}
.ins-w{background:var(--rl);color:var(--red)}
.ins-r{background:var(--pl);color:var(--p)}

/* ── WEEKLY CHART ── */
.wchart{display:flex;align-items:flex-end;gap:5px;height:72px;padding:0 2px}
.wc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wb{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height 1s ease}
.wl{font-size:10px;color:var(--t3)}

/* ── URGENT ── */
.urgent{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.2);border-radius:var(--r2);margin:0 14px 8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.urgent-info{}
.urgent-name{font-size:13px;font-weight:700}
.urgent-days{font-size:11px;color:var(--red);margin-top:1px}

/* ── FORMS & MODAL ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.field input,.field select,.field textarea{width:100%;background:var(--card);border:1px solid var(--b);border-radius:10px;color:var(--text);padding:12px 14px;font-size:14px;font-family:var(--fn);outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--b2)}
.seg-pick{display:flex;background:var(--card);border:1px solid var(--b);border-radius:10px;padding:3px;gap:2px}
.sp{flex:1;background:none;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fn);color:var(--t2);transition:all 0.15s}
.sp.on{background:var(--p);color:white}
.emoji-g{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.eo{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:6px;text-align:center;font-size:20px;cursor:pointer;transition:all 0.12s}
.eo.sel{border-color:var(--p);background:var(--pl)}
.clrs{display:flex;gap:8px;flex-wrap:wrap}
.co{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.co.sel{border-color:var(--text);transform:scale(1.12)}
.repeat-days{display:flex;gap:6px;flex-wrap:wrap}
.rd{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--t2);transition:all 0.15s}
.rd.on{background:var(--p);border-color:var(--p);color:white}
.btn{padding:13px 16px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);display:block;text-align:center;width:100%;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--p);color:white}
.btn-s{background:var(--card);color:var(--t2);border:1px solid var(--b);margin-top:8px}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--fn);transition:all 0.15s}
.btn-sm:active{transform:scale(0.95)}
.btn-sm.p{background:var(--p);color:white}
.btn-sm.s{background:var(--card);color:var(--t2);border:1px solid var(--b)}
.btn-sm.t{background:var(--tl);color:var(--teal)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes modal-in{from{transform:translateY(100%)}to{transform:none}}
.modal::-webkit-scrollbar{display:none}
.modal-inner{padding:0 16px calc(24px + env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;background:var(--b);border-radius:2px;margin:14px auto 18px}
.mt{font-size:18px;font-weight:800;margin-bottom:18px;letter-spacing:-0.02em}

/* ── LOGIN ── */
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.lc{background:var(--card);border:1px solid var(--b);border-radius:24px;padding:36px 24px;width:100%;max-width:380px;box-shadow:var(--sh);text-align:center}
.l-logo{font-size:52px;margin-bottom:14px}
.l-title{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
.l-title span{background:linear-gradient(135deg,var(--p),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.l-sub{color:var(--t2);font-size:13px;margin-bottom:32px;line-height:1.65;max-width:280px;margin-left:auto;margin-right:auto}
.l-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);margin-bottom:8px;text-decoration:none;border:none;transition:all 0.2s}

.empty-i{font-size:44px;margin-bottom:12px}
.dv{border:none;border-top:1px solid var(--b);margin:8px 0}
.card-box{margin:0 14px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tag-chip{display:inline-flex;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
.tc-p{background:var(--pl);color:var(--p)}
.tc-t{background:var(--tl);color:var(--teal)}
.tc-r{background:var(--rl);color:var(--red)}
.space{height:20px}

/* ── WHEEL PICKER ── */
.wp-wrap{position:relative;height:180px;overflow:hidden;margin:0 -16px}
.wp-track{overflow-y:scroll;height:180px;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:72px 0}
.wp-track::-webkit-scrollbar{display:none}
.wp-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--t2);transition:all 0.2s;cursor:pointer}
.wp-item.sel{color:var(--text);font-size:18px;font-weight:700}
.wp-overlay{position:absolute;inset:0;pointer-events:none}
.wp-overlay::before{content:'';position:absolute;top:0;left:0;right:0;height:72px;background:linear-gradient(to bottom,var(--bg2),transparent)}
.wp-overlay::after{content:'';position:absolute;bottom:0;left:0;right:0;height:72px;background:linear-gradient(to top,var(--bg2),transparent)}
.wp-line{position:absolute;top:50%;left:10%;right:10%;height:36px;margin-top:-18px;border-top:1px solid var(--b2);border-bottom:1px solid var(--b2);pointer-events:none}

function t(k){const lang=S.user?.lang||'uz';return(I18N[lang]||I18N.uz)[k]||k}

// ── STATE ──────────────────────────────────────────────────────────
let S={
  user:null,subjects:[],stats:null,tab:'home',
  chatMsgs:[],aiLoading:false,
  flashcards:[],fcIdx:0,fcRev:false,
  schedule:[],schedTab:'today',schedCat:'all',
  notes:[],insights:[],quote:null,
  modal:null,editNote:null,
  ns:{name:'',emoji:'📚',color:'#6c63ff',examDate:''},
  nsc:{title:'',category:'study',subjectName:'',time:'',date:'',repeat:'none',repeatDays:[],emoji:'📌'},
  nn:{title:'',content:'',subjectName:'',color:'#6c63ff'},
  fcTopic:'',isRecording:false,recognition:null,
}

const EMOJIS=['📚','📐','🔬','📖','🌍','🎨','💻','🎵','🧪','🧮','📝','🏛','🌱','⚗','🔭','🗺','🎯','💡']
const COLORS=['#6c63ff','#00c896','#ff4757','#ffa502','#1e90ff','#7c3aed','#ff6b81','#2ed573']

const DAYS_SHORT=['Du','Se','Ch','Pa','Ju','Sh','Ya']

const req=async(m,p,b)=>{const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});if(!r.ok)throw new Error(await r.text());return r.json()}
const GET=p=>req('GET',p),POST=(p,b)=>req('POST',p,b),PUT=(p,b)=>req('PUT',p,b)
const PATCH=(p,b)=>req('PATCH',p,b),DEL=p=>req('DELETE',p)
const today=()=>new Date().toISOString().split('T')[0]
const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})

async function init(){
  if(tg?.initDataUnsafe?.user){
    const u=tg.initDataUnsafe.user
    try{await POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username})}catch{}
  }
  try{S.user=await GET('/api/user');await loadAll();render()}catch{renderLogin()}
}

async function loadAll(){
  const[a,b,c,d,e,f,g]=await Promise.all([
    GET('/api/subjects'),GET('/api/stats'),GET('/api/flashcards?dueOnly=true'),
    GET('/api/chat'),GET('/api/schedule?date='+today()),GET('/api/notes'),GET('/api/quote')
  ])
  S.subjects=a;S.stats=b;S.flashcards=c;S.fcIdx=0;S.fcRev=false
  S.chatMsgs=d.map(m=>({role:m.role,content:m.content,time:''}))
  S.schedule=e;S.notes=f;S.quote=g
}

// ── RENDER ─────────────────────────────────────────────────────────
function render(){
  if(!S.user){renderLogin();return}
  document.getElementById('root').innerHTML=shell()+nav()+(S.modal?modal():'')
  afterRender()
}

function shell(){
  if(S.tab==='ai') return chatShell()
  const u=S.user,xp=nxtLvl(u?.level||1),pct=Math.min(100,Math.round(((u?.xp||0)/xp)*100))
  const h=new Date().getHours()
  const gr=h<12?t('greeting_m'):h<17?t('greeting_d'):t('greeting_e')
  const subtitles={home:`Lv.${u?.level} · ${u?.xp}xp · 🔥${u?.streak}`,garden:`🌿 ${S.gardenLevel||0}/7 daraja · 🔥${u?.streak} kun`,schedule:`${S.schedCat==='all'?t('all_cat'):S.schedCat==='study'?t('study_type'):t('life_type')} — ${today()}`,notes:`${S.notes.length} ${t('notes').toLowerCase()}`,more:`${S.subjects.length} fan · ${S.stats?.dueCards||0} karta`}
  const titles={home:`${gr}, ${u?.name?.split(' ')[0]}!`,garden:t('garden_tab'),schedule:t('schedule'),notes:t('notes'),more:t('more')}
  const init=(u?.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
  return`<div id="app">
    <div class="hdr">
      <div class="hdr-row">
        <div class="hdr-left">
          <div class="hdr-title">${titles[S.tab]||''}</div>
          <div class="hdr-sub">${subtitles[S.tab]||''}</div>
        </div>
        <div class="hdr-av" onclick="openModal('settings')">${u?.avatar?`<img src="${u.avatar}">`:init}</div>
      </div>
    </div>
    <div class="xp-strip"><div class="xp-strip-fill" style="width:${pct}%"></div></div>
    <div id="scroll">${pageCnt()}</div>
  </div>`
}

function nav(){
  const TABS=[{id:'home',i:'🏠',l:t('home')},{id:'ai',i:'🧠',l:t('ai')},{id:'garden',i:'🌿',l:t('garden_tab')},{id:'notes',i:'📝',l:t('notes')},{id:'more',i:'···',l:t('more')}]
  const due=S.stats?.dueCards||0
  return`<nav id="nav">${TABS.map(tb=>`<button class="nb ${S.tab===tb.id?'on':''}" onclick="switchTab('${tb.id}')"><div class="nb-wrap"><span class="ni">${tb.i}</span>${tb.id==='more'&&due?`<span class="nb-dot"></span>`:''}</div><span class="nl">${tb.l}</span></button>`).join('')}</nav>`
}

function pageCnt(){
  switch(S.tab){case'home':return homePage();case'schedule':return schedulePage();case'notes':return notesPage();case'garden':return typeof gardenPage==='function'?gardenPage():'';case'more':return morePage()}
  return''
}

function renderLogin(){
  document.getElementById('root').innerHTML=`<div class="lp"><div class="lc">
    <div class="l-logo">🧠</div>
    <div class="l-title">Study<span>Mind</span></div>
    <p class="l-sub">Aqlli o'quv assistentingiz. AI bilan gaplash — baho, reja, tahlil hammasi avtomatik.</p>
    <a href="/auth/google" class="l-btn l-g"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Google bilan kirish</a>
    <div class="l-or">yoki</div>
    <button class="l-btn l-t" onclick="loginTG()"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.012 9.486c-.148.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.48 14.6l-2.95-.924c-.64-.2-.654-.64.135-.948l11.52-4.44c.533-.194 1 .13.377.96z"/></svg>Telegram bilan kirish</button>
  </div></div>`
}

function loginTG(){
  if(tg?.initDataUnsafe?.user){const u=tg.initDataUnsafe.user;POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username}).then(()=>init()).catch(()=>alert('Xatolik'))}
  else alert('Telegram ichida ishlaydi.')
}

// ── HOME PAGE ─────────────────────────────────────────────────────
function homePage(){
  const s=S.stats,u=S.user,w=s?.weekly||[],mx=Math.max(...w.map(d=>d.tasks),1)
  const avgG=()=>{const ss=s?.subjects?.filter(x=>x.avgGrade>0)||[];return ss.length?Math.round(ss.reduce((a,x)=>a+x.avgGrade,0)/ss.length)||'—':'—'}
  return`
    ${s?.urgentSubjects?.map(x=>`<div class="urgent"><div class="urgent-info"><div class="urgent-name">⚠️ ${x.emoji}${x.name} — imtihon!</div><div class="urgent-days">${Math.ceil((new Date(x.examDate)-new Date())/86400000)} kun qoldi</div></div></div>`).join('')||''}
    <div class="streak-pill"><span class="streak-fire">🔥</span><div><div style="display:flex;align-items:baseline;gap:6px"><span class="streak-num">${u?.streak||0}</span><span style="font-size:14px;font-weight:700">${t('streak_text')}</span></div></div></div>
    ${S.quote?`<div class="quote-box"><div class="quote-text">"${S.quote.text}"</div><div class="quote-author">— ${S.quote.author}</div><button class="quote-save" onclick="saveQuote()">💾</button></div>`:''}
    <div class="mgrid">
      <div class="mc"><div class="mc-val" style="color:var(--p)">${avgG()}</div><div class="mc-label">${t('avg_grade')}</div></div>
      <div class="mc"><div class="mc-val" style="color:var(--teal)">${u?.totalStudyMinutes||0}</div><div class="mc-label">${t('study_min')}</div></div>
      <div class="mc"><div class="mc-val" style="color:var(--amber)">${s?.doneTasks||0}/${s?.todayTasks||0}</div><div class="mc-label">${t('today_tasks')}</div></div>
      <div class="mc"><div class="mc-val" style="color:var(--red)">${s?.dueCards||0}</div><div class="mc-label">${t('cards')}</div></div>
    </div>
    ${s?.lastInsight?.summary?`<div class="ai-pill">${s.lastInsight.summary}</div>`:`<div class="ai-pill">🧠 ${t('ai_welcome').split('\n')[0]}</div>`}
    <div class="sec">
      <div class="sec-title">📈 Haftalik reja</div>
      <div class="card-box"><div class="wchart">${w.map((d,i)=>{const h=Math.max(3,Math.round((d.tasks/mx)*64));const dp=d.tasks>0?Math.round((d.done/d.tasks)*100):0;return`<div class="wc"><div class="wb" style="height:${h}px;background:${dp>=80?'var(--teal)':dp>=50?'var(--p)':'var(--card2)'}"></div><div class="wl">${DAYS_SHORT[i]}</div></div>`}).join('')}</div></div>
    </div>
    <div class="sec">
      <div class="sec-title">📅 Bugungi reja <span class="sec-action" onclick="switchTab('schedule')">Barchasi →</span></div>
      <div class="si-list">
        ${S.schedule.slice(0,4).map(x=>siHtml(x)).join('')||`<div style="padding:16px;text-align:center;font-size:13px;color:var(--t2)">${t('no_plan')}</div>`}
        <div style="padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--b)">
          <button class="btn-sm p" onclick="genPlan()">${t('ai_plan')}</button>
          <button class="btn-sm s" onclick="openModal('addSchedule')">${t('add_task')}</button>
        </div>
      </div>
    </div>
    <div class="space"></div>`
}

function siHtml(x){
  return`<div class="si">
    <span class="si-em">${x.emoji||'📌'}</span>
    <div class="si-check ${x.isDone?'done':''} ${x.category==='life'?'life':''}" onclick="toggleSched('${x._id}',${!x.isDone})">${x.isDone?'✓':''}</div>
    <div class="si-info">
      <div class="si-title ${x.isDone?'done':''}">${x.title}</div>
      <div class="si-meta">
        <span class="si-cat ${x.category}">${x.category==='study'?t('study_type'):t('life_type')}</span>
        ${x.subjectName?`<span style="font-size:10px;color:var(--t2)">${x.subjectName}</span>`:''}
        ${x.repeat&&x.repeat!=='none'?`<span class="si-rep">${x.repeat==='daily'?t('daily'):'↩'}</span>`:''}
      </div>
    </div>
    ${x.time?`<div class="si-time">${x.time}</div>`:''}
    <button class="si-del" onclick="delSched('${x._id}')">×</button>
  </div>`
}

// ── SCHEDULE PAGE ─────────────────────────────────────────────────
function schedulePage(){
  const filtered=S.schedule.filter(x=>S.schedCat==='all'||x.category===S.schedCat)
  return`
    <div class="sec" style="padding-top:14px">
      <div class="sched-seg">
        <button class="sseg ${S.schedTab==='today'?'on':''}" onclick="S.schedTab='today';loadSchedule()">${t('today_tab')}</button>
        <button class="sseg ${S.schedTab==='templates'?'on':''}" onclick="S.schedTab='templates';loadSchedule()">${t('templates_tab')}</button>
      </div>
    </div>
    <div class="scat-row">
      <button class="scat ${S.schedCat==='all'?'on':''}" onclick="S.schedCat='all';render()">${t('all_cat')}</button>
      <button class="scat ${S.schedCat==='study'?'on':''}" onclick="S.schedCat='study';render()">📚 ${t('study_type')}</button>

      ${filtered.map(x=>siHtml(x)).join('')||`<div class="empty"><div class="empty-i">📅</div><div>${t('no_plan')}</div></div>`}

// ── ACTIONS ───────────────────────────────────────────────────────
function switchTab(tb){S.tab=tb;render();document.getElementById('scroll')?.scrollTo({top:0,behavior:'smooth'})}
function openModal(t,d){S.modal=t;S.modalData=d;if(t==='addSubject')S.ns={name:'',emoji:'📚',color:'#6c63ff',examDate:''};if(t==='addSchedule')S.nsc={title:'',category:'study',subjectName:'',time:'',date:today(),repeat:'none',repeatDays:[],emoji:'📌'};if(t==='addNote')S.nn={title:'',content:'',subjectName:'',color:'#6c63ff'};render();if(t==='fcTopic'){setTimeout(()=>{const el=document.getElementById(`fc-cnt-5`);if(el)el.classList.add('on')},100)}}
function closeModal(){S.modal=null;S.editNote=null;render()}
function toggleRD(i){const idx=S.nsc.repeatDays.indexOf(i);if(idx>=0)S.nsc.repeatDays.splice(idx,1);else S.nsc.repeatDays.push(i);render()}
let fcCount=5
function setFCCount(n){fcCount=n;document.querySelectorAll('.sp[id^=fc-cnt]').forEach(el=>el.classList.remove('on'));const el=document.getElementById(`fc-cnt-${n}`);if(el)el.classList.add('on')}

async function saveSubject(){if(!S.ns.name.trim())return alert('Fan nomi kiriting');try{S.subjects.push(await POST('/api/subjects',S.ns));closeModal()}catch(e){alert(e.message)}}
async function delSubject(id){if(!confirm('O\'chirilsinmi?'))return;await DEL('/api/subjects/'+id);S.subjects=S.subjects.filter(s=>s._id!==id);render()}

async function saveSched(){if(!S.nsc.title)return alert('Nomi kiriting');const s=await POST('/api/schedule',S.nsc);S.schedule.push(s);closeModal()}
async function toggleSched(id,done){await PATCH('/api/schedule/'+id,{isDone:done});const s=S.schedule.find(s=>s._id===id);if(s)s.isDone=done;render()}
async function delSched(id){await DEL('/api/schedule/'+id);S.schedule=S.schedule.filter(s=>s._id!==id);render()}
async function loadSchedule(){
  const url=S.schedTab==='templates'?'/api/schedule?templates=true':'/api/schedule?date='+today()
  try{S.schedule=await GET(url);render()}catch{}
}
async function genPlan(){
  const topic=prompt('Mavzu yoki fan? (bo\'sh qoldirsa umumiy reja)')
  toast('⏳ AI reja tuzmoqda...')
  try{const res=await POST('/api/chat/daily-plan',{topic:topic||''});S.schedule=[...S.schedule,...res.schedule];render();toast(`✅ ${res.schedule.length} ta vazifa!`)}catch{toast('❌ Xatolik')}
}

async function saveNote(){const n=await POST('/api/notes',S.nn);S.notes.unshift(n);closeModal()}
async function saveQuickNote(){
  const content=document.getElementById('qn-text')?.value
  const subjectName=document.getElementById('qn-subj')?.options[document.getElementById('qn-subj')?.selectedIndex]?.text||''
  if(!content?.trim())return alert('Matn kiriting')
  const n=await POST('/api/notes',{title:content.slice(0,50)+'...',content,subjectName:subjectName==='—'?'':subjectName})
  S.notes.unshift(n);closeModal();toast('✅ Saqlandi!')
}
function editNote(id){S.editNote=S.notes.find(n=>n._id===id);openModal('noteEdit')}
async function updateNote(id){
  const title=document.getElementById('en-title')?.value
  const content=document.getElementById('en-content')?.value
  const n=await PUT('/api/notes/'+id,{title,content})
  const idx=S.notes.findIndex(x=>x._id===id);if(idx>=0)S.notes[idx]=n;closeModal()
}
async function delNote(id){if(!confirm('O\'chirilsinmi?'))return;await DEL('/api/notes/'+id);S.notes=S.notes.filter(n=>n._id!==id);render()}
async function summarizeNote(id){
  const n=S.notes.find(x=>x._id===id);if(!n?.content)return alert('Kontent yo\'q')
  toast('⏳ AI xulosa...')
  const{summary}=await POST('/api/notes/summarize',{content:n.content})
  alert('📝 Xulosa:\n\n'+summary)
}

function revFC(){S.fcRev=true;render()}
async function reviewFC(q){
  const c=S.flashcards[S.fcIdx];if(!c)return
  await POST('/api/flashcards/'+c._id+'/review',{quality:q})
  S.fcIdx++;S.fcRev=false
  if(S.fcIdx>=S.flashcards.length){S.flashcards=await GET('/api/flashcards?dueOnly=true');S.fcIdx=0}
  render()
}
async function genFCByTopic(){
  const topic=document.getElementById('fc-topic-inp')?.value
  const subjectId=document.getElementById('fc-subj')?.value
  if(!topic?.trim())return alert('Mavzu kiriting')
  closeModal();toast('⏳ AI karta yaratmoqda...')
  try{
    const{cards,topic:tp}=await POST('/api/chat/flashcard',{subjectId,topic,count:fcCount})
    S.flashcards=await GET('/api/flashcards?dueOnly=true');S.fcIdx=0;S.fcRev=false
    toast(`✅ "${tp}" — ${cards.length} ta karta!`);S.tab='more';render()
  }catch{toast('❌ Xatolik')}
}

async function sendChat(){
  const inp=document.getElementById('ci'),msg=inp?.value?.trim()
  if(!msg||S.aiLoading)return
  S.chatMsgs.push({role:'user',content:msg,time:now()});inp.value='';if(inp)inp.style.height='auto'
  S.aiLoading=true;render();scrollChat()
  try{
    const res=await POST('/api/chat',{message:msg})
    S.chatMsgs.push({role:'assistant',content:res.reply,time:now()})
    if(res.savedSchedule)S.schedule.push(res.savedSchedule)
    if(res.savedCards?.length){S.flashcards=await GET('/api/flashcards?dueOnly=true');S.fcIdx=0;S.fcRev=false}
    S.stats=await GET('/api/stats');S.subjects=await GET('/api/subjects')
    S.quote=await GET('/api/quote')
  }catch{S.chatMsgs.push({role:'assistant',content:'❌ Xatolik. Qayta urinib koring.',time:now()})}
  S.aiLoading=false;render();scrollChat()
}

function qp(text){const inp=document.getElementById('ci');if(inp)inp.value=text;sendChat()}
function qpGo(text){S.tab='ai';render();setTimeout(()=>qp(text),100)}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}
function autosize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){toast('❌ Chrome yoki Safari ishlatng');return}
  if(S.isRecording){if(S.recognition){S.recognition.stop();S.recognition=null};S.isRecording=false;render();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  S.recognition=new SR()
  S.recognition.lang=S.user?.lang==='ru'?'ru-RU':S.user?.lang==='en'?'en-US':'uz-UZ'
  S.recognition.continuous=true;S.recognition.interimResults=true
  S.recognition.onresult=e=>{
    let final='',interim=''
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript
      else interim+=e.results[i][0].transcript
    }
    const inp=document.getElementById('ci')
    if(inp&&(final||interim)){inp.value=final||interim;autosize(inp)}
    if(final){S.isRecording=false;if(S.recognition){S.recognition.stop();S.recognition=null};render();setTimeout(()=>sendChat(),400)}
  }
  S.recognition.onerror=e=>{toast('❌ Xato: '+e.error);S.isRecording=false;S.recognition=null;render()}
  S.recognition.onend=()=>{if(S.isRecording){S.isRecording=false;render()}}
  try{S.recognition.start();S.isRecording=true;render();toast('🎤 Gapiring...')}catch{toast('❌ Mikrofon ishlamadi')}
}

async function saveQuote(){
  if(!S.quote)return
  try{await POST('/api/user/save-quote',S.quote);S.user.savedQuotes=S.user.savedQuotes||[];S.user.savedQuotes.push(S.quote);S.quote=await GET('/api/quote');toast('💾 Saqlandi!');render()}catch{toast('❌ Xatolik')}
}
async function genInsight(){toast('⏳ Tahlil...');try{S.insights=[await POST('/api/chat/insight',{})];render()}catch{toast('❌ Xatolik')}}
async function changeLang(lang){await upd('lang',lang);S.user.lang=lang;S.quote=await GET('/api/quote');render()}
async function upd(f,v){try{await PUT('/api/user',{[f]:v});S.user[f]=v}catch{}}
async function logout(){await POST('/auth/logout');location.reload()}

function nxtLvl(l){const tx=[0,100,250,500,900,1400,2000,2800,3800,5000];return tx[l]||5000+(l-9)*1500}
function scrollChat(){setTimeout(()=>{const e=document.getElementById('cm');if(e)e.scrollTop=e.scrollHeight},60)}
function toast(msg){document.querySelectorAll('.toast').forEach(e=>e.remove());const e=document.createElement('div');e.className='toast';e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(30,30,46,0.95);color:white;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)';e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
function afterRender(){if(S.tab==='ai')scrollChat()}

const _sw=switchTab
window.switchTab=async function(tb){
  S.tab=tb
  if(tb==='more'&&!S.insights.length){try{S.insights=await GET('/api/insights')}catch{}}
  if(tb==='schedule')await loadSchedule()
  if(tb==='notes'){try{S.notes=await GET('/api/notes')}catch{}}
  render();document.getElementById('scroll')?.scrollTo({top:0,behavior:'smooth'})
}
init()

<script>
// Garden patch - override pageCnt and add garden support
const _origPageCnt = window.pageCnt || null

// Add garden_tab to i18n
Object.keys(I18N).forEach(lang => { I18N[lang].garden_tab = lang==='uz'?'Bog\'':lang==='ru'?'Сад':'Garden' })

// Override pageCnt
window.pageCnt = function() {
  switch(S.tab){
    case'home':return homePage()
    case'schedule':return schedulePage()
    case'notes':return notesPage()
    case'garden':return gardenPage()
    case'more':return morePage()
  }
  return ''
}

// Override subtitles/titles
const _origShell = window.stdPage || null
window.stdPage = function() {
  const u=S.user,xp=nxtLvl(u?.level||1),pct=Math.min(100,Math.round(((u?.xp||0)/xp)*100))
  const h=new Date().getHours()
  const gr=h<12?t('greeting_m'):h<17?t('greeting_d'):t('greeting_e')
  const subtitles={
    home:`Lv.${u?.level} · ${u?.xp}xp · 🔥${u?.streak}`,
    schedule:`${today()}`,
    notes:`${S.notes.length} ta eslatma`,
    garden:`${gardenName(S.gardenLevel||0)} · Streak ${S.user?.streak||0}`,
    more:`${S.subjects.length} fan · ${S.stats?.dueCards||0} karta`
  }
  const titles={
    home:`${gr}, ${u?.name?.split(' ')[0]}!`,
    schedule:t('schedule'),
    notes:t('notes'),
    garden:`🌿 ${t('garden_tab')}`,
    more:t('more')
  }
  const init=(u?.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
  return`<div class="hdr"><div class="hdr-row"><div><div class="hdr-title">${titles[S.tab]||''}</div><div class="hdr-sub">${subtitles[S.tab]||''}</div></div><div class="hdr-av" onclick="openModal('settings')">${u?.avatar?`<img src="${u.avatar}">`:init}</div></div></div><div class="xp-strip"><div class="xp-strip-fill" style="width:${pct}%"></div></div><div id="scroll">${window.pageCnt()}</div>`
}

// Garden state
S.gardenLevel = 0

function gardenName(level) {
  const uz=['Urug\'','Ko\'chat','Nihal','Daraxt','Bog\'','Gullagan','Mukammal','Jannat']
  return uz[Math.min(level,7)]
}

function gardenEmoji(level) {
  return ['🌱','🌿','🌳','🌲','🏡','🌸','🌺','🌈'][Math.min(level,7)]
}

// Garden SVG scenes per level
function gardenSVG(level, streak, xp, avgGrade) {
  const w=340, h=260

  // Sky gradient based on level
  const skies = [
    ['#0d0f1a','#1a1535'], // 0 - gece
    ['#1a2a4a','#2d4a7a'], // 1 - alacakaranlık
    ['#1e3a6e','#3a5fa0'], // 2 - akşam
    ['#1a4a8a','#4a7ab0'], // 3 - gündüz
    ['#2060a0','#5a9acf'], // 4 - aydınlık
    ['#2876b0','#6aaad4'], // 5 - parlak
    ['#3090c0','#80c0e0'], // 6 - güneşli
    ['#40a8d0','#90d4f0'], // 7 - cennet
  ]
  const sky = skies[Math.min(level,7)]

  // Ground
  const grounds = ['#1a1535','#1e3a1a','#1e4a1a','#1e5a1a','#2a6a1a','#3a7a2a','#4a8a3a','#5a9a4a']
  const ground = grounds[Math.min(level,7)]

  let scene = ''

  // Stars (low levels)
  if(level < 2) {
    for(let i=0;i<20;i++) {
      const sx=20+Math.random()*300, sy=10+Math.random()*80
      scene += `<circle cx="${sx.toFixed(0)}" cy="${sy.toFixed(0)}" r="${(0.5+Math.random()).toFixed(1)}" fill="white" opacity="${(0.3+Math.random()*0.7).toFixed(1)}"><animate attributeName="opacity" values="${(0.2+Math.random()*0.3).toFixed(1)};${(0.7+Math.random()*0.3).toFixed(1)};${(0.2+Math.random()*0.3).toFixed(1)}" dur="${(2+Math.random()*2).toFixed(1)}s" repeatCount="indefinite"/></circle>`
    }
  }

  // Sun (high levels)
  if(level >= 3) {
    const sunOpacity = Math.min(1, (level-2)*0.25)
    scene += `<circle cx="280" cy="40" r="28" fill="#ffd700" opacity="${sunOpacity.toFixed(2)}"><animate attributeName="r" values="26;30;26" dur="4s" repeatCount="indefinite"/></circle>`
    scene += `<circle cx="280" cy="40" r="38" fill="#ffd700" opacity="${(sunOpacity*0.3).toFixed(2)}"><animate attributeName="r" values="36;42;36" dur="4s" repeatCount="indefinite"/></circle>`
  }

  // Rainbow (max level)
  if(level >= 6) {
    scene += `<path d="M20 160 Q170 60 320 160" fill="none" stroke="#ff0000" stroke-width="4" opacity="0.4"/>`
    scene += `<path d="M20 165 Q170 65 320 165" fill="none" stroke="#ff8800" stroke-width="4" opacity="0.4"/>`
    scene += `<path d="M20 170 Q170 70 320 170" fill="none" stroke="#ffff00" stroke-width="4" opacity="0.35"/>`
    scene += `<path d="M20 175 Q170 75 320 175" fill="none" stroke="#00cc00" stroke-width="4" opacity="0.4"/>`
    scene += `<path d="M20 180 Q170 80 320 180" fill="none" stroke="#0088ff" stroke-width="4" opacity="0.4"/>`
  }

  // Clouds (mid+ levels)
  if(level >= 2) {
    scene += `<g opacity="0.7"><ellipse cx="80" cy="60" rx="35" ry="18" fill="#c8d8f0"/><ellipse cx="105" cy="52" rx="28" ry="20" fill="#d5e5f5"/><ellipse cx="55" cy="55" rx="22" ry="14" fill="#d0e0f0"/></g>`
    scene += `<animateTransform attributeName="transform" type="translate" values="0 0;15 0;0 0" dur="10s" repeatCount="indefinite" xlink:href="#cloud1"/>`
  }

  // Ground
  scene += `<rect x="0" y="185" width="${w}" height="75" fill="${ground}" rx="0"/>`

  // Grass
  scene += `<path d="M0 192 Q20 180 40 192 Q60 180 80 192 Q100 180 120 192 Q140 180 160 192 Q180 180 200 192 Q220 180 240 192 Q260 180 280 192 Q300 180 320 192 Q340 180 ${w} 192 L${w} 260 L0 260 Z" fill="${level>=4?'#5a9a4a':level>=2?'#3a7a2a':'#2a5a20'}"/>`

  // Trees based on level
  if(level === 0) {
    // Urug'
    scene += `<ellipse cx="170" cy="200" rx="12" ry="6" fill="#8B6914"/>`
    scene += `<ellipse cx="170" cy="198" rx="8" ry="5" fill="#A0522D"/>`
    scene += `<text x="170" y="196" text-anchor="middle" font-size="16">🌱</text>`
    // Crack
    scene += `<path d="M165 200 Q170 190 175 200" fill="none" stroke="#654321" stroke-width="1.5" opacity="0.6"/>`

  } else if(level === 1) {
    // Ko'chat
    scene += `<rect x="168" y="175" width="4" height="20" fill="#6B4423"/>`
    scene += `<ellipse cx="170" cy="168" rx="18" ry="14" fill="#3a7a2a"/>`
    scene += `<ellipse cx="162" cy="172" rx="10" ry="8" fill="#4a8a3a"/>`
    scene += `<ellipse cx="178" cy="172" rx="10" ry="8" fill="#4a8a3a"/>`

  } else if(level === 2) {
    // Nihal
    scene += `<rect x="165" y="155" width="10" height="40" fill="#8B5E3C"/>`
    scene += `<ellipse cx="170" cy="148" rx="30" ry="22" fill="#2d6b2d"/>`
    scene += `<ellipse cx="155" cy="158" rx="18" ry="14" fill="#3a7a3a"/>`
    scene += `<ellipse cx="185" cy="158" rx="18" ry="14" fill="#3a7a3a"/>`
    scene += `<ellipse cx="170" cy="138" rx="20" ry="16" fill="#4a8a4a"/>`

  } else if(level === 3) {
    // Katta daraxt
    scene += `<rect x="160" y="130" width="20" height="60" fill="#8B5E3C"/>`
    scene += `<ellipse cx="170" cy="118" rx="45" ry="35" fill="#2a5f2a"/>`
    scene += `<ellipse cx="145" cy="130" rx="28" ry="22" fill="#356035"/>`
    scene += `<ellipse cx="195" cy="130" rx="28" ry="22" fill="#356035"/>`
    scene += `<ellipse cx="170" cy="100" rx="32" ry="26" fill="#4a7a4a"/>`
    // Branches
    scene += `<line x1="160" y1="150" x2="135" y2="135" stroke="#7a4a23" stroke-width="5"/>`
    scene += `<line x1="180" y1="150" x2="205" y2="135" stroke="#7a4a23" stroke-width="5"/>`

  } else if(level === 4) {
    // Bog' — daraxt + gul
    // Main tree
    scene += `<rect x="148" y="120" width="24" height="70" fill="#8B5E3C"/>`
    scene += `<ellipse cx="160" cy="105" rx="50" ry="40" fill="#2a5f2a"/>`
    scene += `<ellipse cx="135" cy="118" rx="32" ry="25" fill="#357535"/>`
    scene += `<ellipse cx="185" cy="118" rx="32" ry="25" fill="#357535"/>`
    scene += `<ellipse cx="160" cy="88" rx="36" ry="30" fill="#4a8a4a"/>`
    // Small tree right
    scene += `<rect x="238" y="165" width="10" height="25" fill="#8B5E3C"/>`
    scene += `<ellipse cx="243" cy="158" rx="22" ry="18" fill="#3a7a3a"/>`
    // Flowers
    scene += `<circle cx="90" cy="188" r="5" fill="#ff69b4"/><circle cx="90" cy="188" r="2" fill="#ffd700"/>`
    scene += `<circle cx="105" cy="185" r="5" fill="#ff69b4"/><circle cx="105" cy="185" r="2" fill="#ffd700"/>`
    scene += `<circle cx="95" cy="184" r="4" fill="#ff1493"/><circle cx="95" cy="184" r="2" fill="#ffd700"/>`
    // Butterfly
    scene += `<text x="200" y="160" font-size="14"><animate attributeName="x" values="195;215;195" dur="3s" repeatCount="indefinite"/>🦋</text>`

  } else if(level >= 5) {
    // Gullagan / Mukammal bog'
    // Big tree
    scene += `<rect x="138" y="110" width="28" height="80" fill="#6B4423"/>`
    scene += `<ellipse cx="152" cy="92" rx="58" ry="48" fill="#1a5f1a"/>`
    scene += `<ellipse cx="124" cy="108" rx="36" ry="30" fill="#2a7a2a"/>`
    scene += `<ellipse cx="180" cy="108" rx="36" ry="30" fill="#2a7a2a"/>`
    scene += `<ellipse cx="152" cy="72" rx="42" ry="36" fill="#3a8a3a"/>`
    // Cherry blossom effect
    scene += `<ellipse cx="152" cy="92" rx="58" ry="48" fill="#ff69b4" opacity="0.25"/>`
    // Two side trees
    scene += `<rect x="62" y="155" width="12" height="35" fill="#8B5E3C"/>`
    scene += `<ellipse cx="68" cy="145" rx="26" ry="22" fill="#2a6a2a"/><ellipse cx="68" cy="145" rx="26" ry="22" fill="#ff69b4" opacity="0.3"/>`
    scene += `<rect x="252" y="148" width="14" height="42" fill="#8B5E3C"/>`
    scene += `<ellipse cx="259" cy="136" rx="28" ry="24" fill="#2a6a2a"/><ellipse cx="259" cy="136" rx="28" ry="24" fill="#ff69b4" opacity="0.3"/>`
    // Flowers everywhere
    for(let i=0;i<6;i++) {
      const fx=30+i*50, fy=185+Math.sin(i)*3
      scene += `<circle cx="${fx}" cy="${fy}" r="5" fill="${['#ff69b4','#ff1493','#da70d6'][i%3]}"/><circle cx="${fx}" cy="${fy}" r="2" fill="#ffd700"/>`
    }
    // Birds (high levels)
    if(level>=6) scene += `<text x="50" y="80" font-size="12">🐦</text><text x="240" y="70" font-size="12">🐦</text>`
    // Butterflies
    scene += `<text font-size="13"><animateMotion dur="6s" repeatCount="indefinite" path="M 100 150 Q 150 120 200 150 Q 250 180 300 150"/>🦋</animateMotion></text>`
  }

  // Pet based on streak
  let petX = 50, petY = 192
  let pet = ''
  if(streak < 3) {
    pet = `<text x="${petX}" y="${petY}" font-size="20">🐣</text>`
  } else if(streak < 10) {
    pet = `<text x="${petX}" y="${petY}" font-size="22">🐱</text>`
  } else if(streak < 30) {
    pet = `<text x="${petX}" y="${petY}" font-size="24">🦊</text>`
  } else {
    pet = `<text x="${petX}" y="${petY}" font-size="26">🦁</text>`
  }
  scene += pet

  // Mood indicator
  const mood = streak===0?'😴':streak<3?'😊':streak<14?'😄':'🤩'
  scene += `<text x="${petX}" y="${petY-22}" text-anchor="middle" font-size="14">${mood}<animate attributeName="y" values="${petY-22};${petY-26};${petY-22}" dur="2s" repeatCount="indefinite"/></text>`

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="border-radius:18px;width:100%;max-width:${w}px">
    <defs><linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${sky[0]}"/>
      <stop offset="100%" stop-color="${sky[1]}"/>
    </linearGradient></defs>
    <rect width="${w}" height="${h}" fill="url(#skyG)" rx="18"/>
    ${scene}
  </svg>`
}

// Garden page
async function loadGardenData() {
  try {
    const data = await GET('/api/garden')
    S.gardenLevel = data.level
    S.gardenData = data
    return data
  } catch { return null }
}

function gardenPage() {
  const u = S.user
  const gl = S.gardenLevel || 0
  const gdata = S.gardenData || {}
  const streak = u?.streak || 0
  const xp = u?.xp || 0
  const avgG = gdata.avgGrade || 0

  const nextMilestones = [
    {label:'3 kun streak',done:streak>=3,icon:'🌿',val:`${streak}/3`},
    {label:'14 kun streak',done:streak>=14,icon:'🌳',val:`${streak}/14`},
    {label:'300 XP',done:xp>=300,icon:'⭐',val:`${xp}/300`},
    {label:'1000 XP',done:xp>=1000,icon:'🌟',val:`${xp}/1000`},
    {label:"O'rtacha 60+ baho",done:avgG>=60,icon:'📊',val:`${avgG}/60`},
    {label:"O'rtacha 80+ baho",done:avgG>=80,icon:'🏆',val:`${avgG}/80`},
  ]
  const doneMilestones = nextMilestones.filter(m=>m.done).length
  const nextMilestone = nextMilestones.find(m=>!m.done)

  // Pet name by streak
  const petName = streak<3?'🐣 Jo\'ja':streak<10?'🐱 Mushukcha':streak<30?'🦊 Tulki':'🦁 Sher'

  return `
    <div style="padding:14px">
      <div style="text-align:center;margin-bottom:14px">
        ${gardenSVG(gl, streak, xp, avgG)}
      </div>

      <div style="background:var(--card);border:1px solid var(--b);border-radius:16px;padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:20px;font-weight:800">${gardenEmoji(gl)} ${gardenName(gl)}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:2px">${doneMilestones}/6 bosqich bajarildi</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;color:var(--t2)">Uy hayvoni</div>
            <div style="font-size:16px;font-weight:700">${petName}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:#ff9f43">${streak}</div>
            <div style="font-size:10px;color:var(--t2)">Streak kun</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:var(--p)">${xp}</div>
            <div style="font-size:10px;color:var(--t2)">XP</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:var(--teal)">${avgG||'—'}</div>
            <div style="font-size:10px;color:var(--t2)">O'rtacha baho</div>
          </div>
        </div>
      </div>

      ${nextMilestone ? `<div style="background:var(--pl);border:1px solid var(--b2);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:24px">${nextMilestone.icon}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">Keyingi bosqich</div>
          <div style="font-size:12px;color:var(--t2)">${nextMilestone.label} — ${nextMilestone.val}</div>
        </div>
      </div>` : `<div style="background:var(--tl);border-radius:12px;padding:12px;margin-bottom:10px;text-align:center;font-size:14px;color:var(--teal);font-weight:700">🌈 Barcha bosqichlar bajarildi! Mukammal bog'!</div>`}

      <div style="background:var(--card);border:1px solid var(--b);border-radius:16px;padding:14px;margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Rivojlanish yo'li</div>
        ${nextMilestones.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--b)">
          <div style="width:28px;height:28px;border-radius:8px;background:${m.done?'var(--tl)':'var(--bg)'};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${m.done?'✓':m.icon}</div>
          <div style="flex:1;font-size:13px;color:${m.done?'var(--text)':'var(--t2)'}${m.done?';font-weight:500':''}">${m.label}</div>
          <div style="font-size:11px;color:${m.done?'var(--teal)':'var(--t3)'}">
            ${m.done?'✅':m.val}
          </div>
        </div>`).join('')}
      </div>

      <div style="background:var(--card2);border-radius:12px;padding:12px;text-align:center;font-size:12px;color:var(--t2);line-height:1.6">
        🧠 AI bilan gaplashsangiz bog' o'sadi<br>
        Streak uzilsa bog' so'liydi 🍂<br>
        1 kun kechiriladi — Streak Freeze ❄️
      </div>
    </div>
    <div style="height:20px"></div>`
}

// Hook into switchTab to load garden data
const _origSwitchTab = window.switchTab
window.switchTab = async function(tab) {
  S.tab = tab
  if(tab === 'garden') await loadGardenData()
  if(tab === 'more' && !S.insights.length) { try { S.insights = await GET('/api/insights') } catch {} }
  if(tab === 'schedule') await loadSchedule()
  if(tab === 'notes') { try { S.notes = await GET('/api/notes') } catch {} }
  render()
  document.getElementById('scroll')?.scrollTo({top:0,behavior:'smooth'})
}

// Auto refresh garden after chat
const _origSendChat = window.sendChat
window.sendChat = async function() {
  const inp=document.getElementById('ci'),msg=inp?.value?.trim()
  if(!msg||S.aiLoading)return
  S.chatMsgs.push({role:'user',content:msg,time:now()}); inp.value=''; if(inp)inp.style.height='auto'
  S.aiLoading=true; render(); scrollChat()
  try{
    const res=await POST('/api/chat',{message:msg})
    S.chatMsgs.push({role:'assistant',content:res.reply,time:now()})
    if(res.savedSchedule) S.schedule.push(res.savedSchedule)
    if(res.savedCards?.length){ S.flashcards=await GET('/api/flashcards?dueOnly=true'); S.fcIdx=0; S.fcRev=false }
    // Auto update garden level
    if(res.gardenLevel !== undefined) S.gardenLevel = res.gardenLevel
    if(res.streak !== undefined && S.user) S.user.streak = res.streak
    S.stats=await GET('/api/stats'); S.subjects=await GET('/api/subjects')
  } catch { S.chatMsgs.push({role:'assistant',content:'❌ Xatolik.',time:now()}) }
  S.aiLoading=false; render(); scrollChat()
}

// Also update home stats to include garden
const _origHomePage = window.homePage
window.homePage = function() {
  const page = _origHomePage()
  // Garden mini preview inject after streak badge
  return page
}

// Load garden on init
const _origLoadAll = window.loadAll
window.loadAll = async function() {
  await _origLoadAll()
  try {
    const gdata = await GET('/api/garden')
    S.gardenLevel = gdata.level
    S.gardenData = gdata
  } catch {}
}

console.log('🌿 Garden patch loaded')
</script>
