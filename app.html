<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Twin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b27;--card:#1c2235;--card2:#232840;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00c896;--amber:#ffb347;--red:#ff6b6b;
  --text:#f0f2ff;--t2:#8892c0;--t3:#3d4870;
  --b:rgba(255,255,255,0.07);--b2:rgba(108,95,255,0.22);
  --sh:0 2px 16px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf4;--card:#ffffff;--card2:#f4f5ff;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00a878;--amber:#ff8c42;--red:#ff4757;
  --text:#1a1d35;--t2:#5a6080;--t3:#a0a8c8;
  --b:rgba(0,0,0,0.07);--b2:rgba(108,95,255,0.15);
  --sh:0 2px 12px rgba(108,95,255,0.09);
}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:15px;background:var(--bg);color:var(--text);overflow:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}

#nav{flex-shrink:0;background:var(--card);border-top:1px solid var(--b);display:flex;padding:6px 4px max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--t2);padding:6px 2px;border-radius:12px}
.nb.on{color:var(--p)}
.ni-wrap{width:42px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px}
.nb.on .ni-wrap{background:rgba(108,95,255,0.12)}
.nb .ni{font-size:21px;line-height:1}
.nb .nl{font-size:10px;font-weight:600}

.hdr{padding:14px 16px 10px;background:var(--bg);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--b)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.025em}
.hdr-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.hdr-av{width:36px;height:36px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;cursor:pointer;overflow:hidden;flex-shrink:0}
.hdr-av img{width:100%;height:100%;object-fit:cover}
.back-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}

.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px;text-align:center}
.login-logo{font-size:56px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-family:'Poppins',sans-serif;font-size:32px;font-weight:900;letter-spacing:-.04em;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:6px}
.login-quote{font-size:13px;font-style:italic;color:var(--t3);margin-bottom:32px;line-height:1.5;max-width:280px}
.l-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;padding:15px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;margin-bottom:10px;text-decoration:none;border:none;letter-spacing:-.01em}
.l-google{background:#fff;color:#1a1a2e;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.l-tg{background:#229ED9;color:white}
.l-or{color:var(--t3);font-size:12px;margin:4px 0}

/* CHAT */
.chat-shell{display:flex;flex-direction:column;height:calc(100dvh - 56px)}
.chat-hdr{background:var(--card);padding:10px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-av{width:38px;height:38px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-name{font-size:15px;font-weight:700}
.chat-status{font-size:11px;color:var(--teal);display:flex;align-items:center;gap:4px;margin-top:1px}
.chat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal)}
.topic-pill-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0}
.topic-pill-bar::-webkit-scrollbar{display:none}
.tpill{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.tpill.on{background:var(--p);color:white;border-color:var(--p)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-msgs::-webkit-scrollbar{display:none}
.cm{max-width:88%;animation:cmin .22s ease}
@keyframes cmin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cm.u{align-self:flex-end}
.cm.a{align-self:flex-start}
.cmb{padding:11px 14px;font-size:14px;line-height:1.6;border-radius:18px}
.cm.u .cmb{background:var(--pg);color:white;border-radius:18px 4px 18px 18px}
.cm.a .cmb{background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px}
.cm-img{max-width:220px;border-radius:14px;margin-bottom:6px;display:block}
.ext-tag{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--teal);margin-top:5px;display:inline-block;margin-right:5px}
.yt-tag{background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.2);border-radius:8px;padding:6px 10px;font-size:12px;color:#ff5050;margin-top:6px;display:flex;align-items:center;gap:6px;cursor:pointer;text-decoration:none;width:fit-content}
.typing{display:flex;gap:4px;padding:11px 14px;background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px;width:fit-content;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.welcome-msg{text-align:center;padding:30px 20px}
.welcome-icon{font-size:48px;margin-bottom:14px}
.welcome-title{font-size:18px;font-weight:700;margin-bottom:8px}
.welcome-sub{font-size:13px;color:var(--t2);line-height:1.6;max-width:280px;margin:0 auto}
.chat-input{background:var(--card);border-top:1px solid var(--b);padding:8px 10px calc(8px + env(safe-area-inset-bottom));flex-shrink:0}
.img-preview{position:relative;display:inline-block;margin-bottom:8px;padding:0 10px}
.img-preview img{max-width:120px;max-height:120px;border-radius:12px;display:block}
.img-preview-x{position:absolute;top:-6px;right:4px;background:var(--red);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:2px solid var(--card)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg);border-radius:24px;padding:8px 8px 8px 14px;border:1px solid var(--b)}
.chat-input-row:focus-within{border-color:var(--b2)}
.ci{flex:1;background:none;border:none;font-size:14px;color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.5;min-height:22px;font-family:'Inter',sans-serif}
.ci::placeholder{color:var(--t3)}
.chat-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-circle{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.icon-circle.rec{background:var(--red);border-color:var(--red);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.send-btn{background:var(--pg);border:none;width:36px;height:36px;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.send-btn:disabled{opacity:.35}

/* MATERIAL ANALYSIS CARD (rasm tahlil natijasi) */
.material-card{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:14px;margin-top:8px;max-width:300px}
.material-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.material-icon{width:28px;height:28px;border-radius:8px;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.material-title{font-size:13px;font-weight:700}
.material-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.material-row{display:flex;gap:6px;font-size:12px}
.material-row-label{color:var(--t2);min-width:60px;flex-shrink:0}
.material-row-val{font-weight:600}
.confidence-bar{height:4px;background:var(--b);border-radius:2px;overflow:hidden;margin-top:4px}
.confidence-fill{height:100%;background:var(--teal);border-radius:2px}
.material-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ma-btn{border:none;border-radius:10px;padding:9px 6px;font-size:11px;font-weight:700;cursor:pointer;text-align:center}
.ma-btn.p{background:var(--p);color:white}
.ma-btn.s{background:var(--card2);color:var(--text);border:1px solid var(--b)}

/* TODAY */
.today-hero{margin:14px;background:var(--pg);border-radius:20px;padding:18px}
.today-greet{font-family:'Poppins',sans-serif;font-size:19px;font-weight:800;color:white;margin-bottom:4px}
.today-sub{font-size:12px;color:rgba(255,255,255,.8)}
.sec{margin:0 14px 14px}
.sec-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.card-list{background:var(--card);border:1px solid var(--b);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.ritem{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b)}
.ritem:last-child{border-bottom:none}
.ritem-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ritem-check.done{background:var(--teal);border-color:var(--teal);color:white}
.ritem-info{flex:1;min-width:0}
.ritem-title{font-size:14px;font-weight:500}
.ritem-date{font-size:11px;color:var(--t2);margin-top:2px}
.empty-mini{padding:18px;text-align:center;font-size:13px;color:var(--t2)}
.topic-chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.topic-chip-row::-webkit-scrollbar{display:none}
.tchip{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:12px 14px;min-width:120px;flex-shrink:0;cursor:pointer;box-shadow:var(--sh)}
.tchip-em{font-size:22px;margin-bottom:6px}
.tchip-name{font-size:13px;font-weight:700}
.activity-item{padding:10px 14px;border-bottom:1px solid var(--b);font-size:13px;color:var(--t2)}
.activity-item:last-child{border-bottom:none}

/* TOPICS LIST */
.topic-card{margin:0 14px 10px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:16px;box-shadow:var(--sh);cursor:pointer}
.topic-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.topic-emoji{font-size:26px}
.topic-name{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;flex:1}
.topic-progress-ring{font-size:11px;font-weight:700;color:var(--p)}
.topic-summary{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.topic-chips{display:flex;flex-wrap:wrap;gap:5px}
.tw-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px}
.tw-chip.s{background:rgba(0,200,150,.12);color:var(--teal)}
.tw-chip.w{background:rgba(255,179,71,.15);color:var(--amber)}
.add-topic-btn{margin:0 14px 14px;background:var(--card);border:1.5px dashed var(--b2);border-radius:16px;padding:16px;text-align:center;color:var(--p);font-weight:600;font-size:13px;cursor:pointer}

/* TOPIC DETAIL */
.topic-detail-hero{margin:14px;background:var(--pg);border-radius:20px;padding:18px}
.td-emoji{font-size:36px;margin-bottom:8px}
.td-name{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:white;margin-bottom:4px}
.td-progress-track{background:rgba(255,255,255,.2);border-radius:100px;height:6px;overflow:hidden;margin-top:10px}
.td-progress-fill{height:100%;background:white;border-radius:100px}
.td-progress-label{font-size:11px;color:rgba(255,255,255,.8);margin-top:4px}
.tab-row{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto}
.tab-row::-webkit-scrollbar{display:none}
.ttab{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:7px 15px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap}
.ttab.on{background:var(--p);color:white;border-color:var(--p)}
.material-thumb{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px;display:flex;gap:10px;align-items:center;box-shadow:var(--sh)}
.material-thumb img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.material-thumb-info{flex:1;min-width:0}
.material-thumb-title{font-size:13px;font-weight:600}
.material-thumb-date{font-size:11px;color:var(--t2)}

/* FLASHCARDS */
.fc-stack{position:relative;height:200px;margin:0 14px 14px;cursor:pointer}
.fc-shadow{position:absolute;bottom:-8px;left:8px;right:8px;height:100%;background:rgba(108,95,255,.1);border-radius:20px;transform:scale(.96)}
.fc-main{position:absolute;inset:0;background:var(--pg);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.fc-main.rev{background:linear-gradient(135deg,rgba(0,200,150,.18),rgba(0,168,120,.12));border:1px solid rgba(0,200,150,.3)}
.fc-front{font-size:17px;font-weight:700;color:white;text-align:center;line-height:1.5}
.fc-main.rev .fc-front{font-size:14px;color:var(--text);font-weight:600;margin-bottom:10px}
.fc-div{width:40px;height:2px;background:rgba(255,255,255,.3);margin:10px auto}
.fc-back{font-size:16px;font-weight:600;color:var(--teal);text-align:center;line-height:1.5}
.fc-rating{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 14px 14px}
.fr{border:none;border-radius:14px;padding:11px 4px;font-size:12px;font-weight:700;cursor:pointer}
.fr.a{background:rgba(255,107,107,.15);color:var(--red)}
.fr.g{background:rgba(108,95,255,.15);color:var(--p)}
.fr.e{background:rgba(0,200,150,.15);color:var(--teal)}

/* QUIZ */
.quiz-intro{margin:14px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:20px;text-align:center;box-shadow:var(--sh)}
.quiz-q{margin:0 14px 14px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:16px;box-shadow:var(--sh)}
.quiz-q-num{font-size:11px;color:var(--t2);font-weight:700;margin-bottom:6px}
.quiz-q-text{font-size:15px;font-weight:600;margin-bottom:14px;line-height:1.5}
.quiz-opt{background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:500}
.quiz-opt.sel{border-color:var(--p);background:rgba(108,95,255,.08)}
.quiz-opt.correct{border-color:var(--teal);background:rgba(0,200,150,.1)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(255,107,107,.1)}
.quiz-fillblank input{width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none}
.quiz-explain{margin-top:10px;padding:10px;background:var(--card2);border-radius:10px;font-size:12px;color:var(--t2);line-height:1.5}
.quiz-result{margin:14px;background:var(--pg);border-radius:20px;padding:24px;text-align:center}
.quiz-result-score{font-family:'Poppins',sans-serif;font-size:42px;font-weight:900;color:white}
.quiz-result-label{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px}

/* FORMS & MODAL */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;color:var(--text);padding:12px 14px;font-size:14px;outline:none;font-family:'Inter',sans-serif}
.field input:focus,.field textarea:focus{border-color:var(--p)}
.seg-pick{display:flex;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:3px;gap:2px}
.sp{flex:1;background:none;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--t2)}
.sp.on{background:var(--p);color:white}
.btn{padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;width:100%;letter-spacing:-.01em}
.btn-p{background:var(--pg);color:white}
.btn-s{background:var(--bg);color:var(--t2);border:1.5px solid var(--b);margin-top:8px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:mdin .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes mdin{from{transform:translateY(100%)}to{transform:none}}
.modal::-webkit-scrollbar{display:none}
.m-inner{padding:0 18px calc(24px + env(safe-area-inset-bottom))}
.m-handle{width:36px;height:4px;background:var(--b);border-radius:2px;margin:14px auto 20px}
.m-title{font-family:'Poppins',sans-serif;font-size:18px;font-weight:800;margin-bottom:18px}

.space{height:20px}
.empty{text-align:center;padding:40px 20px}
.empty-i{font-size:44px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-s{font-size:13px;color:var(--t2);line-height:1.6}
.loader{text-align:center;padding:30px;color:var(--t2);font-size:13px}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>
<script>
const tg=window.Telegram?.WebApp
if(tg){tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes()}

const I18N={
  uz:{chat:'Suhbat',today:'Bugun',topics:'Mavzular',
    welcome_title:'Salom! Men Twin',welcome_sub:'Nimani o\'rganayotgan bo\'lsangiz — yozing, gapiring, yoki rasmga oling. Qolganini men qilaman.',
    placeholder:'Yozing yoki gapiring...',today_greet:'Bugun nima bor?',
    reminders:'Eslatmalar',due_cards:'Takrorlash kerak',recent_topics:'Faol mavzular',recent_activity:'So\'nggi faollik',
    no_reminders:'Hozircha eslatma yo\'q',no_topics:'Hali mavzu yo\'q — gaplashing, men o\'zim yarataman',
    add_topic:'+ Mavzu qo\'shish',topic_name:'Mavzu nomi',save:'Saqlash',cancel:'Bekor',
    settings:'Sozlamalar',language:'Til',logout:'Chiqish',
    overview:'Umumiy',flashcards:'Kartalar',materials:'Materiallar',quiz:'Test',
    add_to_schedule:'Eslatma qo\'sh',make_flashcard:'Karta yarat',explain_more:'Tushuntir',
    generate_quiz:'🎮 Test yaratish',quiz_loading:'Test tayyorlanmoqda...',

const req=async(m,p,b)=>{const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});if(!r.ok)throw new Error(await r.text());return r.json()}
const GET=p=>req('GET',p),POST=(p,b)=>req('POST',p,b),PUT=(p,b)=>req('PUT',p,b)
const PATCH=(p,b)=>req('PATCH',p,b),DEL=p=>req('DELETE',p)

async function init(){
  if(tg?.initDataUnsafe?.user){const u=tg.initDataUnsafe.user;try{await POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username})}catch{}}
  try{
    S.user=await GET('/api/user')
    applyTheme(S.user.theme||'dark')
    S.topics=await GET('/api/topics')
    render()
  }catch{renderLogin()}
}

function applyTheme(th){document.body.setAttribute('data-theme',th)}

function render(){
  if(!S.user){renderLogin();return}
  const root=document.getElementById('root')
  if(S.viewingTopic){root.innerHTML=topicDetailShell()+(S.modal?modal():'');afterRender();return}
  root.innerHTML=(S.tab==='chat'?chatShell():stdShell())+nav()+(S.modal?modal():'')
  afterRender()
}

function renderChatMsg(m){
  let extras = ''
  if (m.savedReminder) extras += `<div class="ext-tag">⏰ Eslatma: ${m.savedReminder.title}</div>`
  if (m.savedCards?.length) extras += `<div class="ext-tag">🔁 ${m.savedCards.length} ta karta</div>`
  if (m.youtubeLink) extras += `<a href="${m.youtubeLink.url}" target="_blank" class="yt-tag">▶️ ${t('watch_video')}: ${m.youtubeLink.query}</a>`

  if (m.materialAnalysis) {
    const a = m.materialAnalysis
    return `<div class="cm ${m.role==='user'?'u':'a'}">
      ${m.imageUrl?`<img class="cm-img" src="${m.imageUrl}">`:''}
      ${m.content?`<div class="cmb">${m.content.replace(/\n/g,'<br>')}</div>`:''}
      <div class="material-card">
        <div class="material-head"><div class="material-icon">📋</div><div class="material-title">${t('analyzing')==='Analyzing...'?'Analysis':'Tahlil natijasi'}</div></div>
        <div class="material-rows">
          ${a.subject?`<div class="material-row"><span class="material-row-label">Fan:</span><span class="material-row-val">${a.subject}</span></div>`:''}
          ${a.task?`<div class="material-row"><span class="material-row-label">Vazifa:</span><span class="material-row-val">${a.task}</span></div>`:''}
          ${a.dueDate?`<div class="material-row"><span class="material-row-label">Muddat:</span><span class="material-row-val">${a.dueDate}</span></div>`:''}
        </div>
        ${a.confidence?`<div style="font-size:10px;color:var(--t2)">Ishonchlilik: ${a.confidence}%</div><div class="confidence-bar"><div class="confidence-fill" style="width:${a.confidence}%"></div></div>`:''}
        <div class="material-actions" style="margin-top:10px">
          <button class="ma-btn p" onclick="materialAction('${m.materialId}','reminder')">⏰ ${t('add_to_schedule')}</button>
          <button class="ma-btn p" onclick="materialAction('${m.materialId}','flashcard')">🔁 ${t('make_flashcard')}</button>
          <button class="ma-btn s" onclick="materialAction('${m.materialId}','explain')">💡 ${t('explain_more')}</button>
          <button class="ma-btn s" onclick="openTopicDetail('${m.topicId}')">📂 Mavzuga o'tish</button>
        </div>
      </div>
    </div>`
  }

  return `<div class="cm ${m.role==='user'?'u':'a'}">
    ${m.imageUrl?`<img class="cm-img" src="${m.imageUrl}">`:''}
    <div class="cmb">${m.content.replace(/\n/g,'<br>')}</div>
    ${extras}
  </div>`
}

async function openTopicDetail(topicId){
  if (!topicId) return
  S.viewingTopic = S.topics.find(t=>t._id===topicId) || await GET('/api/topics/'+topicId)
  S.topicDetailTab = 'overview'
  S.quiz = null; S.quizAnswers = {}; S.quizSubmitted = false; S.quizScore = null
  render()
}
function closeTopicDetail(){ S.viewingTopic = null; render() }

function topicDetailShell(){
  const tp = S.viewingTopic
  return `<div id="app">

}

function topicDetailContent(){
  const tp = S.viewingTopic

function topicTabContent(){
  const tp = S.viewingTopic
  if (S.topicDetailTab === 'overview') {
    return `
      <div class="sec">
        <div class="sec-title">💪 Kuchli tomonlar</div>
        <div class="topic-chips" style="margin:0 14px">
          ${(tp.understanding?.strengths||[]).map(s=>`<span class="tw-chip s">${s}</span>`).join('')||'<span style="color:var(--t2);font-size:13px">Hali aniqlanmagan</span>'}
        </div>
      </div>
      <div class="sec">
        <div class="sec-title">📌 Qiynalayotgan joylar</div>
        <div class="topic-chips" style="margin:0 14px">
          ${(tp.understanding?.weakSpots||[]).map(s=>`<span class="tw-chip w">${s}</span>`).join('')||'<span style="color:var(--t2);font-size:13px">Hali aniqlanmagan</span>'}
        </div>
      </div>
      ${tp.understanding?.summary?`<div class="sec"><div class="card-list" style="padding:14px;font-size:13px;line-height:1.6">${tp.understanding.summary}</div></div>`:''}
    `
  }
  if (S.topicDetailTab === 'materials') {
    if (!S.topicMaterials.length) return `<div class="empty"><div class="empty-i">📂</div><div class="empty-t">Hali material yo'q</div><div class="empty-s">Rasm yuborib, vazifani saqlang</div></div>`
    return S.topicMaterials.map(m=>`<div class="material-thumb">
      ${m.imageData?`<img src="${m.imageData}">`:'<div style="width:48px;height:48px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center">📝</div>'}
      <div class="material-thumb-info">
        <div class="material-thumb-title">${m.title}</div>
        <div class="material-thumb-date">${new Date(m.createdAt).toLocaleDateString()}</div>
      </div>
    </div>`).join('')
  }
  if (S.topicDetailTab === 'flashcards') return fcTopicSection()
  if (S.topicDetailTab === 'quiz') return quizSection()
  return ''
}

async function switchTopicTab(tabId){
  S.topicDetailTab = tabId
  if (tabId==='materials' && !S.topicMaterials.length) S.topicMaterials = await GET('/api/topics/'+S.viewingTopic._id+'/materials').catch(()=>[])
  if (tabId==='flashcards') S.topicFlashcards = await GET('/api/flashcards?topicId='+S.viewingTopic._id).catch(()=>[])
  if (tabId==='quiz' && !S.quiz) S.quiz = await GET('/api/topics/'+S.viewingTopic._id+'/quiz').catch(()=>null)
  render()
}

function openTopicChatFromDetail(){
  S.activeTopicId = S.viewingTopic._id
  S.viewingTopic = null
  S.tab = 'chat'
  loadTopicChat(S.activeTopicId).then(render)
}

function fcTopicSection(){
  const cards=S.topicFlashcards, card=cards[S.fcIdx]
  if(!cards.length) return `<div class="empty"><div class="empty-i">🔁</div><div class="empty-t">Hali karta yo'q</div><div class="empty-s">Suhbat orqali yoki rasm yuborib avtomatik yaratiladi</div></div>`
  if(S.fcIdx>=cards.length) return `<div class="empty"><div class="empty-i">✅</div><div class="empty-t">Hammasi bajarildi!</div></div>`
  return `
    <div class="fc-stack" onclick="revFC()">
      <div class="fc-shadow"></div>
      <div class="fc-main ${S.fcRev?'rev':''}">
        <div class="fc-front">${card?.front||''}</div>
        ${S.fcRev?`<div class="fc-div"></div><div class="fc-back">${card?.back||''}</div>`:`<div style="color:rgba(255,255,255,.6);font-size:12px;margin-top:10px">👆 Ko'rish uchun bosing</div>`}
      </div>
    </div>
    ${S.fcRev?`<div class="fc-rating">
      <button class="fr a" onclick="reviewFC(0)">🔴 Qayta</button>
      <button class="fr a" onclick="reviewFC(2)">🟡 Qiyin</button>
      <button class="fr g" onclick="reviewFC(3)">🟢 Yaxshi</button>
      <button class="fr e" onclick="reviewFC(5)">⚡ Oson</button>
    </div>`:''}
  `
}
function revFC(){S.fcRev=true;render()}
async function reviewFC(q){
  const card=S.topicFlashcards[S.fcIdx];if(!card)return
  await POST('/api/flashcards/'+card._id+'/review',{quality:q})
  S.fcIdx++;S.fcRev=false;render()
}

// ── QUIZ ─────────────────────────────────────────────────────────
function quizSection(){
  if (S.quizLoading) return `<div class="loader">⏳ ${t('quiz_loading')}</div>`
  if (!S.quiz || !S.quiz.questions?.length) return `
    <div class="quiz-intro">
      <div style="font-size:40px;margin-bottom:12px">🎮</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px">Bilimingizni sinab ko'ring</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:16px">AI shu mavzu bo'yicha turli xil savollar tuzadi</div>
      <button class="btn btn-p" onclick="genQuiz()">${t('generate_quiz')}</button>
    </div>`

  if (S.quizSubmitted) {
    return `<div class="quiz-result">
      <div class="quiz-result-score">${S.quizScore}%</div>
      <div class="quiz-result-label">${t('your_score')}</div>
    </div>
    ${S.quiz.questions.map((q,i)=>quizQuestionReview(q,i)).join('')}
    <div style="padding:0 14px"><button class="btn btn-p" onclick="genQuiz()">${t('retry')}</button></div>
    <div class="space"></div>`
  }

  return S.quiz.questions.map((q,i)=>quizQuestionInput(q,i)).join('') +
    `<div style="padding:0 14px"><button class="btn btn-p" onclick="submitQuiz()">${t('submit')}</button></div>`
}

function quizQuestionInput(q,i){
  if (q.type==='mcq') {
    return `<div class="quiz-q">
      <div class="quiz-q-num">${i+1}-savol</div>
      <div class="quiz-q-text">${q.question}</div>
      ${q.options.map(o=>`<div class="quiz-opt ${S.quizAnswers[i]===o?'sel':''}" onclick="selectQuizAnswer(${i},'${o.replace(/'/g,"\\'")}')">${o}</div>`).join('')}
    </div>`
  }
  if (q.type==='truefalse') {
    return `<div class="quiz-q">
      <div class="quiz-q-num">${i+1}-savol</div>
      <div class="quiz-q-text">${q.question}</div>
      <div class="quiz-opt ${S.quizAnswers[i]==='true'?'sel':''}" onclick="selectQuizAnswer(${i},'true')">✓ ${t('true_label')}</div>
      <div class="quiz-opt ${S.quizAnswers[i]==='false'?'sel':''}" onclick="selectQuizAnswer(${i},'false')">✗ ${t('false_label')}</div>
    </div>`
  }
  return `<div class="quiz-q">
    <div class="quiz-q-num">${i+1}-savol</div>
    <div class="quiz-q-text">${q.question}</div>
    <div class="quiz-fillblank"><input placeholder="Javobingiz..." value="${S.quizAnswers[i]||''}" oninput="S.quizAnswers[${i}]=this.value"></div>
  </div>`
}
function quizQuestionReview(q,i){
  const userAns = S.quizAnswers[i]
  const isCorrect = String(userAns).trim().toLowerCase() === String(q.correctAnswer).trim().toLowerCase()
  return `<div class="quiz-q">
    <div class="quiz-q-num">${i+1}-savol ${isCorrect?'✅':'❌'}</div>
    <div class="quiz-q-text">${q.question}</div>
    <div style="font-size:12px;color:var(--t2)">Sizning javobingiz: <b style="color:${isCorrect?'var(--teal)':'var(--red)'}">${userAns||'—'}</b></div>
    ${!isCorrect?`<div style="font-size:12px;color:var(--teal);margin-top:4px">To'g'ri javob: <b>${q.correctAnswer}</b></div>`:''}
    ${q.explanation?`<div class="quiz-explain">${q.explanation}</div>`:''}
  </div>`
}
function selectQuizAnswer(i,val){ S.quizAnswers[i]=val; render() }

async function genQuiz(){
  S.quizLoading=true;S.quizSubmitted=false;S.quizAnswers={};render()
  try{
    S.quiz = await POST('/api/topics/'+S.viewingTopic._id+'/quiz/generate',{count:5})
  }catch{toast('❌ Test yaratilmadi')}
  S.quizLoading=false;render()
}
async function submitQuiz(){
  const total = S.quiz.questions.length
  let correct = 0
  S.quiz.questions.forEach((q,i)=>{
    if (String(S.quizAnswers[i]||'').trim().toLowerCase() === String(q.correctAnswer).trim().toLowerCase()) correct++
  })
  const score = Math.round((correct/total)*100)
  S.quizScore = score; S.quizSubmitted = true
  try{ await POST('/api/quiz/'+S.quiz._id+'/submit',{score}) }catch{}
  render()
}

// ── MODAL ────────────────────────────────────────────────────────
function modal(){
  const MAP={
    addTopic:['Yangi mavzu',mAddTopic()],
    settings:['Sozlamalar',mSettings()],
  }
  const[title,content]=MAP[S.modal]||['','']
  return`<div class="mbg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="m-inner">
      <div class="m-handle"></div>
      <div class="m-title">${title}</div>
      ${content}
    </div></div>
  </div>`
}
function mAddTopic(){return`
  <div class="field"><label>${t('topic_name')}</label><input id="nt-name" placeholder="Masalan: Frantsuz tili, Shaxmat, React.js..." oninput="S.newTopicName=this.value"></div>
  <button class="btn btn-p" onclick="saveNewTopic()">${t('save')}</button>
  <button class="btn btn-s" onclick="closeModal()">${t('cancel')}</button>`}
function mSettings(){const u=S.user;return`
  <div class="field"><label>Ism</label><input value="${u?.name||''}" oninput="upd('name',this.value)"></div>
  <div class="field"><label>${t('language')}</label><div class="seg-pick">
    <button class="sp ${u?.lang==='uz'?'on':''}" onclick="changeLang('uz')">🇺🇿 O'z</button>
    <button class="sp ${u?.lang==='ru'?'on':''}" onclick="changeLang('ru')">🇷🇺 Рус</button>
    <button class="sp ${u?.lang==='en'?'on':''}" onclick="changeLang('en')">🇬🇧 Eng</button>
  </div></div>
  <button class="btn btn-p" onclick="closeModal()">${t('save')}</button>
  <button class="btn btn-s" style="background:rgba(255,107,107,.1);color:var(--red);border-color:rgba(255,107,107,.2)" onclick="logout()">${t('logout')}</button>`}

function openModal(m){S.modal=m;render()}
function closeModal(){S.modal=null;render()}

async function saveNewTopic(){
  if(!S.newTopicName?.trim()){toast('Nom kiriting');return}
  try{
    const tp=await POST('/api/topics',{name:S.newTopicName})
    S.topics.unshift(tp);S.newTopicName='';closeModal()
  }catch{toast('❌ Xatolik')}
}

// ── ACTIONS ──────────────────────────────────────────────────────
async function switchTab(tb){
  S.tab=tb
  if(tb==='today')S.todayData=await GET('/api/today').catch(()=>null)
  if(tb==='topics')S.topics=await GET('/api/topics').catch(()=>S.topics)
  if(tb==='chat'&&!S.activeTopicId)S.chatMsgs=[]
  render();document.getElementById('scroll')?.scrollTo({top:0})
}

async function setActiveTopic(topicId){
  S.activeTopicId=topicId
  await loadTopicChat(topicId)
  render()
}
async function loadTopicChat(topicId){
  if(!topicId){S.chatMsgs=[];return}
  try{
    const chats=await GET('/api/topics/'+topicId+'/chat')
    S.chatMsgs=chats.map(c=>({role:c.role,content:c.content,imageUrl:c.imageUrl}))
  }catch{S.chatMsgs=[]}
}

function toggleTheme(){const th=document.body.getAttribute('data-theme')==='dark'?'light':'dark';applyTheme(th);upd('theme',th)}
async function upd(f,v){try{await PUT('/api/user',{[f]:v});if(S.user)S.user[f]=v}catch{}}
async function changeLang(lang){await upd('lang',lang);S.user.lang=lang;closeModal();render()}
async function logout(){await POST('/auth/logout');location.reload()}

async function toggleReminder(id,done){
  await PATCH('/api/reminders/'+id,{isDone:done})
  if(S.todayData)S.todayData.reminders=S.todayData.reminders.map(r=>r._id===id?{...r,isDone:done}:r).filter(r=>!r.isDone)
  render()
}

function handleImageSelect(e){
  const file=e.target.files[0]
  if(!file)return
  const reader=new FileReader()
  reader.onload=ev=>{S.pendingImage=ev.target.result;render()}
  reader.readAsDataURL(file)
}
function clearImage(){S.pendingImage=null;render()}

async function sendChat(){
  const inp=document.getElementById('ci')
  const msg=inp?.value?.trim()
  if(!msg&&!S.pendingImage)return
  if(S.aiLoading)return

  if(S.pendingImage){
    const imgToSend=S.pendingImage
    S.chatMsgs.push({role:'user',content:msg||'Rasm yubordim',imageUrl:imgToSend})
    S.pendingImage=null
    if(inp)inp.value=''
    S.aiLoading=true;render();scrollChat()
    try{
      const r=await POST('/api/chat/image',{imageBase64:imgToSend,message:msg,topicId:S.activeTopicId})
      S.chatMsgs.push({role:'assistant',content:'',materialId:r.materialId,materialAnalysis:r.analysis,topicId:r.topic?._id})
      if(r.topic&&!S.activeTopicId){S.activeTopicId=r.topic._id;S.topics=await GET('/api/topics')}
      else if(r.topic){S.topics=await GET('/api/topics')}
    }catch{S.chatMsgs.push({role:'assistant',content:'❌ Xatolik yuz berdi.'})}
    S.aiLoading=false;render();scrollChat()
    return
  }

  S.chatMsgs.push({role:'user',content:msg})
  if(inp){inp.value='';inp.style.height='auto'}
  S.aiLoading=true;render();scrollChat()
  try{
    const r=await POST('/api/chat',{message:msg,topicId:S.activeTopicId})
    S.chatMsgs.push({role:'assistant',content:r.reply,savedReminder:r.savedReminder,savedCards:r.savedCards,youtubeLink:r.youtubeLink})
    if(r.topic&&!S.activeTopicId){S.activeTopicId=r.topic._id;S.topics=await GET('/api/topics')}
    else if(r.topic){S.topics=await GET('/api/topics')}
  }catch{S.chatMsgs.push({role:'assistant',content:'❌ Xatolik yuz berdi.'})}
  S.aiLoading=false;render();scrollChat()
}

async function materialAction(materialId, action){
  toast('⏳...')
  try{
    const r = await POST('/api/materials/'+materialId+'/action',{action})
    if (action==='reminder') toast('✅ Eslatma qo\'shildi')
    if (action==='flashcard') toast(`✅ ${r.flashcards?.length||0} ta karta yaratildi`)
    if (action==='explain') {
      S.chatMsgs.push({role:'assistant',content:r.explanation})
      render();scrollChat()
    }
  }catch{toast('❌ Xatolik')}
}

function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}
function autosize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function scrollChat(){setTimeout(()=>{const e=document.getElementById('cm');if(e)e.scrollTop=e.scrollHeight},60)}

function toggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){toast('❌ Chrome ishlatng');return}
  if(S.isRecording){if(S.recognition){S.recognition.stop();S.recognition=null}S.isRecording=false;render();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  S.recognition=new SR()
  S.recognition.lang=S.user?.lang==='ru'?'ru-RU':S.user?.lang==='en'?'en-US':'uz-UZ'
  S.recognition.continuous=true;S.recognition.interimResults=true
  S.recognition.onresult=e=>{
    let final='',interim=''
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript}
    const inp=document.getElementById('ci');if(inp){inp.value=final||interim;autosize(inp)}
    if(final){S.isRecording=false;if(S.recognition){S.recognition.stop();S.recognition=null};render();setTimeout(()=>sendChat(),300)}
  }
  S.recognition.onerror=()=>{S.isRecording=false;S.recognition=null;render()}
  S.recognition.onend=()=>{if(S.isRecording){S.isRecording=false;render()}}
  try{S.recognition.start();S.isRecording=true;render();toast('🎤 Gapiring...')}catch{toast('❌ Mikrofon ishlamadi')}
}

function toast(msg){
  document.querySelectorAll('.toast-el').forEach(e=>e.remove())
  const el=document.createElement('div');el.className='toast-el'
  el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,24,40,.95);color:white;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.08)'
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)
}

function afterRender(){ if(S.tab==='chat'&&!S.viewingTopic)scrollChat() }

init()
</script>
