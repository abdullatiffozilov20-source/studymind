<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: #FBEFE8; font-family: -apple-system, 'Segoe UI', sans-serif; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #FFF9F6; display: flex; flex-direction: column; position: relative; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }

.baloo { font-family: Georgia, serif; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 10px; }
.topbar-left { display: flex; align-items: center; }
.backbtn { border: none; background: #FFE1EC; width: 34px; height: 34px; border-radius: 17px;
           display: flex; align-items: center; justify-content: center; margin-right: 10px;
           font-size: 18px; color: #B4497A; line-height: 1; }
.topbar-title { font-size: 21px; font-weight: 600; color: #5B3A56; }
.addbtn { border: none; background: #D4537E; color: #fff; width: 34px; height: 34px; border-radius: 17px;
          display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; }
.screen { padding: 0 0 100px; }
.content { padding: 0 20px; }

.hero-time { background: linear-gradient(135deg,#FFE1EC,#E4E0FF); border-radius: 28px; padding: 28px 20px; text-align: center; }
.card-row { margin-top: 16px; background: #FFF3E3; border-radius: 22px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.card-purple { margin-top: 12px; background: #F1ECFF; border-radius: 22px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.mem-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
.mem-chip { min-width: 100px; border-radius: 18px; padding: 14px 10px; text-align: center; flex-shrink: 0; cursor: pointer; }
.mem-tile { border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; cursor: pointer; }
.mem-icon { width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
.mem-icon img { width: 100%; height: 100%; object-fit: cover; }
.mem-detail-img { width: 100%; border-radius: 18px; margin-bottom: 12px; max-height: 220px; object-fit: cover; }

.track-row { border-radius: 18px; padding: 14px 16px; margin-bottom: 10px; }
.track-icon { width: 36px; height: 36px; border-radius: 18px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.track-link { display: inline-block; margin-top: 6px; font-size: 11px; color: #D4537E; text-decoration: none; }

.letter-row { background: #FFF3E3; border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer; }
.letter-open { background: #FFF9F6; border: 1.5px dashed #F0B8CE; border-radius: 22px; padding: 28px 20px; min-height: 240px; }

.segment { display: flex; background: #FFF3E3; border-radius: 16px; padding: 4px; margin-bottom: 16px; }
.segment button { flex: 1; border: none; border-radius: 12px; padding: 9px 0; font-size: 12.5px; background: transparent; color: #B79AAE; }
.segment button.active { background: #FFFFFF; color: #D4537E; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }

.timeline { position: relative; padding-left: 18px; }
.timeline::before { content: ""; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: #F5D6E4; }
.timeline-item { position: relative; margin-bottom: 18px; }
.timeline-dot { position: absolute; left: -18px; top: 3px; width: 10px; height: 10px; border-radius: 5px; background: #D4537E; }

.folder-block { background: #FFF3E3; border-radius: 18px; margin-bottom: 12px; padding: 14px 16px; }
.folder-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.folder-title { font-family: Georgia, serif; font-size: 14px; color: #5B3A56; margin: 0; }
.folder-count { font-size: 10px; color: #B4497A; }

.modal-cancel { flex: 1; border: none; background: #FFF3E3; color: #8A6E80; border-radius: 14px; padding: 12px 0; font-size: 13px; }
.modal-save { flex: 1; border: none; background: #D4537E; color: #fff; border-radius: 14px; padding: 12px 0; font-size: 13px; }

</style>

<script>
/* app.js — asosiy mantiq. Vanilla JS, hech qanday tashqi kutubxona shart emas. */

const D = window.APP_DATA;

function safeGet(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { /* storage full or blocked */ }
}
function esc(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
}
function uid(list) { return (list.reduce((m, x) => Math.max(m, x.id), 0) || 0) + 1; }
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

const state = {
  tab: "home",
  screen: "main", // main | profile | onboarding | gender | setup | link | memoryDetail
  onboardIdx: 0,

  gender: safeGet("couple_gender", null),
  myName: safeGet("couple_myname", ""),
  partnerName: safeGet("couple_partnername", ""),
  meetDate: safeGet("couple_meetdate", ""),
  myCode: safeGet("couple_mycode", null),
  linked: safeGet("couple_linked", false),
  onboardSeen: safeGet("couple_onboard_seen", false),

  profileTab: "me",
  openStages: { 1: true },
  myAnswers: safeGet("couple_my_answers", {}),
  partnerAnswers: safeGet("couple_partner_answers", {
    "1-Oʻzi haqida-Toʻliq ismi": "Aziz",
    "1-Xarakteri-Introvertmi yoki ekstrovert": "Koʻproq introvert",
  }),

  memories: safeGet("couple_memories", D.memories),
  letters: safeGet("couple_letters", D.letters),
  tracks: safeGet("couple_tracks", D.tracks),
  timeline: safeGet("couple_timeline", D.timeline),
  plans: safeGet("couple_plans", D.plans),
  bucket: safeGet("couple_bucket", D.bucket),

  timeMode: "timeline",
  letterOpenId: null,
  memoryDetailId: null,
  playingId: null,
  openFolders: {},

  modal: null, // { type, ...payload }
};

function persistAll() {
  safeSet("couple_memories", state.memories);
  safeSet("couple_letters", state.letters);
  safeSet("couple_tracks", state.tracks);
  safeSet("couple_timeline", state.timeline);
  safeSet("couple_plans", state.plans);
  safeSet("couple_bucket", state.bucket);
  safeSet("couple_my_answers", state.myAnswers);
}

/* ---------- top bar ---------- */

function renderTopBar(title, opts) {
  opts = opts || {};
  return `
    <div class="topbar">
      <div class="topbar-left">
        ${opts.onBack !== false && opts.hasBack ? `<button class="backbtn" data-action="${opts.backAction || 'back'}">‹</button>` : ""}
        <span class="topbar-title baloo">${esc(title)}</span>
      </div>
      ${opts.addAction ? `<button class="addbtn" data-action="${opts.addAction}">+</button>` : ""}
    </div>`;
}

/* ================= HOME ================= */

function renderHome() {
  const memChips = state.memories.slice(0, 3).map(m => `
    <div class="mem-chip" style="background:${m.color}" data-action="openMemory" data-id="${m.id}">

/* ================= TIME (timeline / plans / bucket) ================= */

function renderFolderList(listKey, folders) {
  return folders.map(folder => {
    const open = !!state.openFolders[listKey + "-" + folder.id];
    const done = folder.items.filter(i => i.done).length;
    const itemsHtml = folder.items.map(item => `
      <div class="bucket-row">
        <div class="bucket-check ${item.done ? "done" : ""}" data-action="toggleItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">${item.done ? "✓" : ""}</div>
        <p style="margin:0;font-size:13px;color:#5B3A56;text-decoration:${item.done ? "line-through" : "none"};opacity:${item.done ? 0.55 : 1}">${esc(item.text)}</p>
      </div>`).join("");
    return `
      <div class="folder-block">
        <div class="folder-head" data-action="toggleFolder" data-list="${listKey}" data-folder="${folder.id}">
          <p class="folder-title">📁 ${esc(folder.title)}</p>
          <span class="folder-count">${done}/${folder.items.length}</span>
        </div>
        ${open ? `
          <div class="folder-body">
            ${itemsHtml || emptyState("Hali band yoʻq.")}
            <div class="add-item-row">
              <input type="text" placeholder="Yangi band..." id="newitem-${listKey}-${folder.id}">
              <button data-action="addItem" data-list="${listKey}" data-folder="${folder.id}">Qoʻsh</button>
            </div>
          </div>` : ""}
      </div>`;
  }).join("") + `<button class="add-folder-btn" data-action="addFolder" data-list="${listKey}">+ Yangi boʻlim</button>`;
}

function renderTime() {
  const modes = [
    { key: "timeline", label: "Xronologiya" },
    { key: "plans", label: "Rejalar" },
    { key: "bucket", label: "Orzular" },
  ];
  const segBtns = modes.map(o => `<button class="${state.timeMode === o.key ? "active" : ""}" data-action="setTimeMode" data-mode="${o.key}">${o.label}</button>`).join("");

  let body = "";
  let addAction = null;
  if (state.timeMode === "timeline") {
    addAction = "openTimelineForm";
    body = `<div class="timeline">${state.timeline.map(m => `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <p style="margin:0;font-size:11px;color:#B79AAE">${esc(m.date)}</p>
        <p style="margin:2px 0 0;font-size:13px;font-weight:500;color:#5B3A56">${m.emoji} ${esc(m.title)}</p>
      </div>`).join("") || emptyState("Hali voqea yoʻq.")}</div>`;
  } else if (state.timeMode === "plans") {
    body = renderFolderList("plans", state.plans);
  } else {
    body = renderFolderList("bucket", state.bucket);
  }

  return `
    <div class="screen">
      ${renderTopBar("Vaqt", { addAction })}
      <div class="content">
        <div class="segment">${segBtns}</div>
        ${body}
      </div>
    </div>`;
}

/* ================= PROFILE (stages) ================= */

function questionKey(stageId, catTitle, q) { return `${stageId}-${catTitle}-${q}`; }

function renderQuestionRow(stageId, cat, q, answers, readOnly) {
  const key = questionKey(stageId, cat.title, q);
  const answer = answers[key];
  if (readOnly) {
    return `
      <div class="q-row">
        <p class="q-text">${esc(q)}</p>
        <p class="q-answer-ro" style="color:${answer ? "#7A5670" : "#C9B7C2"};font-style:${answer ? "normal" : "italic"}">${esc(answer || "Hali javob bermagan")}</p>
      </div>`;
  }
  if (state.editingKey === key) {
    return `
      <div class="q-row">
        <p class="q-text">${esc(q)}</p>
        <textarea class="q-textarea" rows="2" id="edit-${key}">${esc(answer || "")}</textarea>
        <div class="q-actions">
          <button class="q-cancel" data-action="cancelEdit">Bekor qilish</button>
          <button class="q-save" data-action="saveAnswer" data-key="${key}">Saqlash</button>
        </div>
      </div>`;
  }
  return `
    <div class="q-row">
      <p class="q-text">${esc(q)}</p>
      <div data-action="editAnswer" data-key="${key}">
        ${answer ? `<p class="q-answer">${esc(answer)}</p>` : `<p class="q-placeholder">Javob berish uchun bosing…</p>`}
      </div>
    </div>`;
}

function renderStage(stage, answers, readOnly) {
  const open = !!state.openStages[stage.id];
  const total = stage.categories.reduce((n, c) => n + c.questions.length, 0);
  const answered = stage.categories.reduce((n, c) => n + c.questions.filter(q => answers[questionKey(stage.id, c.title, q)]).length, 0);
  const body = stage.categories.map(cat => `
    <div style="margin-bottom:10px">
      <p class="cat-title">${esc(cat.title)}</p>
      ${cat.questions.map(q => renderQuestionRow(stage.id, cat, q, answers, readOnly)).join("")}
    </div>`).join("");
  return `
    <div class="stage-block" style="background:${stage.sensitive ? "#F1ECFF" : "#FFF3E3"}">
      <div class="stage-head" data-action="toggleStage" data-stage="${stage.id}">
        <div>
          <p class="baloo" style="margin:0;font-size:14px;color:#5B3A56">${esc(stage.label)} · ${esc(stage.title)}</p>
          <p style="margin:2px 0 0;font-size:11px;color:#8A6E80">${esc(stage.note)}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:#B4497A">${answered}/${total}</span>
          <span style="font-size:12px;color:#B79AAE;display:inline-block;transform:${open ? "rotate(180deg)" : "none"}">⌄</span>
        </div>
      </div>
      ${open ? `<div class="stage-body">${body}</div>` : ""}
    </div>`;
}

function renderProfile() {
  const answers = state.profileTab === "me" ? state.myAnswers : state.partnerAnswers;
  const meLabel = state.gender === "qiz" ? "Men (Qiz)" : "Men (Yigit)";
  const stageBlocks = D.stages.map(s => renderStage(s, answers, state.profileTab === "partner")).join("");

  return `
    <div class="screen">
      ${renderTopBar("Mening profilim", { hasBack: true, backAction: "back" })}
      <div class="content">
        ${state.linked
          ? `<div class="link-badge">🔗 ${esc(state.myName || "Siz")} &amp; ${esc(state.partnerName || "Sherigingiz")} ulangan</div>`
          : `<div class="link-badge pending">⏳ Hali sherigingiz bilan ulanmagansiz — <span style="text-decoration:underline;cursor:pointer" data-action="goLinkFromProfile">ulash</span></div>`}
        <div class="segment">
          <button class="${state.profileTab === "me" ? "active" : ""}" data-action="setProfileTab" data-ptab="me">${meLabel}</button>
          <button class="${state.profileTab === "partner" ? "active" : ""}" data-action="setProfileTab" data-ptab="partner">${esc(state.partnerName || "Sherigim")}</button>
        </div>
        ${stageBlocks}
        <p style="font-size:10.5px;color:#B79AAE;text-align:center;margin-top:4px">
          "Maxfiy" bosqichdagi savollarni hech qachon majburlab soʻramang — ular ikkalangiz ham tayyor boʻlgandagina ochiladi. 🌙
        </p>
      </div>
    </div>`;
}

      <p class="modal-title">Yangi boʻlim</p>
      <div class="form-field"><label class="form-label">Boʻlim nomi</label><input class="form-input" id="ff-title" placeholder="Masalan: Sayohat rejalari"></div>
      <div class="modal-actions">
        <button class="modal-cancel" data-action="closeModal">Bekor qilish</button>
        <button class="modal-save" data-action="submitFolder" data-list="${m.list}">Qoʻshish</button>
      </div>`;
  }

  return `<div class="modal-overlay" data-action="closeModalOverlay"><div class="modal-sheet" onclick="event.stopPropagation()">${inner}</div></div>`;
}

/* ================= NAV ================= */

const TABS = [
  { key: "mem", label: "Xotira", emoji: "🖼️" },
  { key: "music", label: "Musiqa", emoji: "🎵" },
  { key: "home", label: "Bosh sahifa", emoji: "🏠" },
  { key: "letters", label: "Xatlar", emoji: "✉️" },
  { key: "time", label: "Vaqt", emoji: "⏰" },
];

function renderBottomNav() {
  const btns = TABS.map(t => {
    const active = state.tab === t.key;
    return `
      <button class="nav-btn" data-action="goTab" data-tab="${t.key}">
        <span class="nav-emoji" style="filter:${active ? "none" : "grayscale(70%) opacity(0.6)"}">${t.emoji}</span>
        <span class="nav-label ${active ? "active" : ""}">${esc(t.label)}</span>
      </button>`;
  }).join("");
  return `<div class="bottomnav">${btns}</div>`;
}

/* ================= MAIN RENDER ================= */

function render() {
  let main = "";
  let nav = "";

  if (state.screen === "onboarding") {
    main = renderOnboarding();
  } else if (state.screen === "gender") {
    main = renderGenderPick();
  } else if (state.screen === "setup") {
    main = renderSetup();
  } else if (state.screen === "link") {
    main = renderLink();
  } else if (state.screen === "profile") {
    main = renderProfile();
  } else if (state.screen === "memoryDetail") {
    main = renderMemoryDetail();
  } else {
    const screens = { mem: renderMem, music: renderMusic, home: renderHome, letters: renderLetters, time: renderTime };
    main = screens[state.tab]();
    nav = renderBottomNav();
  }

  document.getElementById("app").innerHTML = `<div style="flex:1;overflow-y:auto">${main}</div>${nav}${renderModal()}`;

  // wire emoji pickers inside modal (plain click handlers, since data-action click delegation covers buttons but emoji needs local active state)
  document.querySelectorAll(".emoji-opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const group = btn.parentElement;
      group.querySelectorAll(".emoji-opt").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const hidden = group.nextElementSibling;
      if (hidden && hidden.tagName === "INPUT") hidden.value = btn.dataset.emoji;
    });
  });
}

/* ================= ACTIONS ================= */

function readFileAsDataUrl(file, cb) {
  const reader = new FileReader();
  reader.onload = () => cb(reader.result);
  reader.readAsDataURL(file);
}

document.addEventListener("DOMContentLoaded", () => {
  // Telegram Mini App init — no-op harmlessly if opened outside Telegram
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    document.body.style.background = tg.themeParams.bg_color || "#FBEFE8";
  }

  const app = document.getElementById("app");

  app.addEventListener("click", e => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const action = el.dataset.action;

    if (action === "goTab") { state.tab = el.dataset.tab; state.screen = "main"; render(); }
    else if (action === "back") { state.screen = "main"; state.letterOpenId = null; state.memoryDetailId = null; render(); }
    else if (action === "closeLetter") { state.letterOpenId = null; render(); }
    else if (action === "openLetter") { state.letterOpenId = Number(el.dataset.id); render(); }
    else if (action === "openMemory") { state.memoryDetailId = Number(el.dataset.id); state.screen = "memoryDetail"; render(); }
    else if (action === "setTimeMode") { state.timeMode = el.dataset.mode; render(); }

    // profile entry flow
    else if (action === "openProfileEntry") {
      if (!state.onboardSeen) { state.screen = "onboarding"; state.onboardIdx = 0; }
      else if (!state.gender) { state.screen = "gender"; }
      else if (!state.myName) { state.screen = "setup"; }
      else if (!state.linked && !safeGet("couple_link_skipped", false)) { state.screen = "link"; }
      else { state.screen = "profile"; }
      render();
    }
    else if (action === "onboardNext") {
      if (state.onboardIdx < D.onboarding.length - 1) { state.onboardIdx++; render(); }
      else { state.onboardSeen = true; safeSet("couple_onboard_seen", true); state.screen = "gender"; render(); }
    }
    else if (action === "onboardSkip") { state.onboardSeen = true; safeSet("couple_onboard_seen", true); state.screen = "gender"; render(); }
    else if (action === "chooseGender") {
      state.gender = el.dataset.gender; safeSet("couple_gender", state.gender);
      state.screen = "setup"; render();
    }
    else if (action === "saveSetup") {
      state.myName = document.getElementById("setupMyName").value.trim();
      state.partnerName = document.getElementById("setupPartnerName").value.trim();
      state.meetDate = document.getElementById("setupMeetDate").value;
      safeSet("couple_myname", state.myName);
      safeSet("couple_partnername", state.partnerName);
      safeSet("couple_meetdate", state.meetDate);
      state.screen = "link"; render();
    }
    else if (action === "linkPartner") {
      const val = document.getElementById("partnerCodeInput").value.trim();
      if (val) { state.linked = true; safeSet("couple_linked", true); }
      state.screen = "profile"; render();
    }
    else if (action === "skipLink") {
      safeSet("couple_link_skipped", true);
      state.screen = "profile"; render();
    }
    else if (action === "goLinkFromProfile") { state.screen = "link"; render(); }

    else if (action === "setProfileTab") { state.profileTab = el.dataset.ptab; render(); }
    else if (action === "toggleStage") { const id = el.dataset.stage; state.openStages[id] = !state.openStages[id]; render(); }
    else if (action === "editAnswer") { state.editingKey = el.dataset.key; render(); }
    else if (action === "cancelEdit") { state.editingKey = null; render(); }
    else if (action === "saveAnswer") {
      const key = el.dataset.key;
      const ta = document.getElementById("edit-" + key);
      state.myAnswers[key] = ta ? ta.value : "";
      safeSet("couple_my_answers", state.myAnswers);
      state.editingKey = null; render();
    }

    // folders (plans / bucket)
    else if (action === "toggleFolder") {
      const k = el.dataset.list + "-" + el.dataset.folder;
      state.openFolders[k] = !state.openFolders[k]; render();
    }
    else if (action === "addFolder") { state.modal = { type: "folderForm", list: el.dataset.list }; render(); }
    else if (action === "submitFolder") {
      const title = document.getElementById("ff-title").value.trim();
      if (title) {
        const list = state.modal.list;
        const arr = state[list];
        arr.push({ id: uid(arr), title, items: [] });
        persistAll();
      }
      state.modal = null; render();
    }
    else if (action === "addItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder);
      const input = document.getElementById(`newitem-${list}-${folderId}`);
      const text = input ? input.value.trim() : "";
      if (text) {
        const folder = state[list].find(f => f.id === folderId);
        folder.items.push({ id: uid(folder.items), text, done: false });
        persistAll();
      }
      render();
    }
    else if (action === "toggleItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const folder = state[list].find(f => f.id === folderId);
      const item = folder.items.find(i => i.id === itemId);
      item.done = !item.done;
      persistAll(); render();
    }

    // modals: memory / letter / track / timeline
    else if (action === "openMemoryForm") { state.modal = { type: "memoryForm" }; render(); }
    else if (action === "openLetterForm") { state.modal = { type: "letterForm" }; render(); }
    else if (action === "openTrackForm") { state.modal = { type: "trackForm" }; render(); }
    else if (action === "openTimelineForm") { state.modal = { type: "timelineForm" }; render(); }
    else if (action === "closeModal" || action === "closeModalOverlay") { state.modal = null; render(); }

    else if (action === "submitMemory") {
      const title = document.getElementById("mf-title").value.trim();
      const date = document.getElementById("mf-date").value.trim();
      const emoji = document.getElementById("mf-emoji").value || "☕️";
      const note = document.getElementById("mf-note").value.trim();
      const fileInput = document.getElementById("mf-image");
      const colors = ["#FFE1EC", "#E4E0FF", "#FFF0D9", "#DBF7EF"];
      const finish = (imageDataUrl) => {
        state.memories.push({ id: uid(state.memories), title: title || "Yangi xotira", date: date || "", emoji, color: colors[state.memories.length % colors.length], note, image: imageDataUrl || null });
        persistAll();
        state.modal = null; render();
      };
      if (fileInput.files && fileInput.files[0]) readFileAsDataUrl(fileInput.files[0], finish);
      else finish(null);
    }
    else if (action === "submitLetter") {
      const title = document.getElementById("lf-title").value.trim();
      const date = document.getElementById("lf-date").value.trim();
      const mood = document.getElementById("lf-mood").value || "🥰";
      const body = document.getElementById("lf-body").value.trim();
      state.letters.push({ id: uid(state.letters), title: title || "Yangi xat", date, mood, body });
      persistAll();
      state.modal = null; render();
    }
    else if (action === "submitTrack") {
      const title = document.getElementById("tf-title").value.trim();
      const story = document.getElementById("tf-story").value.trim();
      const link = document.getElementById("tf-link").value.trim();
      state.tracks.push({ id: uid(state.tracks), title: title || "Yangi qoʻshiq", story, link });
      persistAll();
      state.modal = null; render();
    }
    else if (action === "submitTimeline") {
      const title = document.getElementById("tl-title").value.trim();
      const date = document.getElementById("tl-date").value.trim();
      const emoji = document.getElementById("tl-emoji").value.trim() || "🎉";
      state.timeline.push({ id: uid(state.timeline), title: title || "Yangi voqea", date, emoji });
      persistAll();
      state.modal = null; render();
    }
    else if (action === "saveMemoryDetail") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      const note = document.getElementById("memNoteInput").value;
      m.note = note;
      persistAll();
      state.screen = "mem" === state.tab ? "main" : "main";
      render();
    }
  });

  // file input for memory detail image (change event, not click)
  app.addEventListener("change", e => {
    const el = e.target;
    if (el.dataset.action === "memImageSelected") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      if (el.files && el.files[0]) {
        readFileAsDataUrl(el.files[0], dataUrl => { m.image = dataUrl; persistAll(); render(); });
      }
    }
  });

  render();
});

</script>
</body>
</html>
