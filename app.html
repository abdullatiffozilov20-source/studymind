<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Twin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b27;--card:#1c2235;--card2:#232840;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00c896;--amber:#ffb347;--red:#ff6b6b;
  --text:#f0f2ff;--t2:#8892c0;--t3:#3d4870;
  --b:rgba(255,255,255,0.06);--b2:rgba(108,95,255,0.22);
  --sh:0 2px 16px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#f5f6fb;--bg2:#eceefa;--card:#ffffff;--card2:#f4f5ff;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00a878;--amber:#ff8c42;--red:#ff4757;
  --text:#1a1d35;--t2:#5a6080;--t3:#a0a8c8;
  --b:rgba(0,0,0,0.07);--b2:rgba(108,95,255,0.15);
  --sh:0 2px 12px rgba(108,95,255,0.09);
}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:15px;background:var(--bg);color:var(--text);overflow:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* NAV */
#nav{flex-shrink:0;background:var(--card);border-top:1px solid var(--b);display:flex;padding:6px 4px max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--t2);padding:4px 2px;border-radius:12px}
.nb.on{color:var(--p)}
.ni-wrap{width:42px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px;position:relative}
.nb.on .ni-wrap{background:rgba(108,95,255,0.12)}
.nb .ni{font-size:21px;line-height:1}
.nb .nl{font-size:10px;font-weight:600}
.nb-dot{width:5px;height:5px;border-radius:50%;background:var(--red);position:absolute;top:-2px;right:-2px}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px;text-align:center}
.login-logo{font-size:56px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-family:'Poppins',sans-serif;font-size:32px;font-weight:900;letter-spacing:-.04em;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:6px}
.login-quote{font-size:13px;font-style:italic;color:var(--t3);margin-bottom:32px;line-height:1.5;max-width:280px}
.l-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;padding:15px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;margin-bottom:10px;text-decoration:none;border:none;letter-spacing:-.01em}
.l-btn:active{transform:scale(.97)}
.l-google{background:#fff;color:#1a1a2e;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.l-tg{background:#229ED9;color:white}
.l-or{color:var(--t3);font-size:12px;margin:4px 0}

/* ONBOARDING */
.ob-wrap{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;justify-content:center;padding:28px}
.ob-title{font-family:'Poppins',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.03em;margin-bottom:10px}
.ob-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.ob-inp{width:100%;background:var(--card);border:1.5px solid var(--b);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;margin-bottom:14px}
.ob-inp:focus{border-color:var(--p)}
.ob-btn{width:100%;background:var(--pg);border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;color:white;cursor:pointer;font-family:'Poppins',sans-serif}

/* HEADER */
.hdr{padding:14px 16px 10px;background:var(--bg);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--b);flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-family:'Poppins',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.02em}
.hdr-sub{font-size:11px;color:var(--t2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.hdr-av{width:34px;height:34px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer;overflow:hidden;flex-shrink:0}
.hdr-av img{width:100%;height:100%;object-fit:cover}

#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{display:none}

/* ===== CHAT (asosiy ekran) ===== */
.chat-shell{display:flex;flex-direction:column;height:calc(100dvh - 56px)}
.topic-bar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg)}
.topic-bar::-webkit-scrollbar{display:none}
.tp{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.tp.on{background:var(--p);color:white;border-color:var(--p)}
.tp-add{background:none;border:1.5px dashed var(--b2);color:var(--p);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}

.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat-msgs::-webkit-scrollbar{display:none}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px}
.chat-empty-icon{font-size:48px;margin-bottom:14px}
.chat-empty-title{font-family:'Poppins',sans-serif;font-size:19px;font-weight:800;margin-bottom:8px}
.chat-empty-sub{font-size:13px;color:var(--t2);line-height:1.7;max-width:280px}
.chat-suggestions{display:flex;flex-direction:column;gap:8px;margin-top:20px;width:100%;max-width:320px}
.cs-btn{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px 16px;font-size:13px;color:var(--text);cursor:pointer;text-align:left}
.cs-btn:active{background:var(--card2)}

.cm{max-width:86%;animation:cmin .22s ease}
@keyframes cmin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cm.u{align-self:flex-end}
.cm.a{align-self:flex-start}
.cmb{padding:11px 14px;font-size:14px;line-height:1.6;border-radius:18px}
.cm.u .cmb{background:var(--pg);color:white;border-radius:18px 4px 18px 18px}
.cm.a .cmb{background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px}
.cm-img{max-width:200px;border-radius:14px;margin-bottom:6px;display:block}
.cmt{font-size:10px;color:var(--t3);margin-top:3px;padding:0 4px}
.cm.u .cmt{text-align:right}
.ext-tag{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--teal);margin-top:5px;display:inline-flex;align-items:center;gap:5px;margin-right:4px}
.typing{display:flex;gap:4px;padding:11px 14px;background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px;width:fit-content;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.chat-input-area{background:var(--card);border-top:1px solid var(--b);padding:8px 10px calc(8px + env(safe-area-inset-bottom));flex-shrink:0}
.img-preview{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:12px;margin-bottom:8px}
.img-preview img{width:40px;height:40px;border-radius:8px;object-fit:cover}
.img-preview-remove{margin-left:auto;background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer}
.chat-input-row{display:flex;gap:6px;align-items:flex-end;background:var(--bg);border-radius:24px;padding:7px 7px 7px 14px;border:1px solid var(--b)}
.chat-input-row:focus-within{border-color:var(--b2)}
.ci{flex:1;background:none;border:none;font-size:14px;color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.5;min-height:22px}
.ci::placeholder{color:var(--t3)}
.icon-action{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.icon-action.rec{background:var(--red);border-color:var(--red);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.send-btn{background:var(--pg);border:none;width:36px;height:36px;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.send-btn:active{transform:scale(.88)}
.send-btn:disabled{opacity:.35}

/* ===== TODAY ===== */
.section-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;padding:14px 16px 8px}
.reminder-card{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.r-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.r-check.done{background:var(--teal);border-color:var(--teal);color:white}
.r-info{flex:1;min-width:0}
.r-title{font-size:14px;font-weight:500}
.r-title.done{text-decoration:line-through;color:var(--t2)}
.r-due{font-size:11px;color:var(--amber);margin-top:2px}
.r-del{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 4px}

.fc-banner{margin:0 14px 8px;background:var(--pg);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.fc-banner-icon{font-size:28px}
.fc-banner-text{flex:1;color:white}
.fc-banner-title{font-size:14px;font-weight:700}
.fc-banner-sub{font-size:11px;opacity:.85}

.topic-mini{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh)}
.topic-mini-emoji{font-size:22px}
.topic-mini-info{flex:1;min-width:0}
.topic-mini-name{font-size:14px;font-weight:700}
.topic-mini-sub{font-size:11px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.empty{text-align:center;padding:40px 20px}
.empty-i{font-size:44px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-s{font-size:13px;color:var(--t2);line-height:1.6}

/* ===== TOPICS LIST ===== */
.topic-card{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:16px;padding:14px;box-shadow:var(--sh);cursor:pointer}
.topic-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.topic-card-emoji{font-size:24px}
.topic-card-name{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;flex:1}
.topic-card-meta{font-size:11px;color:var(--t2)}
.topic-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.topic-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.topic-tag.weak{background:rgba(255,107,107,.12);color:var(--red)}
.topic-tag.strong{background:rgba(0,200,150,.12);color:var(--teal)}
.topic-notes{font-size:12px;color:var(--t2);line-height:1.5;margin-top:8px;font-style:italic}

/* FORMS & MODAL */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;color:var(--text);padding:12px 14px;font-size:14px;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--p)}
.emoji-g{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.eo{background:var(--bg);border:1.5px solid var(--b);border-radius:9px;padding:6px;text-align:center;font-size:18px;cursor:pointer}
.eo.sel{border-color:var(--p);background:rgba(108,95,255,.1)}
.btn{padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:block;text-align:center;width:100%}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--pg);color:white}
.btn-s{background:var(--bg);color:var(--t2);border:1.5px solid var(--b);margin-top:8px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:mdin .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes mdin{from{transform:translateY(100%)}to{transform:none}}
.modal::-webkit-scrollbar{display:none}
.m-inner{padding:0 18px calc(24px + env(safe-area-inset-bottom))}
.m-handle{width:36px;height:4px;background:var(--b);border-radius:2px;margin:14px auto 20px}
.m-title{font-family:'Poppins',sans-serif;font-size:18px;font-weight:800;margin-bottom:18px}

/* FLASHCARD REVIEW */
.fc-stack{position:relative;height:220px;margin-bottom:14px;cursor:pointer}
.fc-main{position:absolute;inset:0;background:var(--pg);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.fc-main.rev{background:linear-gradient(135deg,rgba(0,200,150,.18),rgba(0,168,120,.12));border:1px solid rgba(0,200,150,.3)}
.fc-front{font-size:18px;font-weight:700;color:white;text-align:center;line-height:1.5}
.fc-main.rev .fc-front{font-size:15px;color:var(--text);font-weight:600;margin-bottom:10px}
.fc-div{width:40px;height:2px;background:rgba(255,255,255,.3);border-radius:1px;margin:10px auto}
.fc-main.rev .fc-div{background:rgba(0,200,150,.4)}
.fc-back{font-size:17px;font-weight:600;color:var(--teal);text-align:center;line-height:1.5}
.fc-hint{font-size:12px;color:rgba(255,255,255,.55);margin-top:12px}
.fc-rating{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.fr{border:none;border-radius:14px;padding:12px 4px;font-size:12px;font-weight:700;cursor:pointer}
.fr.a{background:rgba(255,107,107,.15);color:var(--red)}
.fr.h{background:rgba(255,179,71,.15);color:var(--amber)}
.fr.g{background:rgba(108,95,255,.15);color:var(--p)}
.fr.e{background:rgba(0,200,150,.15);color:var(--teal)}

.space{height:20px}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.btn-sm.p{background:var(--p);color:white}
.btn-sm.s{background:var(--card);color:var(--t2);border:1px solid var(--b)}
</style>
</head>
<body data-theme="dark">
<div id="root"></div>
<script>
const tg=window.Telegram?.WebApp
if(tg){tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes()}

const I18N={
  uz:{chat:'Chat',today:'Bugun',topics:'Mavzular',
    chat_empty_title:'Nima o\'rganmoqchisiz?',
    chat_empty_sub:'Yozing, gapiring yoki rasm yuboring — qolganini men hal qilaman.',
    placeholder:'Yozing yoki gapiring...',
    today_title:'Bugun',no_reminders:'Eslatma yo\'q',
    due_cards:'ta karta takrorlash kutmoqda',
    no_topics:'Hali mavzu yo\'q',no_topics_sub:'Birinchi suhbatdan boshlang — men avtomatik mavzu ochaman',
    new_topic:'+ Yangi mavzu',settings:'Sozlamalar',logout:'Chiqish',language:'Til',
    save:'Saqlash',cancel:'Bekor',weak_spots:'Qiynalayotgan joylar',strengths:'Kuchli tomonlar',
  },
  ru:{chat:'Чат',today:'Сегодня',topics:'Темы',
    chat_empty_title:'Что хотите изучить?',
    chat_empty_sub:'Пишите, говорите или отправьте фото — остальное сделаю я.',
    placeholder:'Пишите или говорите...',
    today_title:'Сегодня',no_reminders:'Нет напоминаний',
    due_cards:'карточек ждут повторения',
    no_topics:'Пока нет тем',no_topics_sub:'Начните с разговора — я автоматически создам тему',
    new_topic:'+ Новая тема',settings:'Настройки',logout:'Выйти',language:'Язык',
    save:'Сохранить',cancel:'Отмена',weak_spots:'Слабые места',strengths:'Сильные стороны',
  },
  en:{chat:'Chat',today:'Today',topics:'Topics',
    chat_empty_title:'What do you want to learn?',
    chat_empty_sub:'Type, talk, or send a photo — I\'ll handle the rest.',
    placeholder:'Type or talk...',
    today_title:'Today',no_reminders:'No reminders',
    due_cards:'cards waiting for review',
    no_topics:'No topics yet',no_topics_sub:'Start a conversation — I\'ll create a topic automatically',
    new_topic:'+ New topic',settings:'Settings',logout:'Sign out',language:'Language',
    save:'Save',cancel:'Cancel',weak_spots:'Struggling with',strengths:'Strong at',
  }
}
function t(k){const l=S.user?.lang||'uz';return(I18N[l]||I18N.uz)[k]||k}

let S={
  user:null,tab:'chat',
  topics:[],activeTopicId:null,
  chatMsgs:[],aiLoading:false,
  pendingImage:null,
  today:null,
  flashcards:[],fcIdx:0,fcRev:false,
  modal:null,
  nt:{name:'',emoji:'📘'},
  isRecording:false,recognition:null,
  onboarding:false,obName:'',
}

const req=async(m,p,b)=>{const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});if(!r.ok)throw new Error(await r.text());return r.json()}
const GET=p=>req('GET',p),POST=(p,b)=>req('POST',p,b),PUT=(p,b)=>req('PUT',p,b)
const PATCH=(p,b)=>req('PATCH',p,b),DEL=p=>req('DELETE',p)
const nowT=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})

async function init(){
  if(tg?.initDataUnsafe?.user){const u=tg.initDataUnsafe.user;try{await POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username})}catch{}}
  try{
    S.user=await GET('/api/user')
    applyTheme(S.user.theme||'dark')
    if(!S.user.name){S.onboarding=true;render();return}
    await loadChat();await loadTopics();await loadToday();render()
  }catch{renderLogin()}
}

async function loadChat(){
  S.chatMsgs=(await GET('/api/chat'+(S.activeTopicId?'?topicId='+S.activeTopicId:''))).map(m=>({role:m.role,content:m.content,extracted:m.extractedData,imageUrl:m.imageUrl}))
}
async function loadTopics(){ S.topics=await GET('/api/topics') }
async function loadToday(){ S.today=await GET('/api/today') }

function applyTheme(th){document.body.setAttribute('data-theme',th)}

function render(){
  if(!S.user){renderLogin();return}
  if(S.onboarding){renderOnboarding();return}
  const root=document.getElementById('root')
  root.innerHTML=shell()+nav()+(S.modal?modal():'')
  afterRender()
}

function renderLogin(){
  document.getElementById('root').innerHTML=`<div class="login-wrap">
    <div class="login-logo">🧠</div>
    <div class="login-title">Twin</div>
    <div class="login-sub">Shaxsiy o'rganish hamrohingiz</div>
    <div class="login-quote">"Nima o'rgansangiz ham — men sizning yo'lingizni eslab boraman."</div>
    <a href="/auth/google" class="l-btn l-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google bilan kirish
    </a>
    <div class="l-or">yoki</div>
    <button class="l-btn l-tg" onclick="loginTG()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.012 9.486c-.148.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.48 14.6l-2.95-.924c-.64-.2-.654-.64.135-.948l11.52-4.44c.533-.194 1 .13.377.96z"/></svg>
      Telegram bilan kirish
    </button>
  </div>`
}
function loginTG(){
  if(tg?.initDataUnsafe?.user){const u=tg.initDataUnsafe.user;POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username}).then(()=>init()).catch(()=>toast('❌ Xatolik'))}
  else toast('Telegram ichida ishlaydi.')
}

function renderOnboarding(){
  document.getElementById('root').innerHTML=`<div class="ob-wrap">
    <div style="font-size:48px;margin-bottom:16px">👋</div>
    <div class="ob-title">Salom! Men Twin.</div>
    <div class="ob-sub">Sizning shaxsiy o'rganish hamrohingizman. Ismingiz nima?</div>
    <input class="ob-inp" id="ob-name" placeholder="Ismingiz..." value="${S.obName}" oninput="S.obName=this.value" autofocus>
    <button class="ob-btn" onclick="obFinish()">Boshlaymiz →</button>
  </div>`
}
async function obFinish(){
  if(!S.obName.trim()){toast('Ismingizni kiriting');return}
  await PUT('/api/user',{name:S.obName.trim()})
  S.user.name=S.obName.trim();S.onboarding=false
  await loadChat();await loadTopics();render()
}

function shell(){
  const u=S.user
  const init2=(u?.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
  const titles={chat:activeTopicObj()?`${activeTopicObj().emoji} ${activeTopicObj().name}`:'Twin',today:t('today_title'),topics:t('topics')}
  return `<div id="app">
    <div class="hdr">
      <div class="hdr-row">
        <div><div class="hdr-title">${titles[S.tab]}</div></div>
        <div class="hdr-right">
          <div class="icon-btn" onclick="toggleTheme()">${document.body.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</div>
          <div class="hdr-av" onclick="openModal('settings')">${u?.avatar?`<img src="${u.avatar}">`:init2}</div>
        </div>
      </div>
    </div>
    ${S.tab==='chat'?chatPage():`<div id="scroll">${S.tab==='today'?todayPage():topicsPage()}</div>`}
  </div>`
}

function activeTopicObj(){ return S.topics.find(t=>t._id===S.activeTopicId) }

function nav(){
  const TABS=[{id:'chat',i:'💬',l:t('chat')},{id:'today',i:'☀️',l:t('today')},{id:'topics',i:'📚',l:t('topics')}]
  const due=S.today?.dueCards||0
  return`<nav id="nav">${TABS.map(tb=>`<button class="nb ${S.tab===tb.id?'on':''}" onclick="switchTab('${tb.id}')">
    <div class="ni-wrap"><span class="ni">${tb.i}</span>${tb.id==='today'&&due?`<span class="nb-dot"></span>`:''}</div>
    <span class="nl">${tb.l}</span>
  </button>`).join('')}</nav>`
}

// ===== CHAT =====
function chatPage(){
  return `<div class="chat-shell">
    <div class="topic-bar">
      <div class="tp ${!S.activeTopicId?'on':''}" onclick="selectTopic(null)">💬 Umumiy</div>
      ${S.topics.map(tp=>`<div class="tp ${S.activeTopicId===tp._id?'on':''}" onclick="selectTopic('${tp._id}')">${tp.emoji} ${tp.name}</div>`).join('')}
      <div class="tp-add" onclick="openModal('addTopic')">+ Mavzu</div>
    </div>
    <div class="chat-msgs" id="cm">
      ${!S.chatMsgs.length?chatEmptyState():''}
      ${S.chatMsgs.map(m=>`<div class="cm ${m.role==='user'?'u':'a'}">
        ${m.imageUrl?(m.imageUrl.startsWith('data:')?`<div class="cmb" style="padding:8px"><img class="cm-img" src="${m.imageUrl}">${msg_text_or_empty(m.content)}</div>`:`<div class="cmb" style="padding:8px"><div style="font-size:12px;color:var(--t2);padding:4px 6px">📷 rasm yuborilgan edi</div></div>`):`
        <div class="cmb">${escapeHtml(m.content).replace(/\\n/g,'<br>')}</div>`}
        ${m.extracted?.reminder?`<div class="ext-tag">⏰ Eslatma saqlandi</div>`:''}
        ${m.extracted?.flashcards?.length?`<div class="ext-tag">🔁 ${m.extracted.flashcards.length} karta yaratildi</div>`:''}
        ${m.extracted?.newTopic?`<div class="ext-tag">📘 Yangi mavzu ochildi</div>`:''}
      </div>`).join('')}
      ${S.aiLoading?`<div class="typing"><span></span><span></span><span></span></div>`:''}
    </div>
    <div class="chat-input-area">
      ${S.pendingImage?`<div class="img-preview"><img src="${S.pendingImage}"><span style="font-size:12px;color:var(--t2)">Rasm tayyor — yozing yoki to'g'ridan yuboring</span><button class="img-preview-remove" onclick="S.pendingImage=null;render()">×</button></div>`:''}
      <div class="chat-input-row">
        <input type="file" id="img-input" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelect(event)">
        <button class="icon-action" onclick="document.getElementById('img-input').click()">📷</button>
        <textarea class="ci" id="ci" placeholder="${t('placeholder')}" rows="1" onkeydown="chatKey(event)" oninput="autosize(this)"></textarea>
        <button class="icon-action ${S.isRecording?'rec':''}" onclick="toggleVoice()">${S.isRecording?'⏹':'🎤'}</button>
        <button class="send-btn" onclick="sendChat()" ${S.aiLoading?'disabled':''}>➤</button>
      </div>
    </div>
  </div>`
}

function chatEmptyState(){
  return `<div class="chat-empty">
    <div class="chat-empty-icon">🧠</div>
    <div class="chat-empty-title">${t('chat_empty_title')}</div>
    <div class="chat-empty-sub">${t('chat_empty_sub')}</div>
    <div class="chat-suggestions">
      <div class="cs-btn" onclick="qp('Frantsuz tilini o‘rganmoqchiman, qayerdan boshlasam bo‘ladi?')">🇫🇷 "Frantsuz tilini o'rganmoqchiman..."</div>
      <div class="cs-btn" onclick="qp('Matematikadan integral mavzusini tushuntir')">📐 "Integral mavzusini tushuntir"</div>
      <div class="cs-btn" onclick="document.getElementById('img-input').click()">📷 Uy vazifasi rasmini yuborish</div>
    </div>
  </div>`
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }
function msg_text_or_empty(c){ return c&&c.trim()?`<div style="font-size:13px;margin-top:6px;color:var(--text)">${escapeHtml(c)}</div>`:'' }

async function selectTopic(id){
  S.activeTopicId=id; await loadChat(); render(); scrollChat()
}

function handleImageSelect(e){
  const file=e.target.files[0]; if(!file) return
  const reader=new FileReader()
  reader.onload=()=>{ S.pendingImage=reader.result; render() }
  reader.readAsDataURL(file)
}

async function sendChat(){
  const inp=document.getElementById('ci'),msg=inp?.value?.trim()
  if(!msg&&!S.pendingImage) return
  if(S.aiLoading) return
  const imageToSend=S.pendingImage
  S.chatMsgs.push({role:'user',content:msg||'',imageUrl:imageToSend||undefined})
  if(inp){inp.value='';inp.style.height='auto'}
  S.pendingImage=null
  S.aiLoading=true;render();scrollChat()
  try{
    const r=await POST('/api/chat',{message:msg,topicId:S.activeTopicId,imageBase64:imageToSend})
    S.chatMsgs.push({role:'assistant',content:r.reply,extracted:r.extracted})
    if(r.newTopic){ S.topics.unshift(r.newTopic); if(!S.activeTopicId) S.activeTopicId=r.newTopic._id }
    if(r.topicId && r.topicId!==S.activeTopicId && !S.activeTopicId){} // keep general view consistent
    await loadTopics()
  }catch{S.chatMsgs.push({role:'assistant',content:'❌ Xatolik yuz berdi, qaytadan urinib ko\u2019ring.'})}
  S.aiLoading=false;render();scrollChat()
}

function qp(text){const inp=document.getElementById('ci');if(inp)inp.value=text;sendChat()}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}
function autosize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function scrollChat(){setTimeout(()=>{const e=document.getElementById('cm');if(e)e.scrollTop=e.scrollHeight},60)}

function toggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){toast('❌ Bu brauzerda ovozli kiritish yo‘q');return}
  if(S.isRecording){if(S.recognition){S.recognition.stop();S.recognition=null}S.isRecording=false;render();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  S.recognition=new SR()
  S.recognition.lang=S.user?.lang==='ru'?'ru-RU':S.user?.lang==='en'?'en-US':'uz-UZ'
  S.recognition.continuous=true;S.recognition.interimResults=true
  S.recognition.onresult=e=>{
    let final='',interim=''
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript}
    const inp=document.getElementById('ci');if(inp){inp.value=final||interim;autosize(inp)}
    if(final){S.isRecording=false;if(S.recognition){S.recognition.stop();S.recognition=null};render();setTimeout(()=>sendChat(),300)}
  }
  S.recognition.onerror=()=>{S.isRecording=false;S.recognition=null;render()}
  S.recognition.onend=()=>{if(S.isRecording){S.isRecording=false;render()}}
  try{S.recognition.start();S.isRecording=true;render();toast('🎤 Gapiring...')}catch{toast('❌ Mikrofon ishlamadi')}
}

// ===== TODAY =====
function todayPage(){
  const d=S.today
  if(!d) return `<div class="empty"><div class="empty-i">☀️</div><div class="empty-t">Yuklanmoqda...</div></div>`
  return `
    ${d.dueCards>0?`<div class="fc-banner" onclick="switchTab('chat');openFlashcardReview()">
      <span class="fc-banner-icon">🔁</span>
      <div class="fc-banner-text"><div class="fc-banner-title">${d.dueCards} ${t('due_cards')}</div><div class="fc-banner-sub">Bosing va takrorlang</div></div>
    </div>`:''}
    <div class="section-title">Eslatmalar</div>
    ${d.activeReminders.length?d.activeReminders.map(r=>`<div class="reminder-card">
      <div class="r-check ${r.isDone?'done':''}" onclick="toggleReminder('${r._id}',${!r.isDone})">${r.isDone?'✓':''}</div>
      <div class="r-info"><div class="r-title ${r.isDone?'done':''}">${r.title}</div>${r.dueDate?`<div class="r-due">📅 ${r.dueDate}</div>`:''}</div>
      <button class="r-del" onclick="delReminder('${r._id}')">×</button>
    </div>`).join(''):`<div style="padding:0 14px 14px;font-size:13px;color:var(--t2)">${t('no_reminders')}</div>`}

    <div class="section-title">So'nggi mavzular</div>
    ${d.recentTopics.length?d.recentTopics.map(tp=>`<div class="topic-mini" onclick="switchTab('chat');selectTopic('${tp._id}')">
      <span class="topic-mini-emoji">${tp.emoji}</span>
      <div class="topic-mini-info"><div class="topic-mini-name">${tp.name}</div><div class="topic-mini-sub">${tp.messageCount||0} ta xabar</div></div>
    </div>`).join(''):`<div style="padding:0 14px 14px;font-size:13px;color:var(--t2)">Hali mavzu yo'q</div>`}
    <div class="space"></div>`
}

async function toggleReminder(id,done){
  await PATCH('/api/reminders/'+id,{isDone:done})
  const r=S.today.activeReminders.find(x=>x._id===id); if(r)r.isDone=done
  render()
}
async function delReminder(id){
  await DEL('/api/reminders/'+id)
  S.today.activeReminders=S.today.activeReminders.filter(x=>x._id!==id)
  render()
}

// ===== TOPICS =====
function topicsPage(){
  if(!S.topics.length) return `<div class="empty"><div class="empty-i">📚</div><div class="empty-t">${t('no_topics')}</div><div class="empty-s">${t('no_topics_sub')}</div>
    <button class="btn-sm p" style="margin-top:14px" onclick="switchTab('chat')">💬 Suhbatni boshlash</button>
  </div>`
  return `<div style="padding:12px 14px 0"><button class="btn-sm p" onclick="openModal('addTopic')">${t('new_topic')}</button></div>
    ${S.topics.map(tp=>`<div class="topic-card" onclick="switchTab('chat');selectTopic('${tp._id}')">
      <div class="topic-card-top">
        <span class="topic-card-emoji">${tp.emoji}</span>
        <div class="topic-card-name">${tp.name}</div>
        <div class="topic-card-meta">${tp.messageCount||0} xabar</div>
      </div>
      ${tp.understanding?.notes?`<div class="topic-notes">"${tp.understanding.notes}"</div>`:''}
      <div class="topic-tags">
        ${(tp.understanding?.strengths||[]).slice(0,2).map(s=>`<span class="topic-tag strong">✓ ${s}</span>`).join('')}
        ${(tp.understanding?.weakSpots||[]).slice(0,2).map(s=>`<span class="topic-tag weak">⚠ ${s}</span>`).join('')}
      </div>
    </div>`).join('')}
    <div class="space"></div>`
}

// ===== MODAL =====
function modal(){
  const MAP={
    addTopic:['Yangi mavzu',mAddTopic()],
    settings:['Sozlamalar',mSettings()],
    flashcardReview:['🔁 Takrorlash',mFlashcardReview()],
  }
  const[title,content]=MAP[S.modal]||['','']
  return `<div class="mbg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="m-inner">
      <div class="m-handle"></div>
      <div class="m-title">${title}</div>
      ${content}
    </div></div>
  </div>`
}
function openModal(m){ S.modal=m; if(m==='addTopic')S.nt={name:'',emoji:'📘'}; render() }
function closeModal(){ S.modal=null; render() }

const TOPIC_EMOJIS=['📘','🎸','💻','🗣️','🔬','📐','🎨','🏃','🧪','🌍','📖','🎵','⚛️','💡','🧮','🎯']
function mAddTopic(){
  return `<div class="field"><label>Mavzu nomi</label><input value="${S.nt.name}" oninput="S.nt.name=this.value" placeholder="Masalan: Gitara, Frantsuz tili, Matematika..."></div>
    <div class="field"><label>Emoji</label><div class="emoji-g">${TOPIC_EMOJIS.map(e=>`<div class="eo ${S.nt.emoji===e?'sel':''}" onclick="S.nt.emoji='${e}';render()">${e}</div>`).join('')}</div></div>
    <button class="btn btn-p" onclick="saveTopic()">Saqlash</button>
    <button class="btn btn-s" onclick="closeModal()">${t('cancel')}</button>`
}
async function saveTopic(){
  if(!S.nt.name.trim()){toast('Nom kiriting');return}
  const tp=await POST('/api/topics',S.nt)
  S.topics.unshift(tp); closeModal(); selectTopic(tp._id)
}

function mSettings(){
  const u=S.user
  return `<div class="field"><label>Ism</label><input value="${u?.name||''}" oninput="upd('name',this.value)"></div>
    <div class="field"><label>${t('language')}</label><div style="display:flex;gap:6px">
      <button class="btn-sm ${u?.lang==='uz'?'p':'s'}" onclick="changeLang('uz')">🇺🇿 O'z</button>
      <button class="btn-sm ${u?.lang==='ru'?'p':'s'}" onclick="changeLang('ru')">🇷🇺 Рус</button>
      <button class="btn-sm ${u?.lang==='en'?'p':'s'}" onclick="changeLang('en')">🇬🇧 Eng</button>
    </div></div>
    <button class="btn btn-p" onclick="closeModal()">${t('save')}</button>
    <button class="btn btn-s" style="background:rgba(255,107,107,.1);color:var(--red)" onclick="logout()">${t('logout')}</button>`
}
async function upd(f,v){try{await PUT('/api/user',{[f]:v});if(S.user)S.user[f]=v}catch{}}
async function changeLang(lang){await upd('lang',lang);S.user.lang=lang;closeModal();render()}
async function logout(){await POST('/auth/logout');location.reload()}
function toggleTheme(){const th=document.body.getAttribute('data-theme')==='dark'?'light':'dark';applyTheme(th);upd('theme',th);render()}

// ===== FLASHCARD REVIEW =====
async function openFlashcardReview(){
  S.flashcards=await GET('/api/flashcards?dueOnly=true')
  S.fcIdx=0;S.fcRev=false
  S.modal='flashcardReview'; render()
}
function mFlashcardReview(){
  const cards=S.flashcards,card=cards[S.fcIdx]
  if(!card) return `<div style="text-align:center;padding:20px 0"><div style="font-size:36px;margin-bottom:10px">✅</div><div style="font-weight:700;margin-bottom:14px">Hammasi tugadi!</div><button class="btn btn-s" onclick="closeModal()">Yopish</button></div>`
  return `<div style="font-size:12px;color:var(--t2);margin-bottom:10px">${S.fcIdx+1} / ${cards.length}${card.topicName?' · '+card.topicName:''}</div>
    <div class="fc-stack" onclick="revFC()">
      <div class="fc-main ${S.fcRev?'rev':''}">
        <div class="fc-front">${card.front}</div>
        ${S.fcRev?`<div class="fc-div"></div><div class="fc-back">${card.back}</div>`:`<div class="fc-hint">👆 Ko'rish uchun bosing</div>`}
      </div>
    </div>
    ${S.fcRev?`<div class="fc-rating">
      <button class="fr a" onclick="reviewFC(0)">🔴 Qayta</button>
      <button class="fr h" onclick="reviewFC(2)">🟡 Qiyin</button>
      <button class="fr g" onclick="reviewFC(3)">🟢 Yaxshi</button>
      <button class="fr e" onclick="reviewFC(5)">⚡ Oson</button>
    </div>`:''}`
}
function revFC(){S.fcRev=true;render()}
async function reviewFC(q){
  const c=S.flashcards[S.fcIdx];if(!c) return
  await POST('/api/flashcards/'+c._id+'/review',{quality:q})
  S.fcIdx++;S.fcRev=false;render()
}

function switchTab(tb){
  S.tab=tb
  if(tb==='today') loadToday().then(render)
  else if(tb==='topics') loadTopics().then(render)
  else render()
  document.getElementById('scroll')?.scrollTo({top:0,behavior:'smooth'})
}

function toast(msg){
  document.querySelectorAll('.toast-el').forEach(e=>e.remove())
  const el=document.createElement('div');el.className='toast-el'
  el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,24,40,.95);color:white;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.08)'
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500)
}

function afterRender(){
  if(S.tab==='chat')scrollChat()
}

init()
</script>
