<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>StudyMind</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="garden.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b27;--card:#1c2235;--card2:#232840;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00c896;--amber:#ffb347;--red:#ff6b6b;--pink:#ff85c0;
  --text:#f0f2ff;--t2:#8892c0;--t3:#3d4870;
  --b:rgba(255,255,255,0.06);--b2:rgba(108,95,255,0.22);
  --sh:0 2px 16px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf4;--card:#ffffff;--card2:#f4f5ff;
  --p:#6c5fff;--p2:#a594ff;--pg:linear-gradient(135deg,#6c5fff,#a594ff);
  --teal:#00a878;--amber:#ff8c42;--red:#ff4757;--pink:#ff60a8;
  --text:#1a1d35;--t2:#5a6080;--t3:#a0a8c8;
  --b:rgba(0,0,0,0.07);--b2:rgba(108,95,255,0.15);
  --sh:0 2px 12px rgba(108,95,255,0.09);
}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:15px;background:var(--bg);color:var(--text);overflow:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#scroll::-webkit-scrollbar{display:none}
/* NAV */
#nav{flex-shrink:0;background:var(--card);border-top:1px solid var(--b);display:flex;padding:6px 4px max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:'Inter',sans-serif;color:var(--t2);padding:4px 2px;border-radius:12px;transition:color .2s}
.nb.on{color:var(--p)}
.ni-wrap{width:42px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:background .2s;position:relative}
.nb.on .ni-wrap{background:rgba(108,95,255,0.12)}
.nb .ni{font-size:21px;line-height:1}
.nb .nl{font-size:10px;font-weight:600}
.nb-dot{width:5px;height:5px;border-radius:50%;background:var(--red);position:absolute;top:-2px;right:-2px}
/* HEADER */
.hdr{padding:14px 16px 10px;background:var(--bg);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--b)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.025em}
.hdr-sub{font-size:11px;color:var(--t2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.hdr-av{width:36px;height:36px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;cursor:pointer;overflow:hidden;flex-shrink:0}
.hdr-av img{width:100%;height:100%;object-fit:cover}
.xp-bar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;background:var(--pg);transition:width 1s ease}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px;text-align:center}
.login-logo{font-size:56px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-family:'Poppins',sans-serif;font-size:32px;font-weight:900;letter-spacing:-.04em;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:6px}
.login-quote{font-size:13px;font-style:italic;color:var(--t3);margin-bottom:32px;line-height:1.5;max-width:280px}
.l-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;padding:15px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;margin-bottom:10px;text-decoration:none;border:none;transition:all .2s;letter-spacing:-.01em}
.l-btn:active{transform:scale(.97)}
.l-google{background:#fff;color:#1a1a2e;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.l-tg{background:#229ED9;color:white}
.l-or{color:var(--t3);font-size:12px;margin:4px 0}
/* ONBOARDING */
.ob-wrap{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column}
.ob-canvas-wrap{flex:1;position:relative;min-height:0}
.ob-canvas-wrap canvas{width:100%;height:100%;display:block}
.ob-fade{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,var(--bg) 40%,transparent)}
.ob-body{padding:20px 22px max(20px,env(safe-area-inset-bottom));background:var(--bg);flex-shrink:0}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
.ob-dot{width:6px;height:6px;border-radius:3px;background:var(--b2);transition:all .3s}
.ob-dot.on{width:22px;background:var(--p)}
.ob-title{font-family:'Poppins',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.03em;margin-bottom:6px;color:var(--text)}
.ob-sub{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:20px}
.ob-inp{width:100%;background:var(--card);border:1.5px solid var(--b);border-radius:14px;padding:14px 16px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;margin-bottom:12px;transition:border-color .2s}
.ob-inp:focus{border-color:var(--p)}
.ob-grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ob-grade{background:var(--card);border:1.5px solid var(--b);border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:all .15s}
.ob-grade.sel{background:var(--p);border-color:var(--p);color:white}
.ob-btn{width:100%;background:var(--pg);border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;color:white;cursor:pointer;font-family:'Poppins',sans-serif}
.ob-btn:active{transform:scale(.97)}
.ob-skip{text-align:center;margin-top:12px;font-size:13px;color:var(--t2);cursor:pointer}
/* HOME */
.streak-card{margin:12px 14px 10px;background:linear-gradient(135deg,rgba(108,95,255,.15),rgba(165,148,255,.08));border:1px solid var(--b2);border-radius:20px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s}
.streak-card:active{transform:scale(.98)}
.streak-fire{font-size:38px;line-height:1;filter:drop-shadow(0 0 12px rgba(255,140,0,.5))}
.streak-num{font-family:'Poppins',sans-serif;font-size:40px;font-weight:900;letter-spacing:-.04em;line-height:1}
.streak-label{font-size:12px;color:var(--t2);margin-top:2px}
.streak-r{margin-left:auto;text-align:right;flex-shrink:0}
.garden-link{font-size:12px;color:var(--p);font-weight:600;display:flex;align-items:center;gap:3px;justify-content:flex-end}
.quote-box{margin:0 14px 12px;background:var(--pg);border-radius:18px;padding:16px;position:relative;overflow:hidden}
.quote-box::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.q-text{font-size:13px;font-style:italic;color:rgba(255,255,255,.95);line-height:1.65;margin-bottom:8px;position:relative}
.q-author{font-size:11px;color:rgba(255,255,255,.7);position:relative}
.q-save{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:5px 9px;color:white;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 12px}
.mc{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:14px;box-shadow:var(--sh);cursor:default}
.mc-val{font-family:'Poppins',sans-serif;font-size:28px;font-weight:900;letter-spacing:-.03em;line-height:1;margin-bottom:4px}
.mc-lbl{font-size:11px;color:var(--t2);font-weight:500}
.mc-hint{font-size:10px;color:var(--t3);margin-top:2px}
.ai-bubble{margin:0 14px 12px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:14px;box-shadow:var(--sh)}
.ai-badge{background:var(--pg);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;color:white;display:inline-block;margin-bottom:8px}
.ai-bubble-text{font-size:13px;line-height:1.6;color:var(--text)}
.ai-more{font-size:12px;color:var(--p);font-weight:600;margin-top:8px;cursor:pointer;display:inline-block}
.weekly{margin:0 14px 12px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:14px;box-shadow:var(--sh)}
.sec-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.bars{display:flex;align-items:flex-end;gap:5px;height:64px}
.b-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.b-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height 1s ease}
.b-lbl{font-size:9px;color:var(--t3)}
.plan-wrap{margin:0 14px 12px}
.plan-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-actions{display:flex;gap:6px;align-items:center}
.sec-action{font-size:12px;color:var(--p);font-weight:600;cursor:pointer}
.plan-list{background:var(--card);border:1px solid var(--b);border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.si{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b)}
.si:last-child{border-bottom:none}
.si-em{font-size:18px;flex-shrink:0}
.si-cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .2s}
.si-cb.done{background:var(--teal);border-color:var(--teal);color:white}
.si-cb.life{border-color:var(--amber)}
.si-cb.life.done{background:var(--amber);border-color:var(--amber);color:white}
.si-info{flex:1;min-width:0}
.si-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-title.done{text-decoration:line-through;color:var(--t2)}
.si-meta{display:flex;gap:5px;align-items:center;margin-top:2px}
.si-cat{font-size:10px;font-weight:600;padding:1px 7px;border-radius:5px}
.si-cat.study{background:rgba(108,95,255,.12);color:var(--p)}
.si-cat.life{background:rgba(255,179,71,.15);color:var(--amber)}
.si-time{font-size:12px;font-weight:700;color:var(--p);font-family:'Poppins',sans-serif;flex-shrink:0}
.si-del{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0}
/* AI CHAT */
.chat-shell{display:flex;flex-direction:column;height:calc(100dvh - 56px)}
.chat-hdr{background:var(--card);padding:10px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-av{width:38px;height:38px;border-radius:50%;background:var(--pg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 0 3px rgba(108,95,255,.18)}
.chat-name{font-size:15px;font-weight:700}
.chat-status{font-size:11px;color:var(--teal);display:flex;align-items:center;gap:4px;margin-top:1px}
.chat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.mic-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.mic-btn.rec{background:var(--red);border-color:var(--red);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.chat-tools{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--b);flex-shrink:0}
.chat-tools::-webkit-scrollbar{display:none}
.ct{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .15s}
.ct:active{background:rgba(108,95,255,.12);color:var(--p);border-color:var(--b2)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat-msgs::-webkit-scrollbar{display:none}
.cm{max-width:86%;animation:cmin .22s ease}
@keyframes cmin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cm.u{align-self:flex-end}
.cm.a{align-self:flex-start}
.cmb{padding:11px 14px;font-size:14px;line-height:1.6;border-radius:18px}
.cm.u .cmb{background:var(--pg);color:white;border-radius:18px 4px 18px 18px}
.cm.a .cmb{background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px}
.cmt{font-size:10px;color:var(--t3);margin-top:3px;padding:0 4px}
.cm.u .cmt{text-align:right}
.ext-tag{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--teal);margin-top:5px;display:inline-flex;align-items:center;gap:5px}
.typing{display:flex;gap:4px;padding:11px 14px;background:var(--card);border:1px solid var(--b);border-radius:4px 18px 18px 18px;width:fit-content;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input{background:var(--card);border-top:1px solid var(--b);padding:8px 10px calc(8px + env(safe-area-inset-bottom));flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg);border-radius:24px;padding:8px 8px 8px 14px;border:1px solid var(--b);transition:border-color .2s}
.chat-input-row:focus-within{border-color:var(--b2)}
.ci{flex:1;background:none;border:none;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;resize:none;max-height:100px;line-height:1.5;min-height:22px}
.ci::placeholder{color:var(--t3)}
.send-btn{background:var(--pg);border:none;width:36px;height:36px;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s}
.send-btn:active{transform:scale(.88)}
.send-btn:disabled{opacity:.35}
/* SCHEDULE */
.sched-seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin:12px 14px 8px;border:1px solid var(--b);gap:2px}
.ss{flex:1;background:none;border:none;border-radius:9px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .2s;font-family:'Inter',sans-serif}
.ss.on{background:var(--p);color:white}
.scat-row{display:flex;gap:6px;padding:0 14px 8px;overflow-x:auto}
.scat-row::-webkit-scrollbar{display:none}
.scat{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .15s}
.scat.on{background:var(--p);color:white;border-color:var(--p)}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 14px 8px}
.wd{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:6px 3px;text-align:center;cursor:pointer}
.wd.today{border-color:var(--p);background:rgba(108,95,255,.08)}
.wd-name{font-size:9px;color:var(--t2);font-weight:600;margin-bottom:2px}
.wd-num{font-size:14px;font-weight:700}
.wd-dot{width:4px;height:4px;border-radius:50%;background:var(--p);margin:3px auto 0}
/* GARDEN PAGE */
.garden-canvas-box{position:relative;height:280px;overflow:hidden}
.garden-canvas-box canvas{width:100%;height:100%;display:block}
.garden-hud{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}
.gpill{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:20px;padding:6px 12px;display:flex;align-items:center;gap:6px;color:white}
.gpill-val{font-family:'Poppins',sans-serif;font-size:15px;font-weight:800}
.gpill-lbl{font-size:10px;opacity:.75}
.g-tools{display:flex;gap:8px;justify-content:center;padding:12px 14px;background:var(--card);border-top:1px solid var(--b)}
.g-tool{flex:1;background:var(--card2);border:1px solid var(--b);border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s}
.g-tool:active{transform:scale(.94)}
.g-tool-i{font-size:22px;margin-bottom:4px}
.g-tool-l{font-size:10px;font-weight:600;color:var(--t2)}
.next-unlock{margin:10px 14px;background:rgba(108,95,255,.1);border:1px solid var(--b2);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px}
.unlock-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 14px 8px}
.ui{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:10px;display:flex;align-items:center;gap:8px}
.ui.done{background:rgba(0,200,150,.08);border-color:rgba(0,200,150,.2)}
.ui-em{font-size:20px;opacity:.35}
.ui.done .ui-em{opacity:1}
.ui-txt{font-size:11px;color:var(--t2)}
.ui.done .ui-txt{color:var(--teal);font-weight:600}
/* SUBJECTS */
.subj-card{margin:0 14px 8px;background:var(--card);border:1px solid var(--b);border-radius:18px;overflow:hidden;box-shadow:var(--sh)}
.subj-accent{height:3px}
.subj-body{padding:14px}
.subj-r1{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.subj-emoji{font-size:26px}
.subj-name{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;flex:1}
.subj-avg{font-family:'Poppins',sans-serif;font-size:24px;font-weight:900}
.sparkline{display:flex;align-items:flex-end;gap:3px;height:26px;margin-bottom:6px}
.sp-bar{width:12px;border-radius:3px 3px 0 0;min-height:3px}
.subj-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:10px}
.subj-btns{display:flex;gap:6px}
.sbtn{flex:1;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s}
.sbtn.p{background:rgba(108,95,255,.12);color:var(--p)}
.sbtn.t{background:rgba(0,200,150,.12);color:var(--teal)}
.sbtn.r{background:rgba(255,107,107,.12);color:var(--red)}
/* FLASHCARD */
.fc-wrap{padding:14px}
.fc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.fc-count{font-size:12px;color:var(--t2)}
.fc-topic{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--t2)}
.fc-stack{position:relative;height:220px;margin-bottom:14px;cursor:pointer}
.game-fmt{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:10px 6px;cursor:pointer}
.game-fmt.on{border-color:var(--p);background:rgba(108,95,255,.08)}
.game-opt{background:var(--bg);border:1.5px solid var(--b);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:500}
.game-opt.sel{border-color:var(--p);background:rgba(108,95,255,.08)}

async function init(){
  if(tg?.initDataUnsafe?.user){const u=tg.initDataUnsafe.user;try{await POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username})}catch{}}
  try{
    S.user=await GET('/api/user')
    applyTheme(S.user.theme||'dark')
    if(!S.user.grade&&S.user.role!=='parent'){S.onboarding=true;S.obStep=0;render();return}
    if(S.user.role==='parent'){await loadParent();render();return}
    await loadAll();render()
  }catch{renderLogin()}
}

function renderOnboarding(){
  const steps=[
    {title:t('ob1_t'),sub:t('ob1_s'),cta:t('lets_start'),type:'info',skip:true},
    {title:t('ob2_t'),sub:t('ob2_s'),cta:'Keyingi →',type:'info',skip:true},
    {title:'Siz kimsiz?',sub:'Bu StudyMind tajribangizni belgilaydi.',cta:'Keyingi →',type:'role',skip:false},
    {title:t('ob3_t'),sub:t('ob3_s'),cta:'Keyingi →',type:'name',skip:false},

  ]
  if(S.obRole==='parent') steps.push({title:'Oilani ulang',sub:"Farzandingiz bergan taklif kodini kiriting, yoki keyinroq ulang.",cta:t('lets_start'),type:'family',skip:false})
  const step=steps[S.obStep]
  document.getElementById('root').innerHTML=`<div class="ob-wrap">
    <div class="ob-canvas-wrap"><canvas id="ob-canvas"></canvas><div class="ob-fade"></div></div>
    <div class="ob-body">
      <div class="ob-dots">${steps.map((_,i)=>`<div class="ob-dot ${i===S.obStep?'on':''}"></div>`).join('')}</div>
      <div class="ob-title">${step.title}</div>
      ${step.sub?`<div class="ob-sub">${step.sub}</div>`:''}
      ${step.type==='role'?`<div class="ob-grade-grid" style="grid-template-columns:1fr 1fr">
        <div class="ob-grade ${S.obRole==='student'?'sel':''}" style="padding:18px 12px" onclick="S.obRole='student';render()">🎓<br><br>O'quvchi</div>
        <div class="ob-grade ${S.obRole==='parent'?'sel':''}" style="padding:18px 12px" onclick="S.obRole='parent';render()">👪<br><br>Ota-ona</div>
      </div>`:''}
      ${step.type==='name'?`<input class="ob-inp" id="ob-name" placeholder="Ismingiz..." value="${S.obName}" oninput="S.obName=this.value" autofocus>`:''}
      ${step.type==='grade'?`<div class="ob-grade-grid">
        ${['8-sinf','9-sinf','10-sinf','11-sinf','1-kurs','2-kurs'].map(g=>`<div class="ob-grade ${S.obGrade===g?'sel':''}" onclick="S.obGrade='${g}';render()">${g}</div>`).join('')}
      </div>`:''}
      ${step.type==='family'?`
        <div class="field"><label>Taklif kodi (bo'lsa)</label><input class="ob-inp" id="ob-invite" placeholder="ABC123" style="text-transform:uppercase" oninput="S.obInvite=this.value.toUpperCase()" value="${S.obInvite||''}"></div>
      `:''}
      <button class="ob-btn" onclick="obNext()">${step.cta}</button>
      ${step.skip?`<div class="ob-skip" onclick="obSkip()">${t('already')}</div>`:''}
    </div>
  </div>`
  setTimeout(()=>{
    const c=document.getElementById('ob-canvas')
    if(c&&window.StudyMindGarden)window.StudyMindGarden.init(c,{streak:0,xp:0,grade:0})
  },80)
}

async function obNext(){
  const totalSteps=S.obRole==='parent'?6:5
  const isNameStep=S.obStep===3
  const isLastStep=S.obStep===totalSteps-1
  if(isNameStep&&!S.obName.trim()){toast('Ismingizni kiriting');return}
  if(S.obStep===2&&!S.obRole){toast('Tanlang');return}

  if(isLastStep){
    await PUT('/api/user',{name:S.obName||S.user.name,grade:S.obGrade||'',role:S.obRole||'student'})
    S.user.name=S.obName||S.user.name;S.user.grade=S.obGrade||'';S.user.role=S.obRole||'student'
    if(S.obRole==='parent'){
      if(S.obInvite?.trim()){
        try{await POST('/api/family/join',{inviteCode:S.obInvite.trim()})}catch{toast('⚠️ Kod topilmadi, keyinroq urinib ko\'ring')}
      } else {
        try{await POST('/api/family/create',{})}catch{}
      }
      S.onboarding=false;await loadParent();render();return
    }
    S.onboarding=false;await loadAll();render();return
  }
  S.obStep++;render()
}
function obSkip(){S.onboarding=false;loadAll().then(()=>render())}

function notes(){
  const subjects=[...new Set(S.notes.map(n=>n.subjectName).filter(Boolean))]
  const filtered=S.notes.filter(n=>{
    if(S.notesFilter==='pinned') return n.isPinned
    if(S.notesFilter!=='all') return n.subjectName===S.notesFilter
    if(S.notesSearch) return n.title?.toLowerCase().includes(S.notesSearch.toLowerCase())||n.content?.toLowerCase().includes(S.notesSearch.toLowerCase())
    return true
  })
  return`
    <div style="padding:12px 14px 0;display:flex;gap:6px">
      <button class="btn-sm p" onclick="openModal('addNote')">+ Yangi</button>
      <button class="btn-sm t" onclick="openModal('quickNote')">⚡ Tez yozish</button>
    </div>
    <div class="notes-search">
      <span>🔍</span>
      <input placeholder="Qidirish..." value="${S.notesSearch}" oninput="S.notesSearch=this.value;render()">
      ${S.notesSearch?`<span onclick="S.notesSearch='';render()" style="cursor:pointer;color:var(--t2)">×</span>`:''}
    </div>
    <div class="notes-filters">
      <div class="nf ${S.notesFilter==='all'?'on':''}" onclick="S.notesFilter='all';render()">Hammasi</div>
      <div class="nf ${S.notesFilter==='pinned'?'on':''}" onclick="S.notesFilter='pinned';render()">📌 Pinlangan</div>
      ${subjects.map(s=>`<div class="nf ${S.notesFilter===s?'on':''}" onclick="S.notesFilter='${s}';render()">${s}</div>`).join('')}
    </div>
    ${filtered.map(n=>`<div class="note-card" style="border-left-color:${n.color}">
      <div class="note-top">
        <div class="note-title">${n.title}</div>
        <div class="note-acts">
          <button onclick="pinNote('${n._id}',${!n.isPinned})">${n.isPinned?'📌':'📍'}</button>
          <button onclick="editNoteAction('${n._id}')">✏️</button>
          <button onclick="summarizeNote('${n._id}')">🧠</button>
          <button onclick="delNote('${n._id}')">×</button>
        </div>
      </div>
      ${n.content?`<div class="note-body">${n.content.slice(0,200)}${n.content.length>200?'...':''}</div>`:''}
      <div class="note-footer">
        <span class="note-date">${new Date(n.updatedAt||n.createdAt).toLocaleDateString()}</span>
        ${n.subjectName?`<span class="note-subj">${n.subjectName}</span>`:''}
      </div>
    </div>`).join('')}
    ${!filtered.length?`<div class="empty"><div class="empty-i">📝</div><div class="empty-t">${t('notes')}</div><div class="empty-s">Dars paytida o'rgangan narsangizni yozing</div><button class="btn-sm t" onclick="openModal('quickNote')">⚡ Tez yozish</button></div>`:''}
    <div class="space"></div>`
}

async function genGame(){
  const subjSel=document.getElementById('game-subj')?.value
  if(!subjSel){toast('Avval fan tanlang');return}
  const[subjectId,subjectName]=subjSel.split('|')
  if(!S.selFormat){toast("O'yin turini tanlang");return}
  S.gameGenLoading=true;render()
  try{
    const set=await POST('/api/games/generate',{subjectId,subjectName,format:S.selFormat,count:6})
    S.gameSets=[set,...(S.gameSets||[])]
    openGame(set._id)
  }catch{toast('❌ Yaratilmadi')}
  S.gameGenLoading=false;render()
}
async function openGame(id){
  const set=(S.gameSets||[]).find(g=>g._id===id)||await GET('/api/games/'+id)
  S.activeGame={set,idx:0,answers:{},submitted:false,score:null}
  render()
}
function closeGame(){S.activeGame=null;render()}
function gameSelectAnswer(val){if(!S.activeGame)return;S.activeGame.answers[S.activeGame.idx]=val;render()}
function gameNext(){
  if(!S.activeGame)return
  if(S.activeGame.idx<S.activeGame.set.items.length-1){S.activeGame.idx++;render()}
  else gameSubmit()
}
async function gameSubmit(){
  const g=S.activeGame;if(!g)return
  let correct=0
  g.set.items.forEach((it,i)=>{if(String(g.answers[i]||'').trim().toLowerCase()===String(it.correctAnswer).trim().toLowerCase())correct++})
  const score=Math.round((correct/g.set.items.length)*100)
  g.score=score;g.submitted=true;render()
  try{const r=await POST('/api/games/'+g.set._id+'/submit',{score});if(r.newAchievements?.length)celebrate('🏆','Yangi yutuq!',r.newAchievements[0])}catch{}
}
function gamePlayView(){
  const g=S.activeGame
  if(g.submitted) return`
    <div style="margin:14px;background:var(--pg);border-radius:20px;padding:24px;text-align:center">
      <div style="font-family:'Poppins',sans-serif;font-size:42px;font-weight:900;color:white">${g.score}%</div>
      <div style="font-size:13px;color:rgba(255,255,255,.85)">${t('your_score')}</div>
    </div>
    <div style="padding:0 14px"><button class="btn-sm p" style="width:100%" onclick="closeGame()">${t('play_again')}</button></div>
    <div class="space"></div>`
  const it=g.set.items[g.idx]
  const total=g.set.items.length
  return`
    <div style="padding:0 14px 10px;display:flex;align-items:center;gap:8px">
      <div class="icon-btn" onclick="closeGame()">←</div>
      <div style="flex:1;height:4px;background:var(--b);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--pg);width:${((g.idx+1)/total)*100}%"></div></div>
      <div style="font-size:11px;color:var(--t2)">${g.idx+1}/${total}</div>
    </div>
    <div style="margin:0 14px 14px;background:var(--card);border:1px solid var(--b);border-radius:18px;padding:18px;box-shadow:var(--sh)">
      <div style="font-size:15px;font-weight:600;margin-bottom:14px;line-height:1.5">${it.question}</div>
      ${gameItemInput(it,g)}
    </div>
    <div style="padding:0 14px"><button class="btn-sm p" style="width:100%" onclick="gameNext()">${g.idx<total-1?t('next_q'):t('check_answer')}</button></div>
    <div class="space"></div>`
}
function gameItemInput(it,g){
  const ans=g.answers[g.idx]
  if(it.options?.length) return it.options.map(o=>`<div class="game-opt ${ans===o?'sel':''}" onclick="gameSelectAnswer('${o.replace(/'/g,"\\'")}')">${o}</div>`).join('')
  if(it.pairs?.length) return it.pairs.map((p,i)=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px"><div style="flex:1;background:var(--bg);border-radius:8px;padding:8px">${p.left}</div><div style="flex:1;background:var(--bg);border-radius:8px;padding:8px">${p.right}</div></div>`).join('')+`<div style="font-size:11px;color:var(--t2);margin-top:6px">Juftliklarni o'qib chiqing</div>`
  return`<input id="game-input" placeholder="Javobingiz..." value="${ans||''}" oninput="gameSelectAnswer(this.value)" style="width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:10px;color:var(--text);padding:12px 14px;font-size:14px;outline:none">`
}

function confetti(){
  const cv=document.getElementById('cc');if(!cv) return
  cv.width=window.innerWidth;cv.height=window.innerHeight
  const ctx2=cv.getContext('2d')
  const particles=Array.from({length:80},()=>({x:Math.random()*cv.width,y:-10,vx:(Math.random()-0.5)*6,vy:Math.random()*6+2,color:['#6c5fff','#00c896','#ffb347','#ff6b6b','#ff85c0','#a594ff'][Math.floor(Math.random()*6)],r:4+Math.random()*5}))
  let t=0
  function draw(){
    if(t>80) return
    ctx2.clearRect(0,0,cv.width,cv.height)
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;ctx2.fillStyle=p.color;ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2.fill()})
    t++;requestAnimationFrame(draw)
  }
  draw()
}

async function sendChat(){
  const inp=document.getElementById('ci'),msg=inp?.value?.trim()
  if(!msg||S.aiLoading) return
  S.chatMsgs.push({role:'user',content:msg,time:nowT(),extracted:null});inp.value='';if(inp)inp.style.height='auto'
  S.aiLoading=true;render();scrollChat()
  try{
    const r=await POST('/api/chat',{message:msg})
    S.chatMsgs.push({role:'assistant',content:r.reply,time:nowT(),extracted:r.extracted})
    if(r.savedSchedule)S.schedule.push(r.savedSchedule)
    if(r.savedCards?.length){S.flashcards=await GET('/api/flashcards?dueOnly=true');S.fcIdx=0;S.fcRev=false}
    if(r.leveledUp)celebrate('⬆️',`Lv.${r.level} ga yetdingiz!`,'Yangi daraja!');
    else if(r.newAchievements?.length)celebrate('🏆',r.newAchievements[0],'Yangi yutuq!');
    if(r.gardenLevel!==undefined&&S.user)S.user.streak=r.streak
    S.stats=await GET('/api/stats');S.subjects=await GET('/api/subjects');S.user=await GET('/api/user')
  }catch{S.chatMsgs.push({role:'assistant',content:'❌ Xatolik.',time:nowT(),extracted:null})}
  S.aiLoading=false;render();scrollChat()
}

function autosize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}

function toggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){toast('❌ Chrome ishlatng');return}
  if(S.isRecording){if(S.recognition){S.recognition.stop();S.recognition=null}S.isRecording=false;render();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  S.recognition=new SR()
  S.recognition.lang=S.user?.lang==='ru'?'ru-RU':S.user?.lang==='en'?'en-US':'uz-UZ'
  S.recognition.continuous=true;S.recognition.interimResults=true
  S.recognition.onresult=e=>{
    let final='',interim=''
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript}
    const inp=document.getElementById('ci');if(inp){inp.value=final||interim;autosize(inp)}
    if(final){S.isRecording=false;if(S.recognition){S.recognition.stop();S.recognition=null};render();setTimeout(()=>sendChat(),300)}
  }
  S.recognition.onerror=e=>{toast('❌ '+e.error);S.isRecording=false;S.recognition=null;render()}
  S.recognition.onend=()=>{if(S.isRecording){S.isRecording=false;render()}}
  try{S.recognition.start();S.isRecording=true;render();toast('🎤 Gapiring...')}catch{toast('❌ Mikrofon ishlamadi')}
}
