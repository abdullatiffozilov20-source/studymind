<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: #FBEFE8; font-family: -apple-system, 'Segoe UI', sans-serif; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #FFF9F6; display: flex; flex-direction: column; position: relative; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }

.baloo { font-family: Georgia, serif; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 20px 10px; }
.topbar-left { display: flex; align-items: center; }
.backbtn { border: none; background: #FFE1EC; width: 34px; height: 34px; border-radius: 17px;

           font-size: 18px; color: #B4497A; line-height: 1; }
.topbar-title { font-size: 21px; font-weight: 600; color: #5B3A56; }
.addbtn { border: none; background: #D4537E; color: #fff; width: 34px; height: 34px; border-radius: 17px;
          display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; }
.screen { padding: 0 0 100px; }
.content { padding: 0 20px; }

.hero-time { background: linear-gradient(135deg,#FFE1EC,#E4E0FF); border-radius: 28px; padding: 28px 20px; text-align: center; }
.card-row { margin-top: 16px; background: #FFF3E3; border-radius: 22px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.card-purple { margin-top: 12px; background: #F1ECFF; border-radius: 22px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.mem-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
.mem-chip { min-width: 100px; border-radius: 18px; padding: 14px 10px; text-align: center; flex-shrink: 0; cursor: pointer; }
.mem-tile { border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.mem-tile-main { display: flex; align-items: center; gap: 14px; flex: 1; cursor: pointer; }
.mem-icon { width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
.mem-icon img { width: 100%; height: 100%; object-fit: cover; }
.gallery { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; }
.gallery-item { position: relative; flex-shrink: 0; }
.gallery-item img { width: 90px; height: 90px; object-fit: cover; border-radius: 14px; }
.gallery-del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 11px; background: #5B3A56; color: #fff; border: none; font-size: 12px; display: flex; align-items: center; justify-content: center; }

.track-row { border-radius: 18px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.track-icon { width: 36px; height: 36px; border-radius: 18px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.track-link { display: inline-block; margin-top: 6px; font-size: 11px; color: #D4537E; text-decoration: none; }

.letter-row { background: #FFF3E3; border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.letter-row-main { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
.letter-open { background: #FFF9F6; border: 1.5px dashed #F0B8CE; border-radius: 22px; padding: 28px 20px; min-height: 200px; }

.segment { display: flex; background: #FFF3E3; border-radius: 16px; padding: 4px; margin-bottom: 16px; overflow-x: auto; }
.segment button { flex: 1; border: none; border-radius: 12px; padding: 9px 4px; font-size: 11.5px; background: transparent; color: #B79AAE; white-space: nowrap; }
.segment button.active { background: #FFFFFF; color: #D4537E; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }

.timeline { position: relative; padding-left: 18px; }
.timeline::before { content: ""; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: #F5D6E4; }
.timeline-item { position: relative; margin-bottom: 18px; display: flex; align-items: flex-start; justify-content: space-between; }
.timeline-dot { position: absolute; left: -18px; top: 3px; width: 10px; height: 10px; border-radius: 5px; background: #D4537E; }

.folder-block { background: #FFF3E3; border-radius: 18px; margin-bottom: 12px; padding: 14px 16px; }
.folder-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.folder-title { font-family: Georgia, serif; font-size: 14px; color: #5B3A56; margin: 0; }
.folder-count { font-size: 10px; color: #B4497A; }
.folder-body { margin-top: 10px; }
.bucket-row { display: flex; align-items: center; gap: 10px; border-radius: 16px; padding: 10px 12px; margin-bottom: 8px; background: #FFFDFB; }
.bucket-check { width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; color: #fff; border: 1.5px solid #E7C7D4; background: #fff; }
.bucket-check.done { background: #4FBF9B; border-color: #4FBF9B; }
.add-item-row { display: flex; gap: 8px; margin-top: 4px; }
.add-item-row input { flex: 1; border: 1px solid #F0B8CE; border-radius: 10px; padding: 8px 10px; font-size: 12px; }
.add-item-row button, .add-folder-btn { border: none; background: #D4537E; color: #fff; border-radius: 10px; padding: 8px 12px; font-size: 12px; }
.add-folder-btn { width: 100%; margin-top: 4px; background: #FFFFFF; color: #D4537E; border: 1.5px dashed #F0B8CE; }

.icon-btn { border: none; background: transparent; color: #C9A9BB; font-size: 13px; padding: 4px 6px; flex-shrink: 0; }
.icon-btn.danger { color: #D4537E; }
.row-actions { display: flex; gap: 2px; flex-shrink: 0; }

.gender-btn { border: none; background: #FFF3E3; border-radius: 20px; padding: 22px 26px; display: flex; flex-direction: column; align-items: center; gap: 6px; }

.stage-block { border-radius: 18px; margin-bottom: 12px; overflow: hidden; }
.stage-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
.stage-body { padding: 0 14px 14px; }
.cat-title { font-size: 11px; color: #B4497A; font-weight: 600; margin: 6px 0; }
.q-row { background: #FFFDFB; border: 1px solid #F5E3EA; border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; }
.q-text { margin: 0; font-size: 12.5px; color: #5B3A56; font-weight: 500; }
.q-answer { margin: 4px 0 0; font-size: 12px; color: #7A5670; cursor: pointer; }
.q-placeholder { margin: 4px 0 0; font-size: 12px; color: #C9B7C2; font-style: italic; cursor: pointer; }
.q-answer-ro { margin: 4px 0 0; font-size: 12px; }
.q-textarea { width: 100%; box-sizing: border-box; border: 1px solid #F0B8CE; border-radius: 10px; padding: 8px; font-size: 12px; color: #5B3A56; resize: none; margin-top: 6px; }
.q-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.q-cancel { border: none; background: transparent; color: #B79AAE; font-size: 11px; }
.q-save { border: none; background: #D4537E; color: #fff; border-radius: 10px; padding: 5px 12px; font-size: 11px; }

.link-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #4FBF9B; background: #DBF7EF; padding: 4px 10px; border-radius: 10px; margin-bottom: 10px; }
.link-badge.pending { color: #B4497A; background: #FFE1EC; }

.task-row { background: #FFF3E3; border-radius: 18px; padding: 14px 16px; margin-bottom: 10px; }
.task-row.done { background: #DBF7EF; }
.task-text { margin: 0; font-size: 13px; color: #5B3A56; font-weight: 500; }
.task-reward { margin: 6px 0 0; font-size: 12px; color: #B4497A; }
.task-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.task-done-btn { border: none; background: #D4537E; color: #fff; border-radius: 10px; padding: 6px 12px; font-size: 11.5px; }
.task-done-btn.completed { background: #4FBF9B; }
.reward-pop { text-align: center; font-size: 12px; color: #4FBF9B; margin-top: 4px; }

.bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
             background: #FFFDFB; border-top: 1px solid #F5E3EA; display: flex; justify-content: space-around;
             padding: 12px 8px calc(14px + env(safe-area-inset-bottom)); }
.nav-btn { border: none; background: transparent; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-emoji { font-size: 18px; }
.nav-label { font-size: 9px; color: #C9B7C2; }
.nav-label.active { color: #D4537E; font-weight: 600; }

/* onboarding */
.onboard-wrap { display: flex; flex-direction: column; justify-content: space-between; min-height: 100vh; padding: 40px 28px 30px; text-align: center; }
.onboard-emoji { font-size: 56px; margin-bottom: 18px; }
.onboard-title { font-family: Georgia, serif; font-size: 22px; color: #5B3A56; margin: 0 0 10px; }
.onboard-text { font-size: 13.5px; color: #8A6E80; line-height: 1.6; }
.onboard-dots { display: flex; justify-content: center; gap: 6px; margin: 18px 0; }
.onboard-dot { width: 7px; height: 7px; border-radius: 4px; background: #F0D5E1; }
.onboard-dot.active { background: #D4537E; width: 18px; }
.onboard-actions { display: flex; justify-content: space-between; align-items: center; }
.onboard-skip { border: none; background: transparent; color: #B79AAE; font-size: 13px; }
.onboard-next { border: none; background: #D4537E; color: #fff; border-radius: 20px; padding: 12px 26px; font-size: 14px; font-family: Georgia, serif; }

/* forms */
.form-field { margin-bottom: 14px; text-align: left; }
.form-label { font-size: 11.5px; color: #B4497A; font-weight: 600; margin-bottom: 5px; display: block; }
.form-input, .form-textarea { width: 100%; border: 1px solid #F0B8CE; border-radius: 12px; padding: 10px 12px; font-size: 13px; color: #5B3A56; }
.form-textarea { resize: none; }
.emoji-pick { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.emoji-pick button { border: 1.5px solid #F0D5E1; background: #FFFDFB; border-radius: 12px; width: 36px; height: 36px; font-size: 16px; }
.emoji-pick button.active { border-color: #D4537E; background: #FFE1EC; }
.emoji-hint { font-size: 10.5px; color: #B79AAE; margin-top: 4px; }
.setup-screen { padding: 30px 26px; text-align: center; }
.setup-title { font-family: Georgia, serif; font-size: 20px; color: #5B3A56; margin: 0 0 6px; }
.setup-sub { font-size: 12.5px; color: #8A6E80; margin: 0 0 22px; }
.primary-btn { border: none; background: #D4537E; color: #fff; border-radius: 16px; padding: 13px 0; width: 100%; font-size: 14px; font-family: Georgia, serif; margin-top: 6px; }
.ghost-btn { border: none; background: transparent; color: #B79AAE; font-size: 12.5px; padding: 10px 0; width: 100%; }
.code-box { background: #F1ECFF; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.code-value { font-family: Georgia, serif; font-size: 24px; letter-spacing: 4px; color: #5B3A56; margin: 4px 0; }

/* modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(44,36,48,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
.modal-sheet { background: #FFF9F6; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 20px 22px calc(24px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; }
.modal-title { font-family: Georgia, serif; font-size: 17px; color: #5B3A56; margin: 0 0 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.modal-cancel { flex: 1; border: none; background: #FFF3E3; color: #8A6E80; border-radius: 14px; padding: 12px 0; font-size: 13px; }
.modal-save { flex: 1; border: none; background: #D4537E; color: #fff; border-radius: 14px; padding: 12px 0; font-size: 13px; }

/* memory carousel */
.carousel { position: relative; margin-bottom: 12px; }
.carousel-img-wrap { width: 100%; height: 240px; border-radius: 18px; overflow: hidden; background: #FFF3E3; position: relative; }
.carousel-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.25s ease; }
.carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 16px;
                  background: rgba(255,255,255,0.85); border: none; font-size: 16px; color: #B4497A; display: flex; align-items: center; justify-content: center; }
.carousel-arrow.left { left: 8px; }
.carousel-arrow.right { right: 8px; }
.carousel-del { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 14px; background: rgba(44,36,48,0.55); color: #fff; border: none; font-size: 13px; }
.carousel-dots { display: flex; justify-content: center; gap: 5px; margin-top: 8px; }
.carousel-dot { width: 6px; height: 6px; border-radius: 3px; background: #F0D5E1; }
.carousel-dot.active { background: #D4537E; width: 14px; }

/* all pictures grid */
.pic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pic-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; }

/* audio */
.audio-player { width: 100%; margin-top: 8px; height: 32px; }

/* home hero slideshow */
.hero-time { position: relative; overflow: hidden; border-radius: 28px; padding: 28px 20px; text-align: center; background: linear-gradient(135deg,#FFE1EC,#E4E0FF); }
.hero-slide-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; }
.hero-slide-img.show { opacity: 0.38; }
.hero-time-content { position: relative; z-index: 1; }

/* pairing code chip (persistent) */
.mycode-chip { display: flex; align-items: center; justify-content: space-between; background: #F1ECFF; border-radius: 14px; padding: 10px 14px; margin-bottom: 12px; }
.mycode-chip .code-value-sm { font-family: Georgia, serif; font-size: 16px; letter-spacing: 2px; color: #5B3A56; }

/* selectable question row */
.q-row.selectable { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.q-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid #E7C7D4; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; }
.q-checkbox.checked { background: #D4537E; border-color: #D4537E; }
.stage-label-plain { font-family: Georgia, serif; font-size: 13px; color: #5B3A56; margin: 14px 0 6px; }

</style>
</head>

      note: "Bular faqat ikkalasi ham tayyor boʻlganda, hech kim majburlamasdan soʻralishi kerak.",
      sensitive: true,
      categories: [
        { title: "Oldingi tajriba", questions: ["Oldingi munosabatlari haqida gapirishga tayyormi", "Bu mavzudan nima saboq olgan"] },
        { title: "Komplekslar", questions: ["Oʻzi haqida noqulay his qiladigan narsa bormi (ixtiyoriy)"] },
        { title: "Ogʻir xotiralar", questions: ["Ulashishni xohlagan ogʻir voqea bormi (ixtiyoriy)"] },
      ],
    },
  ],
};

</script>
<script>
/* app.js — vanilla JS, hech qanday tashqi kutubxona shart emas. */

const D = window.APP_DATA;

function safeGet(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { /* to'liq yoki bloklangan */ }
}
function esc(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
}
function uid(list) { return (list.reduce((m, x) => Math.max(m, x.id), 0) || 0) + 1; }
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
const MONTHS = ["Yan", "Fev", "Mar", "Apr", "May", "Iyun", "Iyul", "Avg", "Sen", "Okt", "Noy", "Dek"];
function formatDate(d) {
  if (!d) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(d);
  if (!m) return d;
  return `${parseInt(m[3], 10)} ${MONTHS[parseInt(m[2], 10) - 1]}`;
}

const state = {
  tab: "home",
  screen: "main",
  onboardIdx: 0,

  gender: safeGet("couple_gender", null),
  myName: safeGet("couple_myname", ""),
  partnerName: safeGet("couple_partnername", ""),
  meetDate: safeGet("couple_meetdate", ""),
  greetingNickname: safeGet("couple_greeting_nickname", ""),
  myCode: safeGet("couple_mycode", null),
  partnerCodeEntered: safeGet("couple_partner_code_entered", ""),
  linked: safeGet("couple_linked", false),
  onboardSeen: safeGet("couple_onboard_seen", false),
  appStarted: safeGet("couple_app_started", false),

  profileTab: "pick", // pick | incoming | partnerAnswers
  openStages: { 1: true },
  editingKey: null,
  myAnswers: safeGet("couple_my_answers", {}),
  partnerAnswers: safeGet("couple_partner_answers", D.defaultPartnerAnswers),
  selectedByMe: safeGet("couple_selected_by_me", []),
  selectedByPartner: safeGet("couple_selected_by_partner", D.defaultSelectedByPartner),

  memories: safeGet("couple_memories", D.memories),
  letters: safeGet("couple_letters", D.letters),
  tracks: safeGet("couple_tracks", D.tracks),
  timeline: safeGet("couple_timeline", D.timeline),
  plans: safeGet("couple_plans", D.plans),
  bucket: safeGet("couple_bucket", D.bucket),
  tasks: safeGet("couple_tasks", D.tasks),

  timeMode: "timeline",
  letterOpenId: null,
  memoryDetailId: null,
  memoryCarouselIndex: {},
  openFolders: {},
  editingItem: null,

  modal: null,
};

let heroSlideTimer = null;
let heroImages = [];
let heroIdx = 0;

function persistAll() {
  safeSet("couple_memories", state.memories);
  safeSet("couple_letters", state.letters);
  safeSet("couple_tracks", state.tracks);
  safeSet("couple_timeline", state.timeline);
  safeSet("couple_plans", state.plans);
  safeSet("couple_bucket", state.bucket);
  safeSet("couple_tasks", state.tasks);
  safeSet("couple_my_answers", state.myAnswers);
  safeSet("couple_selected_by_me", state.selectedByMe);
}

function genderConfig() {
  return D.genderIcons[state.gender] || D.genderIcons.default;
}

/* ---------- top bar ---------- */

function renderTopBar(title, opts) {
  opts = opts || {};
  return `
    <div class="topbar">
      <div class="topbar-left">
        ${opts.hasBack ? `<button class="backbtn" data-action="${opts.backAction || 'back'}">‹</button>` : ""}
        <span class="topbar-title baloo">${esc(title)}</span>
      </div>
      ${opts.addAction ? `<button class="addbtn" data-action="${opts.addAction}">+</button>` : ""}
    </div>`;
}

function emptyState(text) {
  return `<p style="text-align:center;color:#B79AAE;font-size:12.5px;margin-top:30px">${esc(text)}</p>`;
}

/* ================= HOME ================= */

function allMemoryImages() {
  const out = [];
  state.memories.forEach(m => (m.images || []).forEach(img => out.push(img)));
  return out;
}

function renderHome() {
  const gc = genderConfig();
  const greetName = state.greetingNickname || state.myName;
  const memChips = state.memories.slice(0, 3).map(m => `
    <div class="mem-chip" style="background:${m.color}" data-action="openMemory" data-id="${m.id}">
      <div style="font-size:22px">${(m.images && m.images[0]) ? `<img src="${m.images[0]}" style="width:32px;height:32px;object-fit:cover;border-radius:8px">` : m.emoji}</div>
      <p style="font-size:11px;color:#7A5670;margin:6px 0 0;font-weight:500">${esc(m.title)}</p>
      <p style="font-size:10px;color:#B79AAE;margin:0">${esc(formatDate(m.date))}</p>
    </div>`).join("");

  return `
    <div class="screen">
      ${renderTopBar("", {})}
      <div class="content">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;cursor:pointer" data-action="openProfileEntry">
          <div style="width:36px;height:36px;border-radius:18px;background:#FFE1EC;display:flex;align-items:center;justify-content:center;font-size:17px">${gc.icon}</div>
          <p class="baloo" style="font-size:21px;color:#5B3A56;margin:0">Xayrli tong${greetName ? ", " + esc(greetName) : ""} ${gc.sun}</p>
        </div>
        <p style="font-size:13px;color:#B79AAE;margin:0 0 20px">10-iyul, juma</p>

        <div class="hero-time">
          <img class="hero-slide-img" id="heroSlideImg" src="">
          <div class="hero-time-content">
            <p style="font-size:12px;color:#8A5C78;margin:0;letter-spacing:1px">BIRGA OʻTGAN VAQT</p>
            <p class="baloo" style="font-size:42px;color:#5B3A56;margin:4px 0">171 kun</p>
            <p style="font-size:12px;color:#8A5C78;margin:0">4,104 soat · 246,240 daqiqa</p>
          </div>
        </div>

        <div class="card-row" data-action="goTab" data-tab="letters">
          <div style="font-size:22px">💭</div>
          <div>
            <p style="margin:0;font-size:13px;font-weight:500;color:#5B3A56">Bugungi savol</p>
            <p style="margin:0;font-size:12px;color:#B79AAE">Bugun sizni nima tabassum qildirdi?</p>
          </div>
        </div>

        <div class="card-purple" data-action="openProfileEntry">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:20px">🗂️</div>
            <div>
              <p style="margin:0;font-size:13px;font-weight:500;color:#5B3A56">Mening profilim</p>
              <p style="margin:0;font-size:12px;color:#B79AAE">${state.linked ? "Sherigingiz bilan ulangansiz" : "Bir-birimizni yaqinroq bilib olamiz"}</p>
            </div>
          </div>
          <span style="color:#B79AAE;font-size:16px">›</span>
        </div>

        <p class="baloo" style="font-size:15px;color:#5B3A56;margin:22px 0 10px">Soʻnggi xotiralar</p>
        <div class="mem-strip">${memChips || emptyState("Hali xotira yoʻq")}</div>
      </div>
    </div>`;
}

function startHeroSlideshow() {
  clearInterval(heroSlideTimer);
  heroImages = allMemoryImages();
  const imgEl = document.getElementById("heroSlideImg");
  if (!imgEl || !heroImages.length) return;
  heroIdx = 0;
  imgEl.src = heroImages[0];
  requestAnimationFrame(() => imgEl.classList.add("show"));
  if (heroImages.length < 2) return;
  heroSlideTimer = setInterval(() => {
    const el = document.getElementById("heroSlideImg");
    if (!el) { clearInterval(heroSlideTimer); return; }
    el.classList.remove("show");
    setTimeout(() => {
      heroIdx = (heroIdx + 1) % heroImages.length;
      el.src = heroImages[heroIdx];
      requestAnimationFrame(() => el.classList.add("show"));
    }, 350);
  }, 4000);
}

/* ================= MEMORIES ================= */

function renderMem() {
  const tiles = state.memories.map(m => `
    <div class="mem-tile" style="background:${m.color}">
      <div class="mem-tile-main" data-action="openMemory" data-id="${m.id}">
        <div class="mem-icon">${(m.images && m.images[0]) ? `<img src="${m.images[0]}">` : m.emoji}</div>
        <div>
          <p style="margin:0;font-size:14px;font-weight:500;color:#5B3A56">${esc(m.title)}</p>
          <p style="margin:0;font-size:11px;color:#8A6E80">${esc(formatDate(m.date))}${m.note ? " · yozuv bor" : ""}${m.images && m.images.length ? ` · ${m.images.length} rasm` : ""}</p>
        </div>
      </div>
      <div class="row-actions">
        <button class="icon-btn danger" data-action="deleteMemory" data-id="${m.id}">🗑</button>
      </div>
    </div>`).join("");
  const hasPics = allMemoryImages().length > 0;
  return `<div class="screen">
    ${renderTopBar("Xotiralar", { addAction: "openMemoryForm" })}
    <div class="content">
      ${hasPics ? `<div class="card-row" data-action="openAllPictures" style="margin-top:0;margin-bottom:14px"><div style="font-size:20px">🖼️</div><div><p style="margin:0;font-size:13px;font-weight:500;color:#5B3A56">Barcha rasmlar</p><p style="margin:0;font-size:12px;color:#B79AAE">Barcha xotiralardagi suratlar</p></div></div>` : ""}
      ${tiles || emptyState("Hali xotira yoʻq. + tugmasi orqali qoʻshing.")}
    </div>
  </div>`;
}

function renderAllPictures() {
  const items = [];
  state.memories.forEach(m => (m.images || []).forEach((img, idx) => items.push({ img, memId: m.id, idx })));
  const grid = items.map(it => `<img src="${it.img}" data-action="openMemoryAtImage" data-id="${it.memId}" data-idx="${it.idx}">`).join("");
  return `<div class="screen">
    ${renderTopBar("Barcha rasmlar", { hasBack: true, backAction: "back" })}
    <div class="content">
      ${items.length ? `<div class="pic-grid">${grid}</div>` : emptyState("Hali rasm yoʻq.")}
    </div>
  </div>`;
}

function renderMemoryDetail() {
  const m = state.memories.find(x => x.id === state.memoryDetailId);
  if (!m) { state.screen = "main"; return renderMem(); }
  const images = m.images || [];
  const idx = Math.min(state.memoryCarouselIndex[m.id] || 0, Math.max(images.length - 1, 0));
  let carousel = "";
  if (images.length) {
    carousel = `
      <div class="carousel">
        <div class="carousel-img-wrap">
          <img src="${images[idx]}">
          <button class="carousel-del" data-action="deleteMemoryImage" data-id="${m.id}" data-idx="${idx}">🗑</button>
          ${images.length > 1 ? `<button class="carousel-arrow left" data-action="carouselPrev" data-id="${m.id}">‹</button><button class="carousel-arrow right" data-action="carouselNext" data-id="${m.id}">›</button>` : ""}
        </div>
        ${images.length > 1 ? `<div class="carousel-dots">${images.map((_, i) => `<div class="carousel-dot ${i === idx ? "active" : ""}"></div>`).join("")}</div>` : ""}
      </div>`;
  } else {
    carousel = `<div class="hero-time" style="margin-bottom:12px"><div class="hero-time-content"><span style="font-size:40px">${m.emoji}</span></div></div>`;
  }
  return `
    <div class="screen">
      ${renderTopBar(m.title, { hasBack: true, backAction: "back" })}
      <div class="content">
        ${carousel}
        <p style="font-size:12px;color:#B79AAE;margin:0 0 10px">${esc(formatDate(m.date))}</p>
        <div class="form-field">
          <label class="form-label">Yozuv</label>
          <textarea class="form-textarea" rows="4" id="memNoteInput" placeholder="Bu xotira haqida yozing...">${esc(m.note || "")}</textarea>
        </div>
        <div class="form-field">
          <label class="form-label">Yana rasm qoʻshish (bir nechtasini birga tanlashingiz mumkin)</label>
          <input class="form-input" type="file" accept="image/*" multiple data-action="memImageSelected" data-id="${m.id}">
        </div>
        <button class="primary-btn" data-action="saveMemoryDetail" data-id="${m.id}">Saqlash</button>
      </div>
    </div>`;
}

/* ================= MUSIC ================= */

function renderMusic() {
  const rows = state.tracks.map(t => `
    <div class="track-row" style="background:#FFF3E3;flex-direction:column;align-items:stretch">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="display:flex;align-items:flex-start;gap:12px;flex:1">
          <div class="track-icon">🎵</div>
          <div style="flex:1">
            <p style="margin:0;font-size:13px;font-weight:500;color:#5B3A56">${esc(t.title)}</p>
            <p style="margin:0;font-size:11px;color:#B79AAE">${esc(t.story || "")}</p>
            ${t.link ? `<a class="track-link" href="${esc(t.link)}" target="_blank" rel="noopener">🔗 Tashqi havola</a>` : ""}
          </div>
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-action="editTrack" data-id="${t.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteTrack" data-id="${t.id}">🗑</button>
        </div>
      </div>
      ${t.audio ? `<audio class="audio-player" controls src="${t.audio}"></audio>` : ""}
    </div>`).join("");
  return `<div class="screen">${renderTopBar("Bizning ovozlar", { addAction: "openTrackForm" })}<div class="content">${rows || emptyState("Hali qoʻshiq yoʻq. + tugmasi orqali telefondan qoʻshiq yuklang.")}</div></div>`;
}

/* ================= LETTERS ================= */

function renderLetters() {
  const opened = state.letters.find(l => l.id === state.letterOpenId);
  if (opened) {
    return `
      <div class="screen">
        ${renderTopBar("Xatlar", { hasBack: true, backAction: "closeLetter" })}
        <div class="content">
          <div class="letter-open">
            <p style="font-size:30px;margin:0 0 8px">${opened.mood}</p>
            <p class="baloo" style="font-size:17px;color:#5B3A56;margin:0 0 4px">${esc(opened.title)}</p>
            <p style="font-size:11px;color:#B79AAE;margin:0 0 18px">${esc(formatDate(opened.date))}</p>
            <p style="font-size:13px;color:#7A5670;line-height:1.7;text-align:left;white-space:pre-wrap">${esc(opened.body)}</p>
          </div>
        </div>
      </div>`;
  }
  const rows = state.letters.map(l => `
    <div class="letter-row">
      <div class="letter-row-main" data-action="openLetter" data-id="${l.id}">
        <div style="font-size:20px">✉️</div>
        <div>
          <p style="margin:0;font-size:13px;font-weight:500;color:#5B3A56">${esc(l.title)}</p>
          <p style="margin:0;font-size:11px;color:#B79AAE">${esc(formatDate(l.date))}</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:16px">${l.mood}</span>
        <div class="row-actions">
          <button class="icon-btn" data-action="editLetter" data-id="${l.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteLetter" data-id="${l.id}">🗑</button>
        </div>
      </div>
    </div>`).join("");
  return `<div class="screen">${renderTopBar("Xatlar", { addAction: "openLetterForm" })}<div class="content">${rows || emptyState("Hali xat yoʻq. + tugmasi orqali yozing.")}</div></div>`;
}

/* ================= TIME (timeline / plans / bucket / tasks) ================= */

function renderFolderList(listKey, folders) {
  return folders.map(folder => {
    const open = !!state.openFolders[listKey + "-" + folder.id];
    const done = folder.items.filter(i => i.done).length;
    const itemsHtml = folder.items.map(item => {
      const editing = state.editingItem && state.editingItem.list === listKey && state.editingItem.folderId === folder.id && state.editingItem.itemId === item.id;
      if (editing) {
        return `
          <div class="bucket-row">
            <input class="form-input" style="flex:1" id="edit-item-input" value="${esc(item.text)}">
            <button class="icon-btn" data-action="saveItemEdit" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">✔</button>
            <button class="icon-btn" data-action="cancelItemEdit">✕</button>
          </div>`;
      }
      return `
        <div class="bucket-row">
          <div class="bucket-check ${item.done ? "done" : ""}" data-action="toggleItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">${item.done ? "✓" : ""}</div>
          <p style="margin:0;flex:1;font-size:13px;color:#5B3A56;text-decoration:${item.done ? "line-through" : "none"};opacity:${item.done ? 0.55 : 1}">${esc(item.text)}</p>
          <div class="row-actions">
            <button class="icon-btn" data-action="editItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">✎</button>
            <button class="icon-btn danger" data-action="deleteItem" data-list="${listKey}" data-folder="${folder.id}" data-item="${item.id}">🗑</button>
          </div>
        </div>`;
    }).join("");
    return `
      <div class="folder-block">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="folder-head" style="flex:1" data-action="toggleFolder" data-list="${listKey}" data-folder="${folder.id}">
            <p class="folder-title">📁 ${esc(folder.title)}</p>
            <span class="folder-count">${done}/${folder.items.length}</span>
          </div>
          <button class="icon-btn danger" data-action="deleteFolder" data-list="${listKey}" data-folder="${folder.id}">🗑</button>
        </div>
        ${open ? `
          <div class="folder-body">
            ${itemsHtml || emptyState("Hali band yoʻq.")}
            <div class="add-item-row">
              <input type="text" placeholder="Yangi band..." id="newitem-${listKey}-${folder.id}">
              <button data-action="addItem" data-list="${listKey}" data-folder="${folder.id}">Qoʻsh</button>
            </div>
          </div>` : ""}
      </div>`;
  }).join("") + `<button class="add-folder-btn" data-action="addFolder" data-list="${listKey}">+ Yangi boʻlim</button>`;
}

function renderTasks() {
  const rows = state.tasks.map(t => `
    <div class="task-row ${t.done ? "done" : ""}">
      <p class="task-text">${esc(t.text)}</p>
      ${t.reward ? `<p class="task-reward">🎁 Mukofot: ${esc(t.reward)}</p>` : ""}
      <div class="task-actions">
        <button class="task-done-btn ${t.done ? "completed" : ""}" data-action="toggleTask" data-id="${t.id}">${t.done ? "✓ Bajarildi" : "Bajarildim"}</button>
        <div class="row-actions">
          <button class="icon-btn" data-action="editTask" data-id="${t.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteTask" data-id="${t.id}">🗑</button>
        </div>
      </div>
      ${t.done ? `<p class="reward-pop">🎉 Tabriklaymiz — mukofotni his qiling!</p>` : ""}
    </div>`).join("");
  return `${rows || emptyState("Hali vazifa yoʻq. + tugmasi orqali sherigingizga vazifa bering.")}`;
}

function renderTime() {
  const modes = [
    { key: "timeline", label: "Xronologiya" },
    { key: "plans", label: "Rejalar" },
    { key: "bucket", label: "Orzular" },
    { key: "tasks", label: "Vazifalar" },
  ];
  const segBtns = modes.map(o => `<button class="${state.timeMode === o.key ? "active" : ""}" data-action="setTimeMode" data-mode="${o.key}">${o.label}</button>`).join("");

  let body = "";
  let addAction = null;
  if (state.timeMode === "timeline") {
    addAction = "openTimelineForm";
    body = `<div class="timeline">${state.timeline.map(m => `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div>
          <p style="margin:0;font-size:11px;color:#B79AAE">${esc(formatDate(m.date))}</p>
          <p style="margin:2px 0 0;font-size:13px;font-weight:500;color:#5B3A56">${m.emoji} ${esc(m.title)}</p>
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-action="editTimeline" data-id="${m.id}">✎</button>
          <button class="icon-btn danger" data-action="deleteTimeline" data-id="${m.id}">🗑</button>
        </div>
      </div>`).join("") || emptyState("Hali voqea yoʻq.")}</div>`;
  } else if (state.timeMode === "plans") {
    body = renderFolderList("plans", state.plans);
  } else if (state.timeMode === "bucket") {
    body = renderFolderList("bucket", state.bucket);
  } else {
    addAction = "openTaskForm";
    body = renderTasks();
  }

  return `
    <div class="screen">
      ${renderTopBar("Vaqt", { addAction })}
      <div class="content">
        <div class="segment">${segBtns}</div>
        ${body}
      </div>
    </div>`;
}

/* ================= ONBOARDING / GENDER / SETUP / LINK ================= */

function renderOnboarding() {
  const slides = D.onboarding;
  const i = state.onboardIdx;
  const s = slides[i];
  const last = i === slides.length - 1;
  const dots = slides.map((_, idx) => `<div class="onboard-dot ${idx === i ? "active" : ""}"></div>`).join("");
  return `
    <div class="onboard-wrap">
      <div></div>
      <div>
        <div class="onboard-emoji">${s.emoji}</div>
        <p class="onboard-title">${esc(s.title)}</p>
        <p class="onboard-text">${esc(s.text)}</p>
        <div class="onboard-dots">${dots}</div>
      </div>

/* ================= PROFILE (selective questions) ================= */

function questionKey(stageId, catTitle, q) { return `${stageId}-${catTitle}-${q}`; }

function renderPickTab() {
  const body = D.stages.map(stage => {
    const open = !!state.openStages[stage.id];
    const catsHtml = stage.categories.map(cat => `
      <div style="margin-bottom:10px">
        <p class="cat-title">${esc(cat.title)}</p>
        ${cat.questions.map(q => {
          const key = questionKey(stage.id, cat.title, q);
          const checked = state.selectedByMe.includes(key);
          return `
            <div class="q-row selectable" data-action="toggleSelect" data-key="${key}">
              <p class="q-text" style="flex:1">${esc(q)}</p>
              <div class="q-checkbox ${checked ? "checked" : ""}">${checked ? "✓" : ""}</div>
            </div>`;
        }).join("")}
      </div>`).join("");
    return `
      <div class="stage-block" style="background:${stage.sensitive ? "#F1ECFF" : "#FFF3E3"}">
        <div class="stage-head" data-action="toggleStage" data-stage="${stage.id}">
          <div>
            <p class="baloo" style="margin:0;font-size:14px;color:#5B3A56">${esc(stage.label)} · ${esc(stage.title)}</p>
            <p style="margin:2px 0 0;font-size:11px;color:#8A6E80">${esc(stage.note)}</p>
          </div>
          <span style="font-size:12px;color:#B79AAE;display:inline-block;transform:${open ? "rotate(180deg)" : "none"}">⌄</span>
        </div>
        ${open ? `<div class="stage-body">${catsHtml}</div>` : ""}
      </div>`;
  }).join("");
  return `
    <p style="font-size:12px;color:#8A6E80;margin:0 0 12px">Sherigingizga bilishni xohlagan savollaringizni belgilang — faqat shu savollarni ulardan soʻraysiz.</p>
    ${body}`;
}

function renderIncomingTab() {
  const rows = [];
  D.stages.forEach(stage => {
    stage.categories.forEach(cat => {
      cat.questions.forEach(q => {
        const key = questionKey(stage.id, cat.title, q);
        if (!state.selectedByPartner.includes(key)) return;
        if (state.editingKey === key) {
          rows.push(`
            <div class="q-row">
              <p class="q-text">${esc(q)}</p>
              <textarea class="q-textarea" rows="2" id="edit-${key}">${esc(state.myAnswers[key] || "")}</textarea>
              <div class="q-actions">
                <button class="q-cancel" data-action="cancelEdit">Bekor qilish</button>
                <button class="q-save" data-action="saveAnswer" data-key="${key}">Saqlash</button>
              </div>
            </div>`);
        } else {
          const answer = state.myAnswers[key];
          rows.push(`
            <div class="q-row">
              <p class="q-text">${esc(q)}</p>
              <div data-action="editAnswer" data-key="${key}">
                ${answer ? `<p class="q-answer">${esc(answer)}</p>` : `<p class="q-placeholder">Javob berish uchun bosing…</p>`}
              </div>
            </div>`);
        }
      });
    });
  });
  return rows.length
    ? `<p style="font-size:12px;color:#8A6E80;margin:0 0 12px">Sherigingiz sizdan shu savollarni soʻragan:</p>${rows.join("")}`
    : emptyState("Hozircha sherigingiz sizdan hech narsa soʻramagan.");
}

function renderPartnerAnswersTab() {
  const rows = [];
  D.stages.forEach(stage => {
    stage.categories.forEach(cat => {
      cat.questions.forEach(q => {
        const key = questionKey(stage.id, cat.title, q);
        if (!state.selectedByMe.includes(key)) return;
        const answer = state.partnerAnswers[key];
        rows.push(`
          <div class="q-row">
            <p class="q-text">${esc(q)}</p>
            <p class="q-answer-ro" style="color:${answer ? "#7A5670" : "#C9B7C2"};font-style:${answer ? "normal" : "italic"}">${esc(answer || "Hali javob bermagan")}</p>
          </div>`);
      });
    });
  });
  return rows.length
    ? rows.join("")
    : emptyState("Hali sherigingizga savol tanlamagansiz — \"Savol tanlash\" boʻlimidan boshlang.");
}

function render() {
  clearInterval(heroSlideTimer);
  let main = "";

  if (state.screen === "onboarding") main = renderOnboarding();
  else if (state.screen === "gender") main = renderGenderPick();
  else if (state.screen === "setup") main = renderSetup();
  else if (state.screen === "link") main = renderLink();
  else if (state.screen === "profile") main = renderProfile();
  else if (state.screen === "memoryDetail") main = renderMemoryDetail();
  else if (state.screen === "allPictures") main = renderAllPictures();
  else {
    const screens = { mem: renderMem, music: renderMusic, home: renderHome, letters: renderLetters, time: renderTime };
    main = screens[state.tab]();
    nav = renderBottomNav();
  }

  document.getElementById("app").innerHTML = `<div style="flex:1;overflow-y:auto">${main}</div>${nav}${renderModal()}`;

  document.querySelectorAll(".emoji-opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      if (input) input.value = btn.dataset.emoji;
    });
  });

  if (state.screen === "main" && state.tab === "home") startHeroSlideshow();
}

/* ================= HELPERS ================= */

function readFilesAsDataUrls(files, cb) {
  const arr = Array.from(files);
  if (!arr.length) { cb([]); return; }
  let remaining = arr.length;
  const results = new Array(arr.length);
  arr.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = () => { results[idx] = reader.result; remaining--; if (remaining === 0) cb(results); };
    reader.readAsDataURL(file);
  });
}
function readFileAsDataUrl(file, cb) {
  const reader = new FileReader();
  reader.onload = () => cb(reader.result);
  reader.readAsDataURL(file);
}

function resetContentToZero() {
  state.memories = [];
  state.letters = [];
  state.tracks = [];
  state.timeline = [];
  state.plans = [];
  state.bucket = [];
  state.tasks = [];
  state.myAnswers = {};
  state.selectedByMe = [];
  persistAll();
}

/* ================= ACTIONS ================= */

document.addEventListener("DOMContentLoaded", () => {
  const app = document.getElementById("app");

  app.addEventListener("click", e => {
    if (e.target.classList && e.target.classList.contains("modal-overlay")) { state.modal = null; render(); }
  });

  app.addEventListener("click", e => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const action = el.dataset.action;

    if (action === "goTab") { state.tab = el.dataset.tab; state.screen = "main"; render(); }
    else if (action === "back") { state.screen = "main"; state.letterOpenId = null; state.memoryDetailId = null; render(); }
    else if (action === "closeLetter") { state.letterOpenId = null; render(); }
    else if (action === "openLetter") { state.letterOpenId = Number(el.dataset.id); render(); }
    else if (action === "openMemory") { state.memoryDetailId = Number(el.dataset.id); state.screen = "memoryDetail"; render(); }
    else if (action === "openMemoryAtImage") {
      const id = Number(el.dataset.id);
      state.memoryDetailId = id;
      state.memoryCarouselIndex[id] = Number(el.dataset.idx);
      state.screen = "memoryDetail"; render();
    }
    else if (action === "openAllPictures") { state.screen = "allPictures"; render(); }
    else if (action === "carouselPrev") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      const cur = state.memoryCarouselIndex[id] || 0;
      state.memoryCarouselIndex[id] = (cur - 1 + m.images.length) % m.images.length;
      render();
    }
    else if (action === "carouselNext") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      const cur = state.memoryCarouselIndex[id] || 0;
      state.memoryCarouselIndex[id] = (cur + 1) % m.images.length;
      render();
    }
    else if (action === "setTimeMode") { state.timeMode = el.dataset.mode; render(); }

    // ---- profile entry flow ----
    else if (action === "openProfileEntry") {
      if (!state.onboardSeen) { state.screen = "onboarding"; state.onboardIdx = 0; }
      else if (!state.gender) { state.screen = "gender"; }
      else if (!state.myName) { state.screen = "setup"; }
      else if (!state.linked && !safeGet("couple_link_skipped", false)) { state.screen = "link"; }
      else { state.screen = "profile"; }
      render();
    }
    else if (action === "onboardNext") {
      if (state.onboardIdx < D.onboarding.length - 1) { state.onboardIdx++; render(); }
      else { state.onboardSeen = true; safeSet("couple_onboard_seen", true); state.screen = "gender"; render(); }
    }
    else if (action === "onboardSkip") { state.onboardSeen = true; safeSet("couple_onboard_seen", true); state.screen = "gender"; render(); }
    else if (action === "chooseGender") {
      state.gender = el.dataset.gender; safeSet("couple_gender", state.gender);
      if (!state.myCode) { state.myCode = genCode(); safeSet("couple_mycode", state.myCode); }
      state.screen = "setup"; render();
    }
    else if (action === "saveSetup") {
      const wasStarted = state.appStarted;
      state.myName = document.getElementById("setupMyName").value.trim();
      state.greetingNickname = document.getElementById("setupNickname").value.trim();
      state.partnerName = document.getElementById("setupPartnerName").value.trim();
      state.meetDate = document.getElementById("setupMeetDate").value;
      safeSet("couple_myname", state.myName);
      safeSet("couple_greeting_nickname", state.greetingNickname);
      safeSet("couple_partnername", state.partnerName);
      safeSet("couple_meetdate", state.meetDate);
      if (!wasStarted && state.myName) {
        resetContentToZero();
        state.appStarted = true;
        safeSet("couple_app_started", true);
      }
      if (!state.myCode) { state.myCode = genCode(); safeSet("couple_mycode", state.myCode); }
      state.screen = "link"; render();
    }
    else if (action === "linkPartner") {
      const val = document.getElementById("partnerCodeInput").value.trim();
      if (val) { state.linked = true; safeSet("couple_linked", true); state.partnerCodeEntered = val; safeSet("couple_partner_code_entered", val); }
      state.screen = "profile"; render();
    }
    else if (action === "skipLink") { safeSet("couple_link_skipped", true); state.screen = "profile"; render(); }
    else if (action === "goLinkFromProfile") { state.screen = "link"; render(); }

    else if (action === "setProfileTab") { state.profileTab = el.dataset.ptab; render(); }
    else if (action === "toggleStage") { const id = el.dataset.stage; state.openStages[id] = !state.openStages[id]; render(); }
    else if (action === "toggleSelect") {
      const key = el.dataset.key;
      const idx = state.selectedByMe.indexOf(key);
      if (idx === -1) state.selectedByMe.push(key); else state.selectedByMe.splice(idx, 1);
      safeSet("couple_selected_by_me", state.selectedByMe);
      render();
    }
    else if (action === "editAnswer") { state.editingKey = el.dataset.key; render(); }
    else if (action === "cancelEdit") { state.editingKey = null; render(); }
    else if (action === "saveAnswer") {
      const key = el.dataset.key;
      const ta = document.getElementById("edit-" + key);
      state.myAnswers[key] = ta ? ta.value : "";
      safeSet("couple_my_answers", state.myAnswers);
      state.editingKey = null; render();
    }

    // ---- folders (plans / bucket) ----
    else if (action === "toggleFolder") { const k = el.dataset.list + "-" + el.dataset.folder; state.openFolders[k] = !state.openFolders[k]; render(); }
    else if (action === "addFolder") { state.modal = { type: "folderForm", list: el.dataset.list }; render(); }
    else if (action === "submitFolder") {
      const title = document.getElementById("ff-title").value.trim();
      if (title) { const arr = state[state.modal.list]; arr.push({ id: uid(arr), title, items: [] }); persistAll(); }
      state.modal = null; render();
    }
    else if (action === "deleteFolder") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder);
      state[list] = state[list].filter(f => f.id !== folderId);
      persistAll(); render();
    }
    else if (action === "addItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder);
      const input = document.getElementById(`newitem-${list}-${folderId}`);
      const text = input ? input.value.trim() : "";
      if (text) { const folder = state[list].find(f => f.id === folderId); folder.items.push({ id: uid(folder.items), text, done: false }); persistAll(); }
      render();
    }
    else if (action === "toggleItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const item = state[list].find(f => f.id === folderId).items.find(i => i.id === itemId);
      item.done = !item.done; persistAll(); render();
    }
    else if (action === "editItem") { state.editingItem = { list: el.dataset.list, folderId: Number(el.dataset.folder), itemId: Number(el.dataset.item) }; render(); }
    else if (action === "cancelItemEdit") { state.editingItem = null; render(); }
    else if (action === "saveItemEdit") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const input = document.getElementById("edit-item-input");
      const item = state[list].find(f => f.id === folderId).items.find(i => i.id === itemId);
      if (input && input.value.trim()) item.text = input.value.trim();
      state.editingItem = null; persistAll(); render();
    }
    else if (action === "deleteItem") {
      const list = el.dataset.list, folderId = Number(el.dataset.folder), itemId = Number(el.dataset.item);
      const folder = state[list].find(f => f.id === folderId);
      folder.items = folder.items.filter(i => i.id !== itemId);
      persistAll(); render();
    }

    // ---- tasks ----
    else if (action === "openTaskForm") { state.modal = { type: "taskForm" }; render(); }
    else if (action === "editTask") { state.modal = { type: "taskForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTask") { state.tasks = state.tasks.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "toggleTask") { const t = state.tasks.find(x => x.id === Number(el.dataset.id)); t.done = !t.done; persistAll(); render(); }
    else if (action === "submitTask") {
      const text = document.getElementById("tk-text").value.trim();
      const reward = document.getElementById("tk-reward").value.trim();
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const t = state.tasks.find(x => x.id === editId); t.text = text || t.text; t.reward = reward; }
      else if (text) state.tasks.push({ id: uid(state.tasks), text, reward, assignedBy: "me", done: false });
      persistAll(); state.modal = null; render();
    }

    // ---- memory / letter / track / timeline modals ----
    else if (action === "openMemoryForm") { state.modal = { type: "memoryForm" }; render(); }
    else if (action === "openLetterForm") { state.modal = { type: "letterForm" }; render(); }
    else if (action === "editLetter") { state.modal = { type: "letterForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteLetter") { state.letters = state.letters.filter(l => l.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "openTrackForm") { state.modal = { type: "trackForm" }; render(); }
    else if (action === "editTrack") { state.modal = { type: "trackForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTrack") { state.tracks = state.tracks.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "openTimelineForm") { state.modal = { type: "timelineForm" }; render(); }
    else if (action === "editTimeline") { state.modal = { type: "timelineForm", editId: Number(el.dataset.id) }; render(); }
    else if (action === "deleteTimeline") { state.timeline = state.timeline.filter(t => t.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "deleteMemory") { state.memories = state.memories.filter(m => m.id !== Number(el.dataset.id)); persistAll(); render(); }
    else if (action === "deleteMemoryImage") {
      const id = Number(el.dataset.id), idx = Number(el.dataset.idx);
      const m = state.memories.find(x => x.id === id);
      m.images.splice(idx, 1);
      const cur = state.memoryCarouselIndex[id] || 0;
      if (cur >= m.images.length) state.memoryCarouselIndex[id] = Math.max(0, m.images.length - 1);
      persistAll(); render();
    }
    else if (action === "closeModal") { state.modal = null; render(); }

    else if (action === "submitMemory") {
      const title = document.getElementById("mf-title").value.trim();
      const date = document.getElementById("mf-date").value;
      const emoji = document.getElementById("mf-emoji").value.trim() || "☕️";
      const note = document.getElementById("mf-note").value.trim();
      const fileInput = document.getElementById("mf-image");
      const colors = ["#FFE1EC", "#E4E0FF", "#FFF0D9", "#DBF7EF"];
      readFilesAsDataUrls(fileInput.files, (images) => {
        state.memories.push({ id: uid(state.memories), title: title || "Yangi xotira", date, emoji, color: colors[state.memories.length % colors.length], note, images });
        persistAll();
        state.modal = null; render();
      });
    }
    else if (action === "submitLetter") {
      const title = document.getElementById("lf-title").value.trim();
      const date = document.getElementById("lf-date").value;
      const mood = document.getElementById("lf-mood").value.trim() || "🥰";
      const body = document.getElementById("lf-body").value.trim();
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const l = state.letters.find(x => x.id === editId); l.title = title || l.title; l.date = date || l.date; l.mood = mood; l.body = body; }
      else state.letters.push({ id: uid(state.letters), title: title || "Yangi xat", date, mood, body });
      persistAll(); state.modal = null; render();
    }
    else if (action === "submitTrack") {
      const title = document.getElementById("tf-title").value.trim();
      const story = document.getElementById("tf-story").value.trim();
      const link = document.getElementById("tf-link").value.trim();
      const audioInput = document.getElementById("tf-audio");
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      const finish = (audioDataUrl) => {
        if (editId) {
          const t = state.tracks.find(x => x.id === editId);
          t.title = title || t.title; t.story = story; t.link = link;
          if (audioDataUrl) t.audio = audioDataUrl;
        } else {
          state.tracks.push({ id: uid(state.tracks), title: title || "Yangi qoʻshiq", story, link, audio: audioDataUrl || null });
        }
        persistAll(); state.modal = null; render();
      };
      if (audioInput.files && audioInput.files[0]) readFileAsDataUrl(audioInput.files[0], finish);
      else finish(null);
    }
    else if (action === "submitTimeline") {
      const title = document.getElementById("tl-title").value.trim();
      const date = document.getElementById("tl-date").value;
      const emoji = document.getElementById("tl-emoji").value.trim() || "🎉";
      const editId = el.dataset.editId ? Number(el.dataset.editId) : null;
      if (editId) { const t = state.timeline.find(x => x.id === editId); t.title = title || t.title; t.date = date || t.date; t.emoji = emoji; }
      else state.timeline.push({ id: uid(state.timeline), title: title || "Yangi voqea", date, emoji });
      persistAll(); state.modal = null; render();
    }
    else if (action === "saveMemoryDetail") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      m.note = document.getElementById("memNoteInput").value;
      persistAll();
      state.screen = "main"; render();
    }
  });

  app.addEventListener("change", e => {
    const el = e.target;
    if (el.dataset.action === "memImageSelected") {
      const id = Number(el.dataset.id);
      const m = state.memories.find(x => x.id === id);
      if (el.files && el.files.length) {
        readFilesAsDataUrls(el.files, (newImages) => {
          m.images = (m.images || []).concat(newImages);
          persistAll(); render();
        });
      }
    }
  });

  render();
});

</script>
<script>
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  if (tg.themeParams && tg.themeParams.bg_color) document.body.style.background = tg.themeParams.bg_color;
}
</script>
</body>
</html>
