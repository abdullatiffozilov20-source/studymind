<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyMind</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f6f7fb;
  --white:#ffffff;
  --card:#ffffff;
  --sidebar:#0f1117;
  --s2:#181b25;
  --p:#5b4cf5;
  --p2:#7b6ef8;
  --p-l:#edeaff;
  --teal:#0ea67c;
  --tl:#e0f5ee;
  --red:#e84545;
  --rl:#fdeaea;
  --amber:#d97706;
  --al:#fef3c7;
  --text:#0f1117;
  --t2:#64748b;
  --t3:#94a3b8;
  --b:#e2e8f0;
  --b2:rgba(91,76,245,0.15);
  --sh:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --sh2:0 8px 24px rgba(0,0,0,0.1);
  --r:14px;
  --fn:'Geist',sans-serif;
  --mono:'Geist Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);overflow:hidden;font-size:14px}

/* ── LAYOUT ── */
#app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:52px 1fr;height:100vh;height:100dvh;max-height:100dvh}
#topbar{grid-column:1/-1;background:var(--white);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;z-index:50;box-shadow:var(--sh)}
#sidebar{background:var(--sidebar);overflow-y:auto;display:flex;flex-direction:column}
#sidebar::-webkit-scrollbar{display:none}
#main{overflow-y:auto;padding:1.25rem;min-height:0}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

/* ── TOPBAR ── */
.t-logo{font-size:0.95rem;font-weight:800;display:flex;align-items:center;gap:7px;letter-spacing:-0.02em}
.t-logo-i{width:26px;height:26px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.75rem}
.t-right{display:flex;align-items:center;gap:0.6rem}
.t-xp{font-size:0.72rem;font-weight:700;color:var(--p);background:var(--p-l);padding:3px 10px;border-radius:100px;font-family:var(--mono)}
.t-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--teal));display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:white;cursor:pointer;overflow:hidden}
.t-av img{width:100%;height:100%;object-fit:cover}

/* ── SIDEBAR ── */
.s-head{padding:1rem 0.75rem 0.5rem}
.s-user{display:flex;align-items:center;gap:8px;padding:0.6rem 0.75rem;border-radius:8px;background:var(--s2);margin-bottom:0.75rem}
.s-av{width:28px;height:28px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:white;flex-shrink:0}
.s-name{font-size:0.78rem;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-level{font-size:0.65rem;color:#64748b}
.s-xp-bar{height:2px;background:#1e2433;border-radius:1px;margin-top:4px;overflow:hidden}
.s-xp-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--p2));transition:width 1s ease}
.s-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#3d4466;padding:0 0.75rem;margin-bottom:4px}
.nav-i{display:flex;align-items:center;gap:9px;padding:0.5rem 0.75rem;border-radius:8px;cursor:pointer;color:#6b7280;font-size:0.8rem;font-weight:500;transition:all 0.15s;margin-bottom:1px}
.nav-i:hover{background:var(--s2);color:#c4c9e0}
.nav-i.active{background:var(--p);color:white}
.nav-i .ic{font-size:0.95rem;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:0.58rem;font-weight:700;padding:1px 6px;border-radius:100px}
.s-streak{margin:auto 0 0;padding:0.75rem;background:var(--s2);border-radius:8px;margin:0.5rem 0.75rem 0.75rem;text-align:center}
.s-streak-n{font-size:1.2rem;font-weight:800;color:#ff9f43}
.s-streak-l{font-size:0.65rem;color:#4a5175;margin-top:1px}

/* ── PAGE ── */
.ph{margin-bottom:1.25rem}
.ph-title{font-size:1.2rem;font-weight:800;letter-spacing:-0.025em;margin-bottom:2px}
.ph-sub{color:var(--t2);font-size:0.8rem}

/* ── METRIC GRID ── */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:0.65rem;margin-bottom:1.25rem}
.mc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:0.9rem;box-shadow:var(--sh)}
.mc-icon{font-size:1.1rem;margin-bottom:0.4rem}
.mc-label{font-size:0.65rem;color:var(--t2);font-weight:500;margin-bottom:3px}
.mc-val{font-size:1.35rem;font-weight:800;letter-spacing:-0.02em;line-height:1}
.mc-sub{font-size:0.65rem;color:var(--t3);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:1.1rem;box-shadow:var(--sh);margin-bottom:0.65rem}
.card-t{font-size:0.78rem;font-weight:700;margin-bottom:0.9rem;display:flex;align-items:center;justify-content:space-between;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0.65rem}

/* ── SUBJECTS ── */
.sc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:0.9rem;box-shadow:var(--sh);margin-bottom:0.5rem;position:relative;overflow:hidden;transition:all 0.2s}
.sc:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.65rem}
.sc-left{display:flex;align-items:center;gap:8px}
.sc-emoji{font-size:1.2rem}
.sc-name{font-weight:700;font-size:0.88rem}
.sc-type{font-size:0.62rem;color:var(--t3)}
.sc-avg{font-size:1.2rem;font-weight:800;font-family:var(--mono)}
.bt{background:var(--bg);border:none;border-radius:6px;padding:3px 9px;font-size:0.68rem;cursor:pointer;font-family:var(--fn);font-weight:600;color:var(--t2);transition:all 0.15s}
.bt:hover{background:var(--b);color:var(--text)}
.bt.p{background:var(--p-l);color:var(--p)}
.btrack{background:var(--bg);border-radius:100px;height:3px;overflow:hidden;margin-bottom:5px}
.bfill{height:100%;border-radius:100px;transition:width 1s ease}
.sc-meta{font-size:0.65rem;color:var(--t2);display:flex;justify-content:space-between}

/* ── AI CHAT ── */
.chat-wrap{background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);display:flex;flex-direction:column;height:calc(100vh - 180px)}
.chat-top{padding:0.75rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.chat-ai-name{font-size:0.82rem;font-weight:700;display:flex;align-items:center;gap:6px}
.chat-status{font-size:0.65rem;color:var(--teal);display:flex;align-items:center;gap:4px}
.chat-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal)}
.chat-tools{display:flex;gap:5px;overflow-x:auto;padding:0.6rem 1rem;border-bottom:1px solid var(--b)}
.chat-tools::-webkit-scrollbar{display:none}
.ctool{background:var(--bg);border:1px solid var(--b);border-radius:7px;padding:4px 10px;font-size:0.7rem;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--fn)}
.ctool:hover{border-color:var(--p);color:var(--p);background:var(--p-l)}
.chat-msgs{flex:1;overflow-y:auto;padding:0.9rem;display:flex;flex-direction:column;gap:0.65rem;min-height:0}
.chat-msgs::-webkit-scrollbar{width:2px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--b)}
.msg{max-width:82%;animation:fi 0.25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.msg-b{padding:0.65rem 0.85rem;border-radius:12px;font-size:0.82rem;line-height:1.65}
.msg.user .msg-b{background:var(--p);color:white;border-radius:12px 3px 12px 12px}
.msg.ai .msg-b{background:var(--bg);border:1px solid var(--b);border-radius:3px 12px 12px 12px;color:var(--text)}
.msg-t{font-size:0.6rem;color:var(--t3);margin-top:2px;padding:0 3px}
.msg.user .msg-t{text-align:right}
.typing{display:flex;gap:3px;padding:0.65rem 0.85rem;background:var(--bg);border:1px solid var(--b);border-radius:3px 12px 12px 12px;width:fit-content;align-self:flex-start}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--p);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-bar{padding:0.65rem 0.9rem;border-top:1px solid var(--b);background:var(--card)}
.chat-row{display:flex;gap:7px;align-items:flex-end}
.chat-ta{flex:1;background:var(--bg);border:1.5px solid var(--b);border-radius:10px;padding:0.55rem 0.8rem;font-size:0.82rem;font-family:var(--fn);outline:none;resize:none;color:var(--text);max-height:80px;transition:border-color 0.2s;line-height:1.5}
.chat-ta:focus{border-color:var(--p);background:var(--white)}
.chat-ta::placeholder{color:var(--t3)}
.send-btn{background:var(--p);border:none;width:34px;height:34px;border-radius:9px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;transition:all 0.2s}
.send-btn:hover{background:var(--p2);transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* ── FLASHCARD ── */
.fc{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:1.75rem;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;margin-bottom:0.75rem;box-shadow:var(--sh)}
.fc.rev{background:var(--tl);border-color:rgba(14,166,124,0.25)}
.fc-f{font-size:0.95rem;font-weight:600;line-height:1.5}
.fc-b{font-size:0.88rem;color:var(--teal);margin-top:0.65rem;font-weight:500;line-height:1.55}
.fc-h{font-size:0.68rem;color:var(--t3);margin-top:0.5rem}
.fc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:0.45rem;margin-bottom:0.75rem}
.fcb{border:none;border-radius:8px;padding:0.55rem;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:var(--fn);transition:all 0.15s}
.fcb:active{transform:scale(0.94)}
.fcb.a{background:var(--rl);color:var(--red)}
.fcb.h{background:var(--al);color:var(--amber)}
.fcb.g{background:var(--p-l);color:var(--p)}
.fcb.e{background:var(--tl);color:var(--teal)}

/* ── SCHEDULE ── */
.si{display:flex;align-items:center;gap:9px;padding:0.6rem 0;border-bottom:1px solid var(--b)}
.si:last-child{border-bottom:none}
.si-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--b);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:0.6rem}
.si-cb.done{background:var(--teal);border-color:var(--teal);color:white}
.si-title{font-size:0.82rem;font-weight:500;flex:1}
.si-title.done{text-decoration:line-through;color:var(--t3)}
.si-time{font-size:0.68rem;color:var(--p);font-family:var(--mono);font-weight:600}

/* ── INSIGHT ── */
.ins-chip{display:inline-flex;align-items:center;font-size:0.7rem;padding:3px 9px;border-radius:100px;margin:2px;font-weight:500;border:1px solid}
.ins-s{background:var(--tl);color:var(--teal);border-color:rgba(14,166,124,0.2)}
.ins-w{background:var(--rl);color:var(--red);border-color:rgba(232,69,69,0.2)}
.ins-r{background:var(--p-l);color:var(--p);border-color:var(--b2)}

/* ── FORMS & BUTTONS ── */
.field{margin-bottom:0.8rem}
.field label{display:block;font-size:0.7rem;font-weight:600;color:var(--t2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--b);border-radius:8px;color:var(--text);padding:0.55rem 0.8rem;font-size:0.82rem;font-family:var(--fn);outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);background:var(--white)}
.emoji-g{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-top:4px}
.eo{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:4px;text-align:center;font-size:0.9rem;cursor:pointer;transition:all 0.12s}
.eo.sel{border-color:var(--p);background:var(--p-l)}
.colors{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.co{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.co.sel{border-color:var(--text);transform:scale(1.1)}
.btn{padding:0.6rem 1.1rem;border:none;border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:var(--fn);transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--p);color:white}
.btn-p:hover{background:var(--p2)}
.btn-s{background:var(--bg);color:var(--t2);border:1px solid var(--b)}
.btn-d{background:var(--rl);color:var(--red)}
.btn-f{width:100%;padding:0.7rem}
.btn-sm{padding:0.35rem 0.8rem;font-size:0.72rem}
.ai-bubble{background:var(--p-l);border:1px solid var(--b2);border-radius:3px 12px 12px 12px;padding:0.85rem;margin-bottom:0.85rem}
.ai-bubble p{font-size:0.8rem;line-height:1.7;color:var(--text)}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:72px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bc-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height 1s ease}
.bc-l{font-size:0.55rem;color:var(--t3)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--white);border-radius:18px 18px 0 0;padding:1.25rem 1.1rem calc(1.25rem + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:su 0.28s cubic-bezier(0.4,0,0.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.mh{width:32px;height:3px;background:var(--b);border-radius:2px;margin:0 auto 1.1rem}
.mt{font-size:0.95rem;font-weight:800;margin-bottom:1.1rem;letter-spacing:-0.02em}

/* ── LOGIN ── */
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.lc{background:var(--white);border:1px solid var(--b);border-radius:20px;padding:2.25rem 1.75rem;width:100%;max-width:360px;box-shadow:var(--sh2);text-align:center}
.l-icon{font-size:2.5rem;margin-bottom:0.75rem}
.l-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.35rem}
.l-sub{color:var(--t2);font-size:0.82rem;margin-bottom:1.75rem;line-height:1.6}
.l-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:0.78rem;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:var(--fn);margin-bottom:0.5rem;transition:all 0.2s;text-decoration:none;border:none}
.l-btn:active{transform:scale(0.97)}
.l-g{background:#18191f;color:white}
.l-t{background:#229ED9;color:white}
.l-or{color:var(--t3);font-size:0.72rem;margin:0.35rem 0}

/* ── UTILS ── */
.tag{display:inline-flex;align-items:center;font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:100px;border:1px solid}
.tag-p{background:var(--p-l);color:var(--p);border-color:var(--b2)}
.tag-t{background:var(--tl);color:var(--teal);border-color:rgba(14,166,124,0.2)}
.tag-r{background:var(--rl);color:var(--red);border-color:rgba(232,69,69,0.2)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t2);font-size:0.82rem}
.empty-i{font-size:2rem;margin-bottom:0.6rem}
.dv{border:none;border-top:1px solid var(--b);margin:0.65rem 0}
.urgent{background:var(--rl);border:1px solid rgba(232,69,69,0.2);border-radius:var(--r);padding:0.75rem 0.9rem;margin-bottom:0.65rem;display:flex;align-items:center;gap:9px}

/* ── MOBILE ── */
@media(max-width:720px){
  #app{grid-template-columns:1fr;grid-template-rows:52px 1fr 56px}
  #sidebar{display:none}
  #mob-nav{display:flex}
  .mg{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .chat-wrap{height:calc(100vh - 160px)}
}
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--b);padding:5px 0 max(5px,env(safe-area-inset-bottom));z-index:100}
.mn-btn{flex:1;background:none;border:none;color:var(--t3);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:var(--fn)}
.mn-btn.active{color:var(--p)}
.mn-ic{font-size:1.15rem}
.mn-l{font-size:0.56rem;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script>
const tg = window.Telegram?.WebApp
if (tg) { tg.ready(); tg.expand() }

// ── STATE ──────────────────────────────────────────────────────────
let S = {
  user: null, subjects: [], stats: null,
  tab: 'home',
  chatMsgs: [], aiLoading: false,
  flashcards: [], fcIdx: 0, fcRev: false,
  schedule: [], insights: [],
  modal: null,
  ns: { name:'', emoji:'📚', color:'#5b4cf5', examDate:'' },
  nf: { front:'', back:'', subjectId:'' },
  nsc: { title:'', subjectName:'', time:'', date:'' },
  notesText: '',
  planLoading: false,
  isMobile: window.innerWidth < 720
}

const EMOJIS = ['📚','📐','🔬','📖','🌍','🎨','💻','🎵','🧪','🧮','📝','🏛️','🌱','⚗️','🔭','🗺️','🎯','💡']
const COLORS = ['#5b4cf5','#0ea67c','#e84545','#d97706','#185FA5','#7c3aed','#0891b2','#be185d']
const TABS = [
  {id:'home',ic:'🏠',l:'Bosh'},
  {id:'ai',ic:'🧠',l:'AI'},
  {id:'subjects',ic:'📚',l:'Fanlar'},
  {id:'flashcards',ic:'🔁',l:'Karta'},
  {id:'insights',ic:'🔍',l:'Tahlil'},
]

// ── API ────────────────────────────────────────────────────────────
const req = async (m,p,b) => {
  const r = await fetch(p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined})
  if (!r.ok) throw new Error(await r.text())
  return r.json()
}
const GET=(p)=>req('GET',p)
const POST=(p,b)=>req('POST',p,b)
const PUT=(p,b)=>req('PUT',p,b)
const PATCH=(p,b)=>req('PATCH',p,b)
const DEL=(p)=>req('DELETE',p)

const today=()=>new Date().toISOString().split('T')[0]
const now=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})

// ── INIT ───────────────────────────────────────────────────────────
async function init() {
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user
    try { await POST('/auth/telegram',{telegramId:u.id,name:u.first_name,username:u.username}) } catch{}
  }
  try {
    S.user = await GET('/api/user')
    await loadAll()
    render()
  } catch { renderLogin() }
}

async function loadAll() {
  const [subjects, stats, flashcards, chats, schedule] = await Promise.all([
    GET('/api/subjects'), GET('/api/stats'),
    GET('/api/flashcards?dueOnly=true'),
    GET('/api/chat'), GET('/api/schedule?date='+today())
  ])
  S.subjects = subjects; S.stats = stats
  S.flashcards = flashcards; S.fcIdx=0; S.fcRev=false
  S.chatMsgs = chats.map(c=>({role:c.role,content:c.content,time:''}))
  S.schedule = schedule
}

    <div class="field"><label>Rang</label><div class="colors">${COLORS.map(c=>`<div class="co ${ns.color===c?'sel':''}" style="background:${c}" onclick="S.ns.color='${c}';render()"></div>`).join('')}</div></div>
    <div class="field"><label>Imtihon sanasi</label><input type="date" value="${ns.examDate}" oninput="S.ns.examDate=this.value"></div>
    <button class="btn btn-p btn-f" onclick="saveSubject()">Saqlash</button>
    <button class="btn btn-s btn-f" style="margin-top:0.4rem" onclick="closeModal()">Bekor</button>`
}

function addFlashcardM() {
  return `
    <div class="field"><label>Fan</label><select onchange="S.nf.subjectId=this.value"><option value="">Tanlang</option>${S.subjects.map(s=>`<option value="${s._id}">${s.emoji}${s.name}</option>`).join('')}</select></div>
    <div class="field"><label>Savol *</label><textarea rows="3" oninput="S.nf.front=this.value" placeholder="Savol..."></textarea></div>
    <div class="field"><label>Javob *</label><textarea rows="3" oninput="S.nf.back=this.value" placeholder="Javob..."></textarea></div>
    <button class="btn btn-p btn-f" onclick="saveFlashcard()">Saqlash</button>
    <button class="btn btn-s btn-f" style="margin-top:0.4rem" onclick="closeModal()">Bekor</button>`
}

function addScheduleM() {
  return `
    <div class="field"><label>Vazifa *</label><input oninput="S.nsc.title=this.value" placeholder="Matematika darsiga tayyorlanish"></div>
    <div class="field"><label>Fan (ixtiyoriy)</label><select onchange="S.nsc.subjectName=this.options[this.selectedIndex].text"><option value="">—</option>${S.subjects.map(s=>`<option>${s.emoji}${s.name}</option>`).join('')}</select></div>
    <div class="field"><label>Vaqt</label><input type="time" oninput="S.nsc.time=this.value"></div>
    <button class="btn btn-p btn-f" onclick="saveSched()">Saqlash</button>
    <button class="btn btn-s btn-f" style="margin-top:0.4rem" onclick="closeModal()">Bekor</button>`
}

function summarizeM() {
  return `
    <div class="field"><label>Konspektingizni yozing</label><textarea id="sum-in" rows="6" placeholder="Matn..." oninput="S.notesText=this.value"></textarea></div>
    <button class="btn btn-p btn-f" onclick="doSummarize()">🧠 Xulosa</button>
    <div id="sum-res" style="margin-top:0.75rem;font-size:0.8rem;line-height:1.7"></div>
    <button class="btn btn-s btn-f" style="margin-top:0.4rem" onclick="closeModal()">Yopish</button>`
}

function settingsM() {
  const u=S.user
  return `
    <div style="text-align:center;margin-bottom:1.25rem">
      <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--teal));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:white;margin:0 auto 0.65rem">${u?.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:u?.name?.[0]||'U'}</div>
      <div style="font-weight:700">${u?.name}</div>
      <div style="color:var(--t2);font-size:0.75rem">${u?.email||'Telegram foydalanuvchi'}</div>
    </div>
    <div class="field"><label>Sinf / Kurs</label><input value="${u?.grade||''}" placeholder="11-sinf" oninput="updUser('grade',this.value)"></div>
    <div class="field"><label>Maktab</label><input value="${u?.school||''}" placeholder="Maktab nomi" oninput="updUser('school',this.value)"></div>
    <div class="field"><label>Til</label><select onchange="updUser('lang',this.value)"><option value="uz" ${u?.lang==='uz'?'selected':''}>🇺🇿 O'zbek</option><option value="ru" ${u?.lang==='ru'?'selected':''}>🇷🇺 Русский</option><option value="en" ${u?.lang==='en'?'selected':''}>🇬🇧 English</option></select></div>
    <button class="btn btn-d btn-f" onclick="logout()">Chiqish</button>
    <button class="btn btn-s btn-f" style="margin-top:0.4rem" onclick="closeModal()">Yopish</button>`
}

// ── ACTIONS ───────────────────────────────────────────────────────
function switchTab(t){S.tab=t;render();document.getElementById('main')?.scrollTo({top:0})}
function openModal(t){S.modal=t;if(t==='addSubject')S.ns={name:'',emoji:'📚',color:'#5b4cf5',examDate:''};if(t==='addFlashcard')S.nf={front:'',back:'',subjectId:''};if(t==='addSchedule')S.nsc={title:'',subjectName:'',time:'',date:''};render()}
function closeModal(){S.modal=null;render()}

async function saveSubject() {
  if (!S.ns.name.trim()) return alert('Fan nomi kiriting')
  try {
    const s=await POST('/api/subjects',S.ns); S.subjects.push(s); closeModal()
  } catch(e){alert(e.message)}
}

async function delSubject(id) {
  if (!confirm('O\'chirilsinmi?')) return
  await DEL('/api/subjects/'+id); S.subjects=S.subjects.filter(s=>s._id!==id); render()
}

async function saveFlashcard() {
  if (!S.nf.front||!S.nf.back) return alert('Savol va javob kiriting')
  await POST('/api/flashcards',S.nf)
  S.flashcards=await GET('/api/flashcards?dueOnly=true'); S.fcIdx=0; S.fcRev=false; closeModal()
}

async function aiFlashcard() {
  const s=S.subjects[0]
  if (!s) return alert('Avval fan qo\'shing')
  showToast('⏳ AI karta yaratmoqda...')
  const {cards}=await POST('/api/chat/flashcard',{subjectId:s._id,topic:s.name})
  S.flashcards=await GET('/api/flashcards?dueOnly=true'); S.fcIdx=0; S.fcRev=false
  showToast(`✅ ${cards.length} ta karta yaratildi!`); render()
}

function revFC(){S.fcRev=true;render()}

async function reviewFC(q) {
  const card=S.flashcards[S.fcIdx]; if(!card) return
  await POST(`/api/flashcards/${card._id}/review`,{quality:q})
  S.fcIdx++; S.fcRev=false
  if (S.fcIdx>=S.flashcards.length) { S.flashcards=await GET('/api/flashcards?dueOnly=true'); S.fcIdx=0 }
  render()
}

async function saveSched() {
  if (!S.nsc.title) return alert('Nomi kiriting')
  const s=await POST('/api/schedule',{...S.nsc,date:today()}); S.schedule.push(s); closeModal()
}

async function toggleSched(id,done) {
  await PATCH('/api/schedule/'+id,{isDone:done})
  const s=S.schedule.find(s=>s._id===id); if(s) s.isDone=done; render()
}

async function delSched(id) {
  await DEL('/api/schedule/'+id); S.schedule=S.schedule.filter(s=>s._id!==id); render()
}

async function genPlan() {
  showToast('⏳ AI reja tuzmoqda...')
  const {schedule}=await POST('/api/chat/daily-plan',{})
  S.schedule=[...S.schedule,...schedule]; render()
  showToast('✅ Reja tayyor!')
}

async function sendChat() {
  const inp=document.getElementById('ci')
  const msg=inp?.value?.trim(); if(!msg||S.aiLoading) return
  S.chatMsgs.push({role:'user',content:msg,time:now()}); inp.value=''
  S.aiLoading=true; render(); scrollChat()
  try {
    const {reply}=await POST('/api/chat',{message:msg})
    S.chatMsgs.push({role:'assistant',content:reply,time:now()})
    // Refresh stats after chat (grades might have been extracted)
    S.stats=await GET('/api/stats'); S.subjects=await GET('/api/subjects')
  } catch { S.chatMsgs.push({role:'assistant',content:'❌ Xatolik. Qayta urinib koring.',time:now()}) }
  S.aiLoading=false; render(); scrollChat()
}

function qp(text){const inp=document.getElementById('ci');if(inp)inp.value=text;sendChat()}
function qpAndSwitch(text,tab){S.tab=tab;render();setTimeout(()=>qp(text),100)}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}}

async function genInsight() {
  showToast('⏳ AI tahlil qilmoqda...')
  try {
    const ins=await POST('/api/chat/insight',{})
    S.insights=[ins]; render()
  } catch(e){showToast('❌ Xatolik: '+e.message)}
}

async function doSummarize() {
  const notes=S.notesText||document.getElementById('sum-in')?.value
  if (!notes?.trim()) return alert('Matn kiriting')
  const el=document.getElementById('sum-res'); if(el) el.innerHTML='⏳...'
  try {
    const {summary}=await POST('/api/ai/summarize',{notes})
    if(el) el.innerHTML=summary.replace(/\n/g,'<br>')
  } catch { if(el) el.innerHTML='❌ Xatolik.' }
}

async function updUser(f,v) { try{await PUT('/api/user',{[f]:v});S.user[f]=v}catch{} }
async function logout() { await POST('/auth/logout'); location.reload() }

// ── UTILS ─────────────────────────────────────────────────────────
function nxtLvl(l){const t=[0,100,250,500,900,1400,2000,2800,3800,5000];return t[l]||5000+(l-9)*1500}
function scrollChat(){setTimeout(()=>{const e=document.getElementById('cm');if(e)e.scrollTop=e.scrollHeight},50)}
function showToast(msg){
  const e=document.createElement('div')
  e.style.cssText='position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:0.5rem 1.1rem;border-radius:100px;font-size:0.78rem;font-weight:600;z-index:999;white-space:nowrap'
  e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)
}
function afterRender(){if(S.tab==='ai')scrollChat()}

// Extra API for summarize (reuse AI)
async function fetchInsights(){S.insights=await GET('/api/insights')}

// On tab change
const _switch=switchTab
window.switchTab=async function(t){
  S.tab=t
  if(t==='insights'&&!S.insights.length) await fetchInsights()
  render();document.getElementById('main')?.scrollTo({top:0})
}

init()
</script>
</body>
</html>
