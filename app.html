<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyMind</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07080f;
  --bg2:#0d0f1c;
  --card:#111425;
  --card2:#161a2e;
  --border:rgba(108,99,255,0.15);
  --border2:rgba(108,99,255,0.3);
  --purple:#6c63ff;
  --teal:#00d4aa;
  --red:#ff5470;
  --yellow:#ffd166;
  --text:#f0f2ff;
  --text2:#8892b0;
  --text3:#3d4468;
  --r:16px;
  --font:'Clash Display',sans-serif;
  --body:'Satoshi',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--body)}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#page{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 80px;scroll-behavior:smooth}
#page::-webkit-scrollbar{display:none}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,15,28,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px, env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;transition:all 0.2s;font-family:var(--body)}
.nav-btn.active{color:var(--purple)}
.nav-btn .icon{font-size:1.35rem;transition:transform 0.2s}
.nav-btn.active .icon{transform:scale(1.15)}
.nav-btn .label{font-size:0.62rem;font-weight:500;letter-spacing:0.02em}

/* HEADER */
.topbar{padding:1rem 1.1rem 0.5rem;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-family:var(--font);font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:6px}
.topbar-logo span{background:linear-gradient(135deg,var(--purple),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:white;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

/* HERO CARD */
.hero-card{margin:0.75rem 1.1rem;background:linear-gradient(135deg,rgba(108,99,255,0.2),rgba(0,212,170,0.1));border:1px solid var(--border2);border-radius:20px;padding:1.2rem 1.3rem;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(108,99,255,0.3),transparent);border-radius:50%}
.hero-greeting{font-size:0.78rem;color:var(--text2);margin-bottom:2px}
.hero-name{font-family:var(--font);font-size:1.4rem;font-weight:700;margin-bottom:0.8rem;letter-spacing:-0.02em}
.hero-stats{display:flex;gap:1rem}
.hero-stat{text-align:center}
.hero-stat-n{font-family:var(--font);font-size:1.2rem;font-weight:700}
.hero-stat-l{font-size:0.62rem;color:var(--text2);margin-top:1px}

/* XP BAR */
.xp-wrap{margin:0 1.1rem 0.8rem}
.xp-top{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text2);margin-bottom:5px}
.xp-track{background:var(--card2);border-radius:100px;height:5px;overflow:hidden}
.xp-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}

/* SECTION */
.sec{padding:0 1.1rem;margin-bottom:1.2rem}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.sec-title{font-family:var(--font);font-size:0.85rem;font-weight:600;letter-spacing:-0.01em}
.sec-action{font-size:0.72rem;color:var(--purple);cursor:pointer;font-weight:500}

/* QUICK STATS */
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin:0.5rem 1.1rem 1rem}
.qs{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0.85rem 0.6rem;text-align:center}
.qs-n{font-family:var(--font);font-size:1.3rem;font-weight:700}
.qs-l{font-size:0.62rem;color:var(--text2);margin-top:3px}

/* SUBJECT CARDS */
.subject-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:0.65rem;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden}
.subject-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.subject-card:active{transform:scale(0.98)}
.subj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.7rem}
.subj-left{display:flex;align-items:center;gap:8px}
.subj-emoji{font-size:1.3rem;line-height:1}
.subj-name{font-family:var(--font);font-size:0.95rem;font-weight:600}
.subj-exam{font-size:0.68rem;color:var(--text2);margin-top:1px}
.subj-actions{display:flex;gap:6px}
.subj-btn{background:rgba(108,99,255,0.12);border:none;border-radius:8px;padding:5px 10px;font-size:0.72rem;color:var(--purple);cursor:pointer;font-family:var(--body);transition:all 0.2s}
.subj-btn:active{background:rgba(108,99,255,0.25)}
.subj-bar-track{background:var(--card2);border-radius:100px;height:4px;overflow:hidden}
.subj-bar-fill{height:100%;border-radius:100px;transition:width 1s ease}
.subj-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:0.68rem;color:var(--text2)}

/* URGENT EXAM */
.urgent-card{background:linear-gradient(135deg,rgba(255,84,112,0.15),rgba(255,84,112,0.05));border:1px solid rgba(255,84,112,0.3);border-radius:14px;padding:0.9rem 1rem;margin-bottom:0.6rem;display:flex;align-items:center;gap:10px}
.urgent-icon{font-size:1.5rem;flex-shrink:0}
.urgent-name{font-weight:600;font-size:0.88rem}
.urgent-days{font-size:0.72rem;color:var(--red);margin-top:2px}

/* AI CHAT */
.chat-messages{padding:0.75rem 1.1rem;display:flex;flex-direction:column;gap:0.75rem;min-height:200px}
.chat-msg{max-width:85%;animation:fadein 0.3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chat-msg.user{align-self:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-bubble{padding:0.75rem 0.95rem;border-radius:16px;font-size:0.84rem;line-height:1.65}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--purple),#8b85ff);color:white;border-radius:16px 4px 16px 16px}
.chat-msg.ai .chat-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.chat-time{font-size:0.62rem;color:var(--text3);margin-top:3px;padding:0 4px}
.chat-msg.user .chat-time{text-align:right}
.typing{display:flex;gap:4px;padding:0.75rem 0.95rem;background:var(--card);border:1px solid var(--border);border-radius:4px 16px 16px 16px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.chat-bar{position:sticky;bottom:80px;padding:0.65rem 1.1rem;background:rgba(7,8,15,0.9);backdrop-filter:blur(10px);border-top:1px solid var(--border)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-subject-sel{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:0.75rem;padding:0.4rem 0.6rem;font-family:var(--body);max-width:100px;cursor:pointer}
.chat-input-wrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;padding:0.5rem 0.75rem;gap:6px;transition:border-color 0.2s}
.chat-input-wrap:focus-within{border-color:var(--purple)}
.chat-input-wrap textarea{flex:1;background:none;border:none;color:var(--text);font-size:0.84rem;font-family:var(--body);outline:none;resize:none;max-height:100px;line-height:1.5}
.chat-input-wrap textarea::placeholder{color:var(--text3)}
.chat-send{background:linear-gradient(135deg,var(--purple),#8b85ff);border:none;width:36px;height:36px;border-radius:10px;color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.chat-send:active{transform:scale(0.92)}
.chat-send:disabled{opacity:0.5}
.ai-tools{display:flex;gap:6px;margin-bottom:0.6rem;overflow-x:auto;padding-bottom:2px}
.ai-tool{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.85rem;font-size:0.72rem;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--body);transition:all 0.2s;flex-shrink:0}
.ai-tool:active{background:var(--card2);color:var(--purple);border-color:var(--border2)}

/* FLASHCARDS */
.card-review{padding:0.75rem 1.1rem}
.fc-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem 1.5rem;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin-bottom:1rem;position:relative}
.fc-card.revealed{background:linear-gradient(135deg,rgba(108,99,255,0.1),rgba(0,212,170,0.05));border-color:var(--border2)}
.fc-front{font-size:1.1rem;font-weight:600;line-height:1.5}
.fc-back{font-size:0.95rem;color:var(--teal);margin-top:0.75rem;line-height:1.6}
.fc-hint{font-size:0.72rem;color:var(--text3);margin-top:0.5rem}
.fc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:1rem}
.fc-btn{border:none;border-radius:10px;padding:0.65rem 0.3rem;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:var(--body);transition:all 0.15s}
.fc-btn:active{transform:scale(0.94)}
.fc-btn.again{background:rgba(255,84,112,0.15);color:var(--red)}
.fc-btn.hard{background:rgba(255,209,102,0.15);color:var(--yellow)}
.fc-btn.good{background:rgba(108,99,255,0.15);color:var(--purple)}
.fc-btn.easy{background:rgba(0,212,170,0.15);color:var(--teal)}
.fc-progress{text-align:center;font-size:0.78rem;color:var(--text2);margin-bottom:0.75rem}

/* ANALYTICS */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:0.8rem}
.chart-title{font-family:var(--font);font-size:0.82rem;font-weight:600;margin-bottom:1rem}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:4px;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 1s cubic-bezier(0.4,0,0.2,1);min-height:2px}
.bar-label{font-size:0.58rem;color:var(--text3)}
.bar-val{font-size:0.6rem;color:var(--text2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;animation:fadein 0.2s ease}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:1.5rem 1.1rem max(1.5rem,env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;animation:slideup 0.3s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.2rem}
.modal-title{font-family:var(--font);font-size:1.05rem;font-weight:700;margin-bottom:1.2rem}

/* FORM */
.field{margin-bottom:1rem}
.field label{display:block;font-size:0.75rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:0.75rem 0.9rem;font-size:0.88rem;font-family:var(--body);outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--purple)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
.emoji-opt{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;font-size:1.1rem;cursor:pointer;transition:all 0.15s}
.emoji-opt.selected{border-color:var(--purple);background:rgba(108,99,255,0.15)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.color-opt.selected{border-color:white;transform:scale(1.15)}

/* BUTTONS */
.btn{width:100%;padding:0.9rem;border:none;border-radius:14px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s;letter-spacing:-0.01em}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--purple),#8b85ff);color:white}
.btn-secondary{background:var(--card2);color:var(--text2);margin-top:0.5rem}
.btn-danger{background:rgba(255,84,112,0.15);color:var(--red)}

/* LOGIN */
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.login-logo{font-size:4rem;margin-bottom:1rem}
.login-title{font-family:var(--font);font-size:2rem;font-weight:700;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--purple),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--text2);font-size:0.9rem;margin-bottom:2.5rem;line-height:1.6;max-width:300px}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:0.95rem;border:none;border-radius:14px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:var(--font);margin-bottom:0.75rem;transition:all 0.2s;text-decoration:none}
.login-btn:active{transform:scale(0.97)}
.login-google{background:white;color:#1a1a2e}
.login-tg{background:linear-gradient(135deg,#229ED9,#1a7db3);color:white}

/* UTILS */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:600;padding:3px 10px;border-radius:100px;font-family:var(--font)}
.pill-purple{background:rgba(108,99,255,0.15);color:var(--purple);border:1px solid rgba(108,99,255,0.25)}
.pill-teal{background:rgba(0,212,170,0.12);color:var(--teal);border:1px solid rgba(0,212,170,0.2)}
.pill-red{background:rgba(255,84,112,0.12);color:var(--red);border:1px solid rgba(255,84,112,0.2)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:0.85rem}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem}
.divider{border:none;border-top:1px solid var(--border);margin:0.5rem 0}

/* NOTES MODAL */
.notes-area{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:0.75rem;font-size:0.85rem;font-family:var(--body);outline:none;resize:none;min-height:150px}

/* SESSION LOG */
.log-modal .dur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.dur-opt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.6rem;text-align:center;font-size:0.82rem;cursor:pointer;transition:all 0.15s;font-weight:500}
.dur-opt.selected{background:rgba(108,99,255,0.15);border-color:var(--purple);color:var(--purple)}
</style>
</head>
<body>

<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const tg = window.Telegram?.WebApp
if (tg) { tg.ready(); tg.expand() }

let state = {
  user: null,
  subjects: [],
  stats: null,
  tab: 'home',
  chatMessages: [],
  chatSubjectId: '',
  flashcards: [],
  currentCard: 0,
  cardRevealed: false,
  modal: null,
  loading: false,
  aiLoading: false,
  newSubject: { name: '', emoji: '📚', color: '#6c63ff', examDate: '' },
  newCard: { front: '', back: '', subjectId: '' },
  sessionLog: { subjectId: '', duration: 25, score: '', notes: '' },
  notesText: '',
}

const EMOJIS = ['📚','📐','🔬','📖','🌍','🎨','💻','🎵','🧪','🧮','📝','🏛️','🌱','⚗️','🔭','🎭']
const COLORS = ['#6c63ff','#00d4aa','#ff5470','#ffd166','#06d6a0','#ef8c8c','#4cc9f0','#f77f00']

// ═══════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  })
  if (!res.ok) throw new Error(await res.text())
  return res.json()
}

const GET  = path => api('GET', path)
const POST = (path, body) => api('POST', path, body)
const PUT  = (path, body) => api('PUT', path, body)
const DEL  = path => api('DELETE', path)

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
async function init() {
  // Try Telegram WebApp auth
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user
    try {
      await POST('/auth/telegram', { telegramId: u.id, name: u.first_name, username: u.username })
    } catch {}
  }

  try {
    state.user = await GET('/api/user')
    await loadData()
    render()
  } catch {
    renderLogin()
  }
}

async function loadData() {
  const [subjects, stats, flashcards] = await Promise.all([
    GET('/api/subjects'),
    GET('/api/stats'),
    GET('/api/flashcards?dueOnly=true')
  ])
  state.subjects = subjects
  state.stats = stats
  state.flashcards = flashcards
  state.currentCard = 0
  state.cardRevealed = false
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root')
  root.innerHTML = `
    <div id="app">
      ${renderTopbar()}
      <div id="page">${renderPage()}</div>
      ${renderNav()}
    </div>
    ${state.modal ? renderModal() : ''}
  `
  afterRender()
}

function renderLogin() {
  document.getElementById('root').innerHTML = `
    <div class="login-page">
      <div class="login-logo">🧠</div>
      <div class="login-title">StudyMind</div>
      <p class="login-sub">Aqlli o'quv assistentingiz. Xulq-atvoringizni tahlil qilib, qiynalayotgan joyingizni aniqlaydi.</p>
      <a href="/auth/google" class="login-btn login-google">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google bilan kirish
      </a>
      <div style="color:var(--text3);font-size:0.78rem;margin:0.5rem 0">yoki</div>
      <button class="login-btn login-tg" onclick="loginTelegram()">

function renderAnalytics() {
  const weekly = state.stats?.weekly || []
  const maxMin = Math.max(...weekly.map(d => d.minutes), 1)
  const days = ['Du', 'Se', 'Ch', 'Pa', 'Ju', 'Sh', 'Ya']
  const totalWeek = weekly.reduce((s, d) => s + d.minutes, 0)

  return `
    <div class="sec" style="margin-top:0.75rem">
      <div class="chart-wrap">
        <div class="chart-title">📈 Haftalik o'qish (daqiqa) — Jami: ${totalWeek}min</div>
        <div class="bar-chart">
          ${weekly.map((d, i) => {
            const h = Math.max(4, Math.round((d.minutes / maxMin) * 80))
            const dayLabel = days[new Date(d.date).getDay() || 6]
            return `<div class="bar-col">
              <div class="bar-val">${d.minutes || ''}</div>
              <div class="bar" style="height:${h}px;background:${d.minutes > 0 ? 'linear-gradient(180deg,var(--purple),var(--teal))' : 'var(--card2)'}"></div>
              <div class="bar-label">${dayLabel}</div>
            </div>`
          }).join('')}
        </div>
      </div>

      <div class="chart-wrap">
        <div class="chart-title">📚 Fan progressi</div>
        ${state.subjects.map(s => `
          <div style="margin-bottom:0.8rem">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:5px">
              <span>${s.emoji} ${s.name}</span>
              <span style="color:var(--text2)">${s.progress}%</span>
            </div>
            <div class="subj-bar-track">
              <div class="subj-bar-fill" style="width:${s.progress}%;background:${s.color}"></div>
            </div>
          </div>`).join('')}
        ${!state.subjects.length ? '<div class="empty">Fan qo\'shing</div>' : ''}
      </div>
    </div>`
}

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  state.tab = tab
  render()
  document.getElementById('page')?.scrollTo({ top: 0 })
}

function openModal(type, data) {
  state.modal = type
  state.modalData = data
  if (type === 'addSubject') state.newSubject = { name: '', emoji: '📚', color: '#6c63ff', examDate: '' }
  if (type === 'addCard') state.newCard = { front: '', back: '', subjectId: '' }
  render()
  if (type === 'examPlan' && data) loadExamPlan(data)
}

function closeModal() { state.modal = null; render() }

function selectEmoji(e) { state.newSubject.emoji = e; render() }
function selectColor(c) { state.newSubject.color = c; render() }
function selectDur(d) { state.sessionLog.duration = d; render() }

async function saveSubject() {
  const { name, emoji, color, examDate } = state.newSubject
  if (!name.trim()) return alert('Fan nomi kiriting')
  try {
    const subj = await POST('/api/subjects', { name: name.trim(), emoji, color, examDate })
    state.subjects.push(subj)
    closeModal()
  } catch (e) { alert('Xatolik: ' + e.message) }
}

async function deleteSubject(id) {
  if (!confirm('Fan o\'chirilsinmi?')) return
  await DEL('/api/subjects/' + id)
  state.subjects = state.subjects.filter(s => s._id !== id)
  render()
}

async function saveCard() {
  const { front, back, subjectId } = state.newCard
  if (!front.trim() || !back.trim()) return alert('Savol va javob kiriting')
  await POST('/api/flashcards', { front, back, subjectId })
  await refreshFlashcards()
  closeModal()
}

async function refreshFlashcards() {
  state.flashcards = await GET('/api/flashcards?dueOnly=true')
  state.currentCard = 0
  state.cardRevealed = false
}

function revealCard() {
  state.cardRevealed = true
  render()
}

async function reviewCard(quality) {
  const card = state.flashcards[state.currentCard]
  if (!card) return
  await POST(`/api/flashcards/${card._id}/review`, { quality })
  state.currentCard++
  state.cardRevealed = false
  if (state.currentCard >= state.flashcards.length) {
    await refreshFlashcards()
  }
  render()
}

function openLogSession(subjectId, name) {
  state.sessionLog = { subjectId, duration: 25, score: '', notes: '' }
  openModal('logSession')
}

async function saveSession() {
  const { subjectId, duration, score, notes } = state.sessionLog
  if (!duration) return alert('Vaqtni kiriting')
  try {
    const result = await POST('/api/sessions', { subjectId, duration: Number(duration), score: score ? Number(score) : undefined, notes })
    state.user.xp = result.newXP
    state.user.level = result.level
    state.user.streak = result.streak
    await loadData()
    closeModal()
    showToast(`+${result.xpEarned} XP 🎯`)
  } catch (e) { alert('Xatolik: ' + e.message) }
}

async function loadExamPlan(subjectId) {
  const el = document.getElementById('plan-content')
  if (!el) return
  try {
    const { plan } = await POST('/api/ai/exam-plan', { subjectId })
    if (el) el.innerHTML = plan.replace(/\n/g, '<br>')
  } catch { if (el) el.innerHTML = '❌ Xatolik yuz berdi.' }
}

async function sendChat() {
  const inp = document.getElementById('chat-in')
  const msg = inp?.value?.trim()
  if (!msg || state.aiLoading) return

  state.chatMessages.push({ role: 'user', content: msg, time: now() })
  inp.value = ''
  state.aiLoading = true
  render()

  scrollChat()

  try {
    const { reply } = await POST('/api/ai/chat', { message: msg, subjectId: state.chatSubjectId || undefined })
    state.chatMessages.push({ role: 'assistant', content: reply, time: now() })
  } catch {
    state.chatMessages.push({ role: 'assistant', content: '❌ Xatolik yuz berdi. Qayta urinib ko\'ring.', time: now() })
  }

  state.aiLoading = false
  render()
  scrollChat()
}

function sendQuickPrompt(text) {
  const inp = document.getElementById('chat-in')
  if (inp) inp.value = text
  sendChat()
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat() }
}

function openNotesModal() { openModal('notes') }

async function summarizeNotes() {
  const notes = state.notesText || document.getElementById('notes-input')?.value
  if (!notes?.trim()) return alert('Matn kiriting')
  const el = document.getElementById('summary-result')
  if (el) el.innerHTML = '⏳ Xulosa chiqarilmoqda...'
  try {
    const { summary } = await POST('/api/ai/summarize', { notes })
    if (el) el.innerHTML = summary.replace(/\n/g, '<br>')
  } catch { if (el) el.innerHTML = '❌ Xatolik.' }
}

async function changeLang(lang) {
  await PUT('/api/user', { lang })
  state.user.lang = lang
}

async function logout() {
  await POST('/auth/logout')
  location.reload()
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function nextLevelXP(level) {
  const t = [0, 100, 300, 600, 1000, 1500, 2200, 3000]
  return t[level] || 3000 + (level - 7) * 500
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
}

function scrollChat() {
  setTimeout(() => {
    const el = document.getElementById('chat-msgs')
    if (el) el.scrollTop = el.scrollHeight
  }, 50)
}

function showToast(msg) {
  const el = document.createElement('div')
  el.style.cssText = `position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--purple);color:white;padding:0.6rem 1.2rem;border-radius:100px;font-size:0.85rem;font-weight:600;z-index:999;animation:fadein 0.3s ease`
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 2500)
}

function afterRender() {
  const page = document.getElementById('page')
  if (page && state.tab === 'ai') {
    scrollChat()
  }
}

// ── INIT ──────────────────────────────────────────────────────────
init()
</script>
</body>
